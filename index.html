/* ── РОБОЧІ СТОЛИ ──
   Раніше було лише один масив тайлів (localStorage 'ar_lay2'). Тепер це
   масив столів workspaces:[{id,name,lay:[...]}]. Стара структура автоматично
   мігрує в "Стіл 1" при першому запуску нової версії, щоб ніхто не втратив
   своє поточне розташування. */
let workspaces = lg('workspaces');
if(!workspaces || !Array.isArray(workspaces) || !workspaces.length){
  const oldLay = lg('lay2');
  workspaces = [{id:'w1', name:'Стіл 1', lay: oldLay || dl()}];
}
let activeWsId = lg('activeWs');
if(!activeWsId || !workspaces.find(w=>w.id===activeWsId)) activeWsId = workspaces[0].id;

function activeWs(){ return workspaces.find(w=>w.id===activeWsId) || workspaces[0]; }
// `lay` лишається змінною, яку використовує весь інший код без змін —
// вона просто завжди вказує на масив тайлів АКТИВНОГО столу.
let lay = activeWs().lay;
function saveLay(){ activeWs().lay = lay; ls('workspaces', workspaces); }

let editMode=false,nid=20,ptile=null;
// ── Стан переставляння плиток (розділ "два прицільні тапи") ──
let dragTile=null, dragEl=null;

function clearDragVisuals(){
  if(dragEl) dragEl.classList.remove('ds');
}
const gi=document.getElementById('gi');

// В ландшафтній орієнтації кількість колонок підлаштовується під кількість тайлів,
// щоб вони завжди ділились рівно (4 тайли → 2 на рядок, 5-6 тайлів → 3 на рядок)
// замість жорстко зафіксованих 6 колонок, які викликали накладання/переповнення сітки.
// Керується через клас ar-landscape на <html> (замість @media у CSS) — той
// самий computeIsLandscape(), що й сенсор кута нахилу, тож сітка і сенсор
// завжди узгоджені з ФАКТИЧНОЮ орієнтацією телефону (ручний лок було
// прибрано — він ламав правильний вибір осі гіроскопа/акселерометра).
function applyGridColumns(){
  const isLandscape = computeIsLandscape();
  gi.style.gridTemplateColumns = isLandscape ? 'repeat(12, 1fr)' : '';
  document.documentElement.classList.toggle('ar-landscape', isLandscape);
}
window.addEventListener('resize', applyGridColumns);
window.addEventListener('orientationchange', applyGridColumns);
try{ applyGridColumns(); }catch(e){ console.error('applyGridColumns init failed:',e); }

function render(){
  applyGridColumns();
  const videoTile = document.getElementById('dash-video-tile');
  gi.innerHTML = '';
  if(videoTile) gi.appendChild(videoTile);

  lay.forEach(tile=>{
    const el=mkTile(tile);
    if(alertState[tile.id])el.classList.add(alertState[tile.id]);
    gi.appendChild(el);
  });
  if(editMode){
    const ab=document.createElement('div');
    ab.className='tile add';ab.textContent='+';
    ab.addEventListener('click',()=>{ptile=null;cpk();});
    gi.appendChild(ab);
  }
}

function mkTile(tile){
  const p=P[tile.k];
  const el=document.createElement('div');
  el.className='tile '+tile.sz+(editMode?' ed':'');
  el.dataset.id=tile.id;el.style.setProperty('--pc',p.c);
  
  const rm=document.createElement('div');rm.className='rm';rm.textContent='✕';
  rm.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(dragTile && dragTile.id===tile.id){ dragTile=null; dragEl=null; } // вибрану плитку якраз видаляють — не лишаємо застарілу посилання
    if(tile.k==='MapTile' && mapInstances[tile.id]){
      try{ mapInstances[tile.id].map.remove(); }catch(err){}
      delete mapInstances[tile.id];
    }
    lay=lay.filter(t=>t.id!==tile.id);saveLay();render();
  });
  el.appendChild(rm);

  if(tile.k==='MapTile'){
    el.classList.add('map-tile');
    el.appendChild(mkMapTile(tile));
  }else if(tile.st==='gauge' && tile.sz==='s22'){
    el.appendChild(mkG(tile,p));
  }else{
    el.appendChild(mkF(tile,p));
  }

  if(tile.k==='GPS'){
    const badge=document.createElement('div');
    badge.className='cam-radar-badge';
    badge.innerHTML='<div class="c-sign">--</div><div class="c-dist">--м</div>';
    el.appendChild(badge);
  }

  // ── Переставляння плиток: ДВА ПРИЦІЛЬНІ ТАПИ, без жодного перетягування
  // (свайп/рух пальцем конфліктував зі скролом сторінки й власним жестом
  // Bluefy) ──
  // Тап 1 по плитці A (нічого не вибрано) → вибираємо A (підсвічуємо .ds).
  // Тап 2 по ІНШІЙ плитці B → A і B МІНЯЮТЬСЯ місцями в lay.
  // Тап 2 по ТІЙ САМІЙ плитці A → скасовуємо вибір і відкриваємо звичний
  // пікер параметру/розміру (стара поведінка тапу нікуди не зникла).
  el.addEventListener('click',()=>{
    if(!editMode){
      if(tile.k==='Lean') onLeanTileTap();
      return;
    }
    if(dragTile===null){
      dragTile=tile; dragEl=el;
      el.classList.add('ds');
      return;
    }
    if(dragTile.id===tile.id){
      clearDragVisuals(); dragTile=null; dragEl=null;
      ptile=tile; cpk();
      return;
    }
    const i=lay.findIndex(t=>t.id===dragTile.id);
    const j=lay.findIndex(t=>t.id===tile.id);
    clearDragVisuals(); dragTile=null; dragEl=null;
    if(i>-1 && j>-1 && i!==j){
      [lay[i],lay[j]]=[lay[j],lay[i]];
      saveLay(); render();
    }
  });

  return el;
}

function mkF(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const u=document.createElement('div');u.className='tun';
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  w.append(l,u,v);
  return w;
}

function mkG(tile,p){
  const w=document.createElement('div');w.className='gw';
  w.innerHTML=`<svg class="gsvg" viewBox="0 0 100 100">
    <path class="gbg" d="M 20 80 A 40 40 0 1 1 80 80"/>
    <path class="gfg" id="gfg_${tile.id}" d="M 20 80 A 40 40 0 1 1 80 80" stroke-dasharray="188.4" stroke-dashoffset="188.4"/>
  </svg>`;
  const gc=document.createElement('div');gc.className='gc';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  gc.append(l,v);
  w.appendChild(gc);
  setTimeout(()=>ug(tile.id,tile.k),10);
  return w;
}

function ug(id,k){
  const path=document.getElementById('gfg_'+id);if(!path)return;
  const p=P[k],v=parseFloat(V[k]);
  if(isNaN(v)){path.style.strokeDashoffset=188.4;return;}
  const pct=Math.max(0,Math.min(1,(v-p.mn)/(p.mx-p.mn)));
  path.style.strokeDashoffset=188.4-(188.4*pct);
}

let prevV={};
function ud(){
  document.querySelectorAll('[data-lid]').forEach(el=>{
    const k=el.dataset.lid,v=V[k];
    if(prevV[k]===v)return;
    el.textContent=v;
  });
  lay.forEach(t=>{if(t.st==='gauge'&&t.sz==='s22')ug(t.id,t.k);});
  prevV={...V};
}

/* ══════════════════════════════════════════════════════════════════════
   ПЛИТКА "КАРТА" (2×2, Leaflet) — гібридний офлайн/онлайн режим
   ══════════════════════════════════════════════════════════════════════
   ВАЖЛИВО: живі координати беремо з _lastLat/_lastLon (розділ вище,
   watchPosition) — а НЕ з V.GPS. У цьому дашборді V.GPS історично означає
   ШВИДКІСТЬ (км/год) з GPS, а не координати (див. об'єкт P.GPS: u:'km/h').
   Технічне завдання просило "V.GPS" для координат, але такого поля з
   координатами в проєкті немає — це просто неточність у формулюванні,
   а не окрема вимога, тож використано реальне джерело координат. */

// ── IndexedDB: тут лежать ВЕЛИКІ файли (.mbtiles, GPX/GeoJSON маршрут),
// щоб не впертись у ліміт localStorage (~5МБ) і не тягнути їх заново після
// кожного перезапуску застосунку. ──
const MAPDB_NAME='vracer-map', MAPDB_STORE='files', MAPDB_TILES='tiles';
function mapIdb(){
  return new Promise((resolve,reject)=>{
    // v2: додано окремий стор "tiles" — сюди тихо складаються тайли, які
    // карта тягнула онлайн (розділ "Накопичення тайлів" нижче). Стара
    // v1-база (лише "files") при апгрейді не втрачається — IndexedDB сам
    // зберігає вже наявні стори, ми лише додаємо новий.
    const req=indexedDB.open(MAPDB_NAME,2);
    req.onupgradeneeded=()=>{
      const db=req.result;
      if(!db.objectStoreNames.contains(MAPDB_STORE)) db.createObjectStore(MAPDB_STORE);
      if(!db.objectStoreNames.contains(MAPDB_TILES)) db.createObjectStore(MAPDB_TILES);
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
async function idbSet(key,val){
  try{
    const db=await mapIdb();
    return new Promise((res,rej)=>{
      const tx=db.transaction(MAPDB_STORE,'readwrite');
      tx.objectStore(MAPDB_STORE).put(val,key);
      tx.oncomplete=()=>res(true);tx.onerror=()=>rej(tx.error);
    });
  }catch(e){ return false; }
}
async function idbGet(key){
  try{
    const db=await mapIdb();
    return new Promise((res,rej)=>{
      const tx=db.transaction(MAPDB_STORE,'readonly');
      const r=tx.objectStore(MAPDB_STORE).get(key);
      r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);
    });
  }catch(e){ return null; }
}
async function idbDel(key){
  try{
    const db=await mapIdb();
    return new Promise((res)=>{
      const tx=db.transaction(MAPDB_STORE,'readwrite');
      tx.objectStore(MAPDB_STORE).delete(key);
      tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}

// ── Накопичення тайлів "з кешу" (розділ, який просив користувач) ──
// Справжній HTTP-кеш браузера з JS не читається, тому робимо власний:
// щоразу, коли карта тягне тайл онлайн (бо в .mbtiles його нема), паралельно
// зберігаємо його байти сюди, в окремий IndexedDB-стор, під ключем "z_x_y".
// Кнопка "Конвертувати в офлайн-карту" пізніше збирає все накопичене в
// справжню MBTiles (SQLite) базу і домержує в уже завантажений офлайн-файл.
function tileCacheKey(z,x,y){ return z+'_'+x+'_'+y; }
async function cacheTileBytes(z,x,y,arrayBuffer){
  try{
    const db=await mapIdb();
    return new Promise((res)=>{
      const tx=db.transaction(MAPDB_TILES,'readwrite');
      tx.objectStore(MAPDB_TILES).put(arrayBuffer, tileCacheKey(z,x,y));
      tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}
async function idbCountTiles(){
  try{
    const db=await mapIdb();
    return new Promise((res)=>{
      const tx=db.transaction(MAPDB_TILES,'readonly');
      const r=tx.objectStore(MAPDB_TILES).count();
      r.onsuccess=()=>res(r.result||0);r.onerror=()=>res(0);
    });
  }catch(e){ return 0; }
}
async function idbGetAllTiles(){
  // Повертає масив {z,x,y,bytes} — для конвертора в MBTiles нижче.
  try{
    const db=await mapIdb();
    return new Promise((res)=>{
      const tx=db.transaction(MAPDB_TILES,'readonly');
      const store=tx.objectStore(MAPDB_TILES);
      const out=[];
      const cursorReq=store.openCursor();
      cursorReq.onsuccess=(e)=>{
        const cur=e.target.result;
        if(cur){
          const [z,x,y]=cur.key.split('_').map(Number);
          out.push({z,x,y,bytes:cur.value});
          cur.continue();
        } else { res(out); }
      };
      cursorReq.onerror=()=>res(out);
    });
  }catch(e){ return []; }
}
async function idbClearTiles(){
  try{
    const db=await mapIdb();
    return new Promise((res)=>{
      const tx=db.transaction(MAPDB_TILES,'readwrite');
      tx.objectStore(MAPDB_TILES).clear();
      tx.oncomplete=()=>res(true);tx.onerror=()=>res(false);
    });
  }catch(e){ return false; }
}


// ── Налаштування карти (зум-рівні) — маленькі, тому в localStorage ──
const MAP_DA={std:15, detail:18, dark:true};
let MapCfg = {...MAP_DA, ...(lg('mapcfg')||{})};

// ── MBTiles (SQLite) читання через sql.js ──
let mbSqlDb=null;       // екземпляр SQL.Database поточного завантаженого .mbtiles
let mbFileName=null;    // ім'я файлу — лише для відображення в налаштуваннях
let _sqlJsReady=null;
function ensureSqlJs(){
  if(_sqlJsReady) return _sqlJsReady;
  _sqlJsReady = initSqlJs({ locateFile:f=>'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/'+f });
  return _sqlJsReady;
}
async function loadMbtilesFromBytes(bytes,name){
  const SQL=await ensureSqlJs();
  mbSqlDb=new SQL.Database(new Uint8Array(bytes));
  mbFileName=name||'офлайн-карта.mbtiles';
}
async function loadSavedMbtilesIfAny(){
  try{
    const rec=await idbGet('mbtilesFile');
    if(rec && rec.bytes){ await loadMbtilesFromBytes(rec.bytes, rec.name); }
  }catch(e){ console.error('Не вдалось відновити збережений .mbtiles:',e); }
}
// MBTiles зберігає рядки тайлів у схемі TMS (вісь Y перевернута відносно
// звичної XYZ, якою користується Leaflet/OSM) — переводимо y→tms_y.
function mbGetTileBytes(z,x,y){
  if(!mbSqlDb) return null;
  const tmsY = Math.pow(2,z)-1-y;
  try{
    const res=mbSqlDb.exec('SELECT tile_data FROM tiles WHERE zoom_level=? AND tile_column=? AND tile_row=?',[z,x,tmsY]);
    if(res.length && res[0].values.length) return res[0].values[0][0]; // Uint8Array
  }catch(e){}
  return null;
}

// ── Конвертор: накопичені онлайн-тайли (idbGetAllTiles) → справжня MBTiles
// (SQLite) база. Якщо офлайн-карта вже завантажена — домержовує ПРЯМО в неї
// (INSERT OR REPLACE, тобто новіші/додаткові тайли не стирають те, що вже
// було); якщо нема жодної — створює нову базу з нуля. ──
async function convertCachedTilesToMbtiles(onProgress){
  const SQL=await ensureSqlJs();
  const tiles=await idbGetAllTiles();
  if(!tiles.length) return {ok:false, reason:'empty'};

  let db = mbSqlDb; // домержовуємо в уже завантажену офлайн-карту, якщо вона є
  if(!db){
    db=new SQL.Database();
    db.run(`CREATE TABLE IF NOT EXISTS tiles (zoom_level INTEGER, tile_column INTEGER, tile_row INTEGER, tile_data BLOB);
            CREATE UNIQUE INDEX IF NOT EXISTS tile_index ON tiles (zoom_level, tile_column, tile_row);
            CREATE TABLE IF NOT EXISTS metadata (name TEXT, value TEXT);`);
    db.run(`INSERT INTO metadata (name,value) VALUES ('name','vRacer накопичена карта'), ('format','png')`);
  } else {
    // На випадок, якщо завантажений раніше .mbtiles чомусь без цих таблиць/індексу.
    db.run(`CREATE TABLE IF NOT EXISTS tiles (zoom_level INTEGER, tile_column INTEGER, tile_row INTEGER, tile_data BLOB);
            CREATE UNIQUE INDEX IF NOT EXISTS tile_index ON tiles (zoom_level, tile_column, tile_row);`);
  }

  const stmt=db.prepare('INSERT OR REPLACE INTO tiles (zoom_level,tile_column,tile_row,tile_data) VALUES (?,?,?,?)');
  let i=0;
  for(const t of tiles){
    const tmsY = Math.pow(2,t.z)-1-t.y; // назад у TMS-рядок, той самий формат, що ми читаємо
    stmt.run([t.z, t.x, tmsY, new Uint8Array(t.bytes)]);
    i++;
    if(onProgress && i%200===0) onProgress(i, tiles.length);
  }
  stmt.free();

  const bytes = db.export(); // Uint8Array усього SQLite-файлу — те саме, що читається як завантажений .mbtiles
  mbSqlDb = db;
  mbFileName = mbFileName || 'накопичена-офлайн-карта.mbtiles';
  await idbSet('mbtilesFile', {bytes: bytes.buffer, name: mbFileName});
  return {ok:true, tilesCount:tiles.length};
}

// ── Гібридний тайл-шар: спершу mbtiles (офлайн), інакше — OSM (онлайн) ──
// КРИТИЧНО: якщо Leaflet із CDN не завантажився (немає інтернету саме в
// момент старту сторінки, CDN заблоковано мережею/Bluefy тощо), глобальний
// `L` буде undefined — і виклик L.GridLayer.extend() кидав НЕОБРОБЛЕНИЙ
// виняток прямо на верхньому рівні скрипта. Один необроблений виняток
// зупиняє ВЕСЬ подальший код у тому самому <script> — саме тому вивалювався
// повністю чорний екран із "мертвим" топбаром (кнопки намальовані статичним
// HTML і показувались, а от render() сітки плиток нижче по коду просто
// ніколи не викликався). Тепер це загорнуто: якщо L відсутній — просто не
// створюємо клас (плитка карти потім сама покаже повідомлення про це,
// див. initLeafletMap), а решта дашборду (BLE, тайли, налаштування)
// продовжує працювати як звичайно.
let HybridTileLayer = null;
try{
  if(typeof L !== 'undefined' && L.GridLayer){
    HybridTileLayer = L.GridLayer.extend({
      createTile: function(coords, done){
        const tile = document.createElement('img');
        tile.setAttribute('role','presentation');
        tile.style.width = tile.style.height = '256px';
        const z = coords.z, x = coords.x;
        // Тайли з негативним/переповненим x на межі карти світу — Leaflet сам
        // нормалізує їх під капотом для XYZ-запиту, тут просто підстрахуємось.
        const y = coords.y;
        const bytes = mbGetTileBytes(z,x,y);
        if(bytes){
          const blob=new Blob([bytes.buffer?bytes:new Uint8Array(bytes)],{type:'image/png'});
          const url=URL.createObjectURL(blob);
          tile.onload=()=>{URL.revokeObjectURL(url);done(null,tile);};
          tile.onerror=()=>{URL.revokeObjectURL(url);done(new Error('bad tile'),tile);};
          tile.src=url;
          tile.dataset.src='offline';
        } else {
          // Немає офлайн-тайла (файл не завантажено АБО виїхали за межі
          // завантаженого регіону) — тягнемо "на льоту" з інтернету. Робимо
          // це через fetch() (а не просто tile.src=url), бо для накопичення
          // офлайн-бази (нижче) нам потрібні саме БАЙТИ тайла, а не просто
          // картинка в <img> — так ми і показуємо тайл, і одразу тихо
          // складаємо його байти в IndexedDB для майбутньої конвертації.
          const sub=['a','b','c'][(x+y)%3];
          const url=`https://${sub}.tile.openstreetmap.org/${z}/${x}/${y}.png`;
          tile.dataset.src='online';
          fetch(url).then(r=>{
            if(!r.ok) throw new Error('http '+r.status);
            return r.arrayBuffer();
          }).then(buf=>{
            const blob=new Blob([buf],{type:'image/png'});
            const objUrl=URL.createObjectURL(blob);
            tile.onload=()=>URL.revokeObjectURL(objUrl);
            tile.src=objUrl;
            done(null,tile);
            cacheTileBytes(z,x,y,buf); // у фоні, не чекаємо і не блокуємо показ тайла
          }).catch(err=>{ done(err,tile); });
        }
        return tile;
      }
    });
  } else {
    console.error('Leaflet не завантажився з CDN (L не визначено) — плитка карти буде недоступна, решта дашборду працює');
  }
}catch(e){ console.error('HybridTileLayer init failed:', e); }

// ── Реєстр активних інстансів карти (зазвичай одна плитка, але про всяк
// випадок — раптом хтось додасть дві) ──
const mapInstances = {}; // {tileId: {map, marker, badge, wrapEl, viewportEl, heading, lastDblTap, zoomedIn, routeLine}}

// ── Індикатор ONLINE/OFFLINE на плитці — груба, але чесна оцінка: якщо є
// завантажений .mbtiles, ми ЗДЕБІЛЬШОГО малюємо з нього (доки не виїдеш за
// межі регіону); точний "звідки прийшов ОСТАННІЙ тайл" тут не рахуємо, щоб
// не городити подієву шину лише заради напису в кутку плитки. ──
function refreshMapBadges(){
  Object.values(mapInstances).forEach(st=>{
    if(!st.badge) return;
    st.badge.textContent = mbSqlDb ? 'OFFLINE' : 'ONLINE';
    st.badge.className = 'map-tile-badge ' + (mbSqlDb ? 'map-tile-offline' : 'map-tile-online');
  });
}

// ── Тема карти (Темна/Світла) — тогл у Налаштування → Карта. "Темна" =
// звичайні світлі OSM-тайли просто інвертуються фільтром (без окремого
// набору нічних тайлів), "Світла" = тайли як є. Фільтр вішаємо саме на
// .map-tile-viewport (не на .map-tile-inner), тому індикатор ONLINE/OFFLINE
// (сусідній елемент, поза viewport) кольори не інвертує і лишається читабельним. ──
function applyMapTheme(st){
  if(!st.viewportEl) return;
  st.viewportEl.classList.toggle('map-theme-dark', !!MapCfg.dark);
}
function applyMapThemeAll(){ Object.values(mapInstances).forEach(applyMapTheme); }

function mkMapTile(tile){
  const existing = mapInstances[tile.id];
  if(existing && existing.viewportEl){
    // Мапу вже ініціалізовано раніше — render() перебудовує ВЕСЬ #grid
    // на кожну зміну розкладки (додавання/видалення/переставляння будь-якої
    // плитки), тож просто переносимо вже живий DOM-вузол карти в нову
    // обгортку замість пересоздання Leaflet-інстансу (інакше втратили б і
    // саму карту, і імпортований маршрут на кожен такий рендер).
    const container=document.createElement('div');container.style.cssText='position:relative;width:100%;height:100%;';
    container.appendChild(existing.viewportEl);container.appendChild(existing.badge);
    setTimeout(()=>{ try{ existing.map.invalidateSize(); sizeRotatedMapContainer(existing); }catch(e){} },0);
    return container;
  }
  const viewport=document.createElement('div');viewport.className='map-tile-viewport';
  const wrap=document.createElement('div');wrap.className='map-tile-inner';
  wrap.id='leafmap_'+tile.id;
  viewport.appendChild(wrap);
  const badge=document.createElement('div');badge.className='map-tile-badge map-tile-online';badge.textContent='ONLINE';
  const container=document.createElement('div');container.style.cssText='position:relative;width:100%;height:100%;';
  container.appendChild(viewport);container.appendChild(badge);
  // Ініціалізація Leaflet потребує, щоб контейнер уже був у DOM з реальними
  // розмірами — відкладаємо на наступний тік рендеру.
  setTimeout(()=>initLeafletMap(tile.id, wrap, badge, viewport), 0);
  return container;
}

// ── Квадратний контейнер для обертання без порожніх кутів ──
// Сторона квадрата = діагональ видимої плитки (+запас) — тоді хоч як його
// не крутити навколо центру, видима прямокутна область завжди повністю
// вкрита картою.
function sizeRotatedMapContainer(st){
  const w=st.viewportEl.clientWidth, h=st.viewportEl.clientHeight;
  if(!w||!h) return;
  const diag=Math.ceil(Math.sqrt(w*w+h*h))+24;
  st.wrapEl.style.width=diag+'px';
  st.wrapEl.style.height=diag+'px';
  try{ st.map.invalidateSize(); }catch(e){}
  applyMapTransform(st); // розмір змінився — переприв'язати transform-origin/зсув
}
function resizeAllMapTiles(){ Object.values(mapInstances).forEach(st=>{ if(st.viewportEl) sizeRotatedMapContainer(st); }); }
let _mapResizeT=null;
window.addEventListener('resize', ()=>{ clearTimeout(_mapResizeT); _mapResizeT=setTimeout(resizeAllMapTiles,200); });
window.addEventListener('orientationchange', ()=>setTimeout(resizeAllMapTiles,300));

// Позиціонування (центрування) + обертання квадрата — один transform, щоб
// порядок translate→rotate був завжди однаковий.
function applyMapTransform(st){
  const deg = (st.heading!=null) ? -st.heading : 0; // мінус: обертаємо карту НАЗУСТРІЧ курсу, щоб напрям руху завжди дивився вгору
  st.wrapEl.style.transform = `translate(-50%,-50%) rotate(${deg}deg)`;
}
function setMapHeading(st, heading){
  if(heading==null || isNaN(heading)) return; // курс невідомий (стоїмо на місці) — лишаємо попередній поворот як є
  st.heading = heading;
  applyMapTransform(st);
}

function initLeafletMap(tileId, container, badge, viewport){
  if(mapInstances[tileId]) return; // вже ініціалізовано (напр. повторний render())
  if(typeof L==='undefined'){ container.textContent='Leaflet не завантажився (немає інтернету при першому запуску)'; return; }
  if(!HybridTileLayer){ container.textContent='Карта тимчасово недоступна (не вдалось ініціалізувати тайл-шар)'; return; }
  const startLat = _lastLat!=null ? _lastLat : 50.4501, startLon = _lastLon!=null ? _lastLon : 30.5234; // фолбек — Київ, якщо GPS ще не встиг спрацювати
  container.style.width='100%';container.style.height='100%'; // тимчасово, sizeRotatedMapContainer нижче виставить реальний квадрат
  const map = L.map(container, {
    zoomControl:false, attributionControl:false, doubleClickZoom:false,
    zoom: MapCfg.std, center:[startLat,startLon]
  });
  L.DomEvent.disableScrollPropagation(viewport); // щоб жест на карті не скролив саму сторінку в Bluefy
  new HybridTileLayer({maxZoom:19, minZoom:2}).addTo(map);
  const marker = L.circleMarker([startLat,startLon], {radius:7,color:'#fff',weight:2,fillColor:'#37e0e6',fillOpacity:0.95}).addTo(map);

  const st = { map, marker, badge, wrapEl:container, viewportEl:viewport, heading:null, lastDblTap:0, zoomedIn:false, routeLine:null };
  mapInstances[tileId] = st;
  sizeRotatedMapContainer(st); // ставить реальні width/height квадрата + transform
  applyMapTheme(st);

  // ── Розумний double-tap zoom (toggle, як у "Фото" на iOS) ──
  // Стандартний Leaflet dblclick-зум вимкнено (doubleClickZoom:false) —
  // на тач-пристроях 'dblclick' часто взагалі не спрацьовує надійно, тому
  // ловимо подвійний тап вручну через час між 'click'-подіями.
  map.on('click', ()=>{
    const now=Date.now();
    if(now - st.lastDblTap < 300){
      st.zoomedIn = !st.zoomedIn;
      const targetZoom = st.zoomedIn ? MapCfg.detail : MapCfg.std;
      map.flyTo(marker.getLatLng(), targetZoom, {animate:true, duration:0.4});
      st.lastDblTap = 0;
    } else {
      st.lastDblTap = now;
    }
  });

  applyMapRoute(st); // якщо маршрут вже був імпортований раніше — намалювати одразу
  refreshMapBadges();
}

// ── Формула "точка попереду" (прямий геодезичний розрахунок, а не піксельний
// panBy) — рахуємо реальну точку на distMeters метрів вперед по курсу від
// поточної позиції, і саме ЇЇ ставимо в центр карти. Маркер лишається на
// СПРАВЖНІХ координатах — тому він автоматично опиняється ближче до низу
// екрана (позаду від центру-вперед), точно як синя стрілка в Google Maps.
// Це набагато надійніше за піксельний panBy() у поєднанні з CSS-обертанням:
// не треба узгоджувати знаки/тригонометрію повороту з піксельним зсувом. ──
function destPoint(lat,lon,bearingDeg,distMeters){
  const R=6371000, brng=bearingDeg*Math.PI/180;
  const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(distMeters/R)+Math.cos(lat1)*Math.sin(distMeters/R)*Math.cos(brng));
  const lon2=lon1+Math.atan2(Math.sin(brng)*Math.sin(distMeters/R)*Math.cos(lat1), Math.cos(distMeters/R)-Math.sin(lat1)*Math.sin(lat2));
  return [lat2*180/Math.PI, lon2*180/Math.PI];
}

// Викликається одразу після кожного нового пакета координат (гачок у
// startGPS()/watchPosition, розділ вище). heading — pos.coords.heading
// (компасний курс руху, у градусах від півночі за годинниковою стрілкою;
// null/NaN, якщо пристрій стоїть на місці — GPS тоді курс не визначає).
function updateAllMapTiles(lat, lon, heading){
  Object.keys(mapInstances).forEach(id=>{
    const st = mapInstances[id];
    if(!st) return;
    st.marker.setLatLng([lat,lon]);
    setMapHeading(st, heading); // обертає карту так, щоб курс завжди дивився вгору; якщо курс невідомий — лишає попередній поворот
    const h = st.viewportEl ? st.viewportEl.clientHeight : 0;
    if(h){
      const zoom = st.map.getZoom();
      // Метрів на піксель у Web Mercator на цій широті/зумі (стандартна формула).
      const metersPerPixel = 156543.03392 * Math.cos(lat*Math.PI/180) / Math.pow(2, zoom);
      const aheadMeters = h * 0.30 * metersPerPixel; // 30% висоти видимої плитки — та сама пропорція, що просив користувач раніше
      const bearing = (st.heading!=null) ? st.heading : 0;
      const center = destPoint(lat, lon, bearing, aheadMeters);
      st.map.setView(center, zoom, {animate:false});
    } else {
      st.map.panTo([lat,lon], {animate:false});
    }
  });
}

// ── Імпорт маршруту (GPX/GeoJSON) — та сама ідея, що й лінія треку в
// TripViewer.html: яскрава полілінія поверх карти. ──
function parseGpxToLatLngs(text){
  const xml=new DOMParser().parseFromString(text,'application/xml');
  return Array.from(xml.querySelectorAll('trkpt')).map(pt=>[
    parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))
  ]).filter(p=>!isNaN(p[0])&&!isNaN(p[1]));
}
function parseGeoJsonToLatLngs(text){
  const gj=JSON.parse(text);
  const coordsList=[];
  const grab=g=>{
    if(!g) return;
    if(g.type==='LineString') coordsList.push(g.coordinates);
    else if(g.type==='MultiLineString') g.coordinates.forEach(c=>coordsList.push(c));
    else if(g.type==='Feature') grab(g.geometry);
    else if(g.type==='FeatureCollection') g.features.forEach(f=>grab(f.geometry));
  };
  grab(gj);
  // GeoJSON зберігає [lon,lat] — Leaflet хоче [lat,lon]
  return coordsList.flat().map(c=>[c[1],c[0]]);
}
let mapRouteLatLngs=null;
function applyMapRoute(st){
  if(!mapRouteLatLngs || !mapRouteLatLngs.length) return;
  if(st.routeLine) st.map.removeLayer(st.routeLine);
  st.routeLine=L.polyline(mapRouteLatLngs,{color:'#37e0e6',weight:4,opacity:0.9}).addTo(st.map);
}
function applyRouteToAllMaps(){ Object.values(mapInstances).forEach(applyMapRoute); }
async function loadSavedRouteIfAny(){
  try{
    const rec=await idbGet('routeFile');
    if(rec && rec.text){
      mapRouteLatLngs = rec.kind==='gpx' ? parseGpxToLatLngs(rec.text) : parseGeoJsonToLatLngs(rec.text);
    }
  }catch(e){ console.error('Не вдалось відновити збережений маршрут:',e); }
}

// ── Робить із внутрішньої (IndexedDB) офлайн-карти СПРАВЖНІЙ файл, який
// iOS дає зберегти куди завгодно (Файли/iCloud Drive/будь-яка папка) —
// саме цього просив користувач: "щоб офлайн карта була у моїй папці". ──
function exportMbtiles(){
  if(!mbSqlDb){ sht('Немає офлайн-карти для експорту'); return; }
  try{
    const bytes=mbSqlDb.export(); // Uint8Array усього SQLite-файлу
    const blob=new Blob([bytes], {type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=mbFileName||'offline-map.mbtiles';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
    sht('Експортовано: '+(mbFileName||'offline-map.mbtiles')+' — обери "Зберегти у Файли" в діалозі');
  }catch(e){ sht('Помилка експорту: '+e.message); }
}

/* ── АДАПТИВНИЙ ВІДЕО-ПОТОК (ШВИДКІСТЬ + ТЕМПЕРАТУРА) ── */
const pipCanvas = document.getElementById('pip-canvas');
const pctx = pipCanvas.getContext('2d');
const pipVideo = document.getElementById('pip-video');
let pipDrawInterval=null;
let pipInitialized=false;

// Малює заокруглений прямокутник (ручний path — надійніше за ctx.roundRect
// на старих версіях Safari/Bluefy, де підтримка нативного методу непевна).
// Ті самі кольори станів, що й у CSS (.tile.cold/.warn/.alrt) — щоб відео-плитка
// візуально співпадала зі звичайними тайлами при спрацюванні порогів.
const STATE_COLORS = {
  cold: {c:'#3b82f6', bg:'rgba(59,130,246,0.90)'},
  warn: {c:'#ffd33f', bg:'rgba(255,211,63,0.90)'},
  alrt: {c:'#ff4d4d', bg:'rgba(255,77,77,0.90)'},
};
applyTileSat(); // підхоплює збережені (або дефолтні 90%) значення насиченості одразу при завантаженні
// Пульсація ЛИШЕ на alrt (критично): 50%→100% від базової альфи (0.90) —
// так само 90%↔50%, як і в CSS-версії .tile.alrt. cold/warn статичні на 90%,
// без мерехтіння — так само, як у CSS.
function pulseAlpha(){
  return 0.75 + 0.25*Math.sin(Date.now()/175);
}

function drawTileLikeColumn(cx, W, H, label, baseColor, value, state, isPip){
  const sc = STATE_COLORS[state];
  const color = sc ? sc.c : baseColor;

  if(isPip){
    // РЕЖИМ РЕАЛЬНОГО PiP: без підпису й лінії — тільки максимально велика
    // цифра по центру. Базовий розмір ~78% висоти канвасу (в межах
    // запрошеного діапазону 75-80%), АЛЕ якщо значення трьохзначне (чи
    // взагалі довше, ніж влазить по ширині колонки) — шрифт автоматично
    // зменшується, щоб цифри не наїжджали одна на одну й не вилазили за
    // межі своєї половини (той самий "кашею" баг з 2-3-значними числами,
    // напр. T_Eng=100° чи GPS=100 км/год).
    const str = String(value);
    const maxWidth = W * 0.90; // невеликий відступ від країв колонки
    let valueFont = Math.floor(H*0.75);
    pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
    let textWidth = pctx.measureText(str).width;
    if(textWidth > maxWidth){
      valueFont = Math.floor(valueFont * (maxWidth / textWidth));
      pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
    }
    pctx.fillStyle = '#fff';
    pctx.textBaseline = 'middle';
    pctx.textAlign = 'center';
    pctx.fillText(str, cx, H*0.54);
    return;
  }

  // ЗВИЧАЙНИЙ ВИГЛЯД (плитка на сторінці поза PiP) — підпис + лінія + цифра,
  // як і раніше.
  const labelFont = Math.max(9, Math.floor(H*0.075));
  const valueFont = Math.floor(H*0.32);
  const labelY = H*0.30;
  const underlineY = H*0.40;
  const valueY = H*0.68;

  // Назва тайла синім по синьому фону (cold) зливалась і ставала нечитабельною —
  // так само, як і в CSS-версії (.tile.cold .tl), тут для стану cold підпис
  // малюємо чорним замість кольору стану. warn/alrt лишаються без змін.
  const labelColor = (state==='cold') ? '#000' : color;
  pctx.fillStyle = labelColor;
  pctx.font = `700 ${labelFont}px 'Rajdhani','Segoe UI',sans-serif`;
  pctx.textBaseline = 'middle';
  const spacing = 2;
  const chars = String(label).split('');
  let totalW = 0;
  chars.forEach(c=>{ totalW += pctx.measureText(c).width + spacing; });
  totalW -= spacing;
  let x = cx - totalW/2;
  pctx.textAlign = 'left';
  chars.forEach(c=>{
    const w = pctx.measureText(c).width;
    pctx.fillText(c, x, labelY);
    x += w + spacing;
  });

  // Риска під підписом теж зливалась із синім фоном у cold — та ж логіка,
  // що й для підпису вище: в cold малюємо її чорною.
  pctx.strokeStyle = (state==='cold') ? '#000' : color;
  pctx.globalAlpha = 0.45;
  pctx.lineWidth = 1;
  pctx.beginPath();
  pctx.moveTo(cx - W*0.09, underlineY);
  pctx.lineTo(cx + W*0.09, underlineY);
  pctx.stroke();
  pctx.globalAlpha = 1;

  pctx.fillStyle = '#fff';
  pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
  pctx.textAlign = 'center';
  pctx.fillText(String(value), cx, valueY);
}

// Той самий значок радара камер, що й у звичайній GPS-плитці (DOM/CSS), але
// намальований напряму на canvas — інший спосіб рендерингу, тому й код
// окремий. Малюємо лише у верхньому правому кутку GPS-половини кадру.
function drawCamRadarBadge(x0, w, H){
  if(!_nearestCam) return;
  const spd=parseFloat(V.GPS);
  const excess=!isNaN(spd) ? spd-_nearestCam.limit : 0;
  let signFill='#ffffff', signBorder='#ff4d4d';
  if(excess>9){ signFill='#ff4d4d'; signBorder='#ff4d4d'; }
  else if(excess>0){ signFill='#ffb74d'; signBorder='#ffb74d'; }

  const r=Math.max(9, Math.min(14, H*0.11));
  const cx=x0+w-r-10, cy=r+8;

  pctx.beginPath();
  pctx.arc(cx, cy, r, 0, Math.PI*2);
  pctx.fillStyle=signFill;
  pctx.fill();
  pctx.lineWidth=2;
  pctx.strokeStyle=signBorder;
  pctx.stroke();

  pctx.fillStyle='#000';
  pctx.font=`800 ${Math.round(r*0.85)}px 'JetBrains Mono','Courier New',monospace`;
  pctx.textAlign='center';
  pctx.textBaseline='middle';
  pctx.fillText(String(_nearestCam.limit), cx, cy+1);

  if(_camDist!=null){
    pctx.fillStyle = _camDist<=100 ? '#ff4d4d' : '#ffffff';
    pctx.font=`700 ${Math.round(r*0.75)}px 'JetBrains Mono','Courier New',monospace`;
    pctx.textAlign='right';
    pctx.fillText(_camDist+'м', cx-r-6, cy);
  }
}

function drawPipFrame(){
  if(!pctx)return;

  const rect = pipVideo.getBoundingClientRect();
  const W = rect.width || 400;
  const H = rect.height || 200;

  if(pipCanvas.width !== W || pipCanvas.height !== H) {
    pipCanvas.width = W;
    pipCanvas.height = H;
  }

  // Базовий фон — та сама панель, що й у звичайного тайла. Зовнішню рамку/
  // заокруглення дає сам контейнер .video-tile (border-radius+overflow:hidden),
  // тут малюємо лише вміст усередині — жодних власних зовнішніх рамок,
  // інакше виходить "подвійний контур" по кутах.
  pctx.fillStyle='#0d0d0f';
  pctx.fillRect(0,0,W,H);

  const gap = 3;               // тонкий прямий проміжок по центру, на всю висоту
  const cardW = (W - gap) / 2;

  const tEngState = videoAlertState.T_Eng;
  const gpsState  = videoAlertState.GPS;

  // Тінт стану (cold/warn/alrt) — заливка прямокутником, без рамок/заокруглень,
  // рівно в межах своєї половини (від верху до низу).
  [[0,           cardW, tEngState],
   [cardW+gap,   cardW, gpsState ]].forEach(([x0,w,state])=>{
    const sc = STATE_COLORS[state];
    if(!sc) return;
    pctx.globalAlpha = state==='alrt' ? pulseAlpha() : 1;
    pctx.fillStyle = sc.bg;
    pctx.fillRect(x0, 0, w, H);
    pctx.globalAlpha = 1;
  });

  // Проміжок по центру — прямий, на всю висоту (від самого верху до самого низу),
  // без заокруглень з боків (тільки центральна лінія розділення).
  pctx.fillStyle='#000000';
  pctx.fillRect(cardW, 0, gap, H);

  let speed=String(V.GPS);
  if(speed==='--' || speed==='undefined') speed='0';
  let temp=String(V.T_Eng);
  if(temp==='undefined') temp='--';

  // Реальний PiP визначаємо через клас .pip-active, який підтримує
  // syncPipActiveClass() — вона вже й так надійно фіксить випадок, коли
  // webkitPresentationMode "зависає" на iOS і не скидається після закриття
  // системного PiP-вікна. Пряма перевірка тут окремо від класу якраз і
  // призводила до застряглих великих цифр без підписів після виходу з PiP.
  const dashTileEl = document.getElementById('dash-video-tile');
  const isPip = !!(dashTileEl && dashTileEl.classList.contains('pip-active'));

  drawTileLikeColumn(cardW/2, cardW, H, 'T_ENG', '#3b82f6', temp, tEngState, isPip);
  drawTileLikeColumn(cardW + gap + cardW/2, cardW, H, 'GPS', '#37e0e6', speed, gpsState, isPip);
  drawCamRadarBadge(cardW+gap, cardW, H);
}

// Таймер у Web Worker — на відміну від звичайного setInterval на сторінці,
// НЕ гальмується і НЕ призупиняється iOS Safari, коли вкладка йде у фон
// (а саме це відбувається під час активного PiP — сторінка вважається "прихованою").
let _pipWorker=null;
function startPipWorkerTimer(){
  if(_pipWorker)return;
  const workerCode=`setInterval(()=>postMessage(1),1000);`;
  const blob=new Blob([workerCode],{type:'application/javascript'});
  _pipWorker=new Worker(URL.createObjectURL(blob));
  _pipWorker.onmessage=()=>drawPipFrame();
}

let pipStream = null; // MediaStream, що живить pipVideo (канвас-відео для PiP)
function initPipStream(){
  if(pipInitialized)return;
  
  // Перевіряємо підтримку API перед запуском потоку
  const isPipSupported = ('requestPictureInPicture' in document.createElement('video')) || (pipVideo.webkitSetPresentationMode);
  if (!isPipSupported) {
    document.getElementById('pipBtnTop').style.color = '#ff4d4d';
    return;
  }

  pipInitialized=true;
  drawPipFrame();
  pipStream = pipCanvas.captureStream(30);
  pipVideo.srcObject = pipStream;
  
  pipVideo.muted = true;
  pipVideo.play().catch(()=>{});
  
  try{ startPipWorkerTimer(); }
  catch(e){
    // Fallback, якщо Worker з якоїсь причини недоступний
    if(pipDrawInterval) clearInterval(pipDrawInterval);
    pipDrawInterval = setInterval(drawPipFrame, 1000);
  }
}

/* ── КЛЮЧОВИЙ ОБХІД БЛОКУВАННЯ (З КЛИКУ КОРИСТУВАЧА) ── */
// Надійна синхронізація класу pip-active з РЕАЛЬНИМ станом PiP —
// не покладаємось лише на подію leavepictureinpicture/webkitpresentationmodechanged,
// бо на деяких пристроях (iOS Bluefy) вона може не спрацювати, і клас "застрягає"
// увімкненим назавжди, роблячи відео тонким навіть поза PiP.
// ── ЗУПИНКА "ВІЧНОГО" PiP-ТАЙМЕРА, КОЛИ РЕАЛЬНИЙ PiP НЕ АКТИВНИЙ ──
// _pipWorker навмисно ігнорує троттлінг iOS у фоні (щоб системне PiP-вікно
// оновлювалось, поки застосунок згорнутий) — але БЕЗ цієї зупинки він ніде
// не вимикався і будив сторінку щосекунди НАЗАВЖДИ, навіть довго після
// того, як реальний PiP уже закрито (наприклад, просто згорнув застосунок
// в кишені на весь час походу в магазин). Саме це найімовірніша причина
// "мертвого" зависання після довгого часу у фоні: iOS вбиває/призупиняє
// процес WebView через надмірну активність у фоні, і після цього НІЯКА
// кнопка сторінки вже не реагує (весь JS-контекст мертвий) — рятує лише
// повне перезавантаження сторінки ззовні (це і робить кнопка "Скинути",
// але вона сама теж потребує живого JS, щоб спрацювати).
function stopPipWorkerTimer(){
  if(_pipWorker){ try{ _pipWorker.terminate(); }catch(e){} _pipWorker=null; }
  if(pipDrawInterval){ clearInterval(pipDrawInterval); pipDrawInterval=null; }
}
function syncPipActiveClass(){
  const dashTile = document.getElementById('dash-video-tile');
  if(!dashTile) return;
  let inPip = (document.pictureInPictureElement === pipVideo) ||
              (pipVideo.webkitPresentationMode === 'picture-in-picture');

  // ДОДАТКОВИЙ НАДІЙНИЙ СИГНАЛ: властивість webkitPresentationMode на iOS
  // іноді "зависає" на 'picture-in-picture' назавжди навіть після того, як
  // юзер закрив системне PiP-вікно хрестиком (а не кнопкою "розгорнути").
  // Але при закритті хрестиком відео практично завжди реально ставиться
  // на паузу — це і використовуємо як контрольний сигнал: якщо формально
  // "в PiP", а відео насправді paused — це і є той застряглий стан,
  // примусово скидаємо його і відновлюємо відтворення для наступних кадрів.
  if(inPip && pipVideo.paused){
    inPip = false;
    pipVideo.play().catch(()=>{});
  }

  dashTile.classList.toggle('pip-active', !!inPip);
  if(!inPip) stopPipWorkerTimer();
  if(typeof drawPipFrame === 'function') drawPipFrame();
}
document.addEventListener('visibilitychange', ()=>{
  syncPipActiveClass();
  // На iOS властивість webkitPresentationMode іноді оновлюється з невеликою
  // затримкою після самої події — повторна перевірка ловить це надійніше.
  setTimeout(syncPipActiveClass, 300);
});
setInterval(syncPipActiveClass, 1000);

async function togglePipMode(){
  syncPipActiveClass();
  // Примусовий старт/ініціалізація в момент кліку
  initPipStream();
  drawPipFrame();

  const dashTile = document.getElementById('dash-video-tile');

  try {
    pipVideo.muted = true;

    const currentlyInPip = (document.pictureInPictureElement === pipVideo) ||
                            (pipVideo.webkitPresentationMode === 'picture-in-picture');
    if (currentlyInPip) {
      if(document.pictureInPictureElement){
        try{ await document.exitPictureInPicture(); }catch(e){}
      }
      if(pipVideo.webkitSetPresentationMode){
        try{ pipVideo.webkitSetPresentationMode('inline'); }catch(e){}
      }
      dashTile.classList.remove('pip-active');
      drawPipFrame(); // одразу повернути звичайний вигляд (підписи), не чекаючи воркер
      sht('PiP закрито');
      return;
    }

    dashTile.classList.add('pip-active');
    await new Promise(r=>requestAnimationFrame(r));
    drawPipFrame();

    await pipVideo.play(); // Робимо відео активним перед викликом режиму

    if (pipVideo.webkitSetPresentationMode) {
      // Обхід блокування Safari (iOS)
      pipVideo.webkitSetPresentationMode("picture-in-picture");
      drawPipFrame(); // миттєво прибрати підписи й збільшити цифри, не чекаючи воркер
      sht('PiP активовано (iOS)');
    } else if (document.pictureInPictureEnabled || 'requestPictureInPicture' in pipVideo) {
      // Обхід Android / Desktop Chrome
      await pipVideo.requestPictureInPicture();
      drawPipFrame();
      sht('PiP активовано');
    } else {
      dashTile.classList.remove('pip-active');
      alert('Ваш пристрій не підтримує PiP');
    }
  } catch(e) {
    dashTile.classList.remove('pip-active');
    sht('Помилка: ' + e.message);
    console.error(e);
  }
}
pipVideo.addEventListener('leavepictureinpicture', ()=>{ syncPipActiveClass(); drawPipFrame(); });
pipVideo.addEventListener('webkitpresentationmodechanged', ()=>{
  syncPipActiveClass();
  drawPipFrame();
  setTimeout(()=>{ syncPipActiveClass(); drawPipFrame(); }, 300);
});
// Розмір відео змінюється, коли реально повертаємось з PiP в звичайний режим —
// додатковий сигнал про всяк випадок, якщо основні події/властивість запізнюються.
pipVideo.addEventListener('resize', ()=>setTimeout(()=>{ syncPipActiveClass(); drawPipFrame(); }, 150));

// Захист від неочікуваної паузи ПОЗА станом PiP — деякі середовища перегляду
// (не тільки реальний iOS Safari/Bluefy, а й будь-який інший WebView з іншими
// політиками автовідтворення) можуть самі ставити відео на паузу без нашої
// команди. Якщо ми НЕ вважаємо, що зараз активний реальний PiP — це точно
// небажана пауза, відновлюємо одразу. Якщо ж pip-active активний — НІЧОГО
// тут не робимо: даємо спрацювати перевірці в syncPipActiveClass() (кожну
// секунду), яка саме через "paused" визначає застряглий вихід з PiP.
pipVideo.addEventListener('pause', ()=>{
  const dashTile = document.getElementById('dash-video-tile');
  const believedInPip = !!(dashTile && dashTile.classList.contains('pip-active'));
  if(!believedInPip){
    setTimeout(()=>{ pipVideo.play().catch(()=>{}); }, 50);
  }
});

// Подія для кнопки PiP у топбарі та кліку по відео-плитці
document.getElementById('pipBtnTop').addEventListener('click', togglePipMode);
document.getElementById('dash-video-tile').addEventListener('click', togglePipMode);

/* ── АВТОМАТИЧНА АКТИВАЦІЯ PiP ПРИ ПЕРЕХОДІ У ФОН (як у YouTube) ──
   YouTube не використовує свайп — PiP активується автоматично, коли
   сторінка стає невидимою (перехід на інший додаток, на робочий стіл,
   блокування екрана). Safari дозволяє викликати webkitSetPresentationMode
   ('picture-in-picture') саме в обробнику visibilitychange без свіжого
   жесту користувача — це офіційно підтримуваний шлях для відео, тим самим
   способом користується сам YouTube. */
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && bConn && !editMode){
    const dashTile = document.getElementById('dash-video-tile');
    const alreadyInPip = !!(dashTile && dashTile.classList.contains('pip-active'));
    if(!alreadyInPip) togglePipMode();
  }
});

/* ── ЕКСПОРТ / ІМПОРТ НАЛАШТУВАНЬ ── */
// Зберігає розташування тайлів, які параметри в них виводяться, та всі пороги сигналів
// (температура, вольтаж, ліміт швидкості) і калібрування TPS в один текстовий блок.
function exportSettings(){
  const dump={workspaces:workspaces, activeWs:activeWsId, al:AL, tpscal:TC, v:2};
  const text=JSON.stringify(dump);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      sht('Скопійовано в буфер обміну! Встав кудись, щоб зберегти.');
    }).catch(()=>{
      prompt('Скопіюй цей текст (Ctrl/Cmd+C) і збережи його:', text);
    });
  } else {
    prompt('Скопіюй цей текст (Ctrl/Cmd+C) і збережи його:', text);
  }
}

function importSettings(){
  const text=prompt('Встав сюди раніше скопійований текст налаштувань:');
  if(!text)return;
  try{
    const dump=JSON.parse(text);
    if(!dump || typeof dump!=='object') throw new Error('bad format');
    if(Array.isArray(dump.workspaces) && dump.workspaces.length){
      workspaces=dump.workspaces;
      activeWsId=(dump.activeWs && workspaces.find(w=>w.id===dump.activeWs))?dump.activeWs:workspaces[0].id;
      ls('workspaces',workspaces);ls('activeWs',activeWsId);
      lay=activeWs().lay;
    } else if(Array.isArray(dump.lay)){
      // старий формат бекапу (один стіл) — кладемо в активний стіл
      lay=dump.lay;saveLay();
    }

    if(dump.al){ AL={...DA,...dump.al}; ls('al',AL); }
    if(dump.tpscal){ TC={...{min:0,max:170},...dump.tpscal}; ls('tpscal',TC); }
    sht('Налаштування імпортовано, перезавантажую…');
    setTimeout(()=>location.reload(),800);
  }catch(e){
    sht('Помилка: не вдалося розпізнати текст налаштувань');
  }
}

/* ── НАСИЧЕНІСТЬ ПЛИТОК ПОПЕРЕДЖЕННЯ (Налаштування → ВИГЛЯД) ──
   Керує альфа-каналом фону плиток у станах cold/warn/alrt. Значення (%)
   лежать в AL.Tile_sat_* (0-100), CSS отримує їх через custom properties
   --sat-cold/--sat-warn/--sat-alrt (0-1), а STATE_COLORS[x].bg (canvas-
   рендер відео/PiP-тайла, розділ 14.1) перераховується тим самим числом,
   щоб два незалежні шляхи рендеру (DOM CSS і canvas) завжди співпадали. */
function applyTileSat(){
  const root=document.documentElement.style;
  root.setProperty('--sat-cold', (AL.Tile_sat_cold/100));
  root.setProperty('--sat-warn', (AL.Tile_sat_warn/100));
  root.setProperty('--sat-alrt', (AL.Tile_sat_alrt/100));
  if(typeof STATE_COLORS!=='undefined'){
    STATE_COLORS.cold.bg='rgba(59,130,246,'+(AL.Tile_sat_cold/100)+')';
    STATE_COLORS.warn.bg='rgba(255,211,63,'+(AL.Tile_sat_warn/100)+')';
    STATE_COLORS.alrt.bg='rgba(255,77,77,'+(AL.Tile_sat_alrt/100)+')';
  }
}
// Живий перегляд під час руху слайдера — ще НЕ зберігає в localStorage,
// тільки оновлює те, що зараз намальовано на екрані (AL в пам'яті теж
// оновлюємо, щоб applyTileSat() підхопив нове число одразу).
function previewSat(state,val){
  if(state==='cold')AL.Tile_sat_cold=parseFloat(val);
  else if(state==='warn')AL.Tile_sat_warn=parseFloat(val);
  else if(state==='alrt')AL.Tile_sat_alrt=parseFloat(val);
  applyTileSat();
}
function svSat(){
  AL.Tile_sat_cold=parseFloat(document.getElementById('ai_sc').value)||90;
  AL.Tile_sat_warn=parseFloat(document.getElementById('ai_sw').value)||90;
  AL.Tile_sat_alrt=parseFloat(document.getElementById('ai_sa').value)||90;
  applyTileSat();
  ls('al',AL);sht('Вигляд плиток збережено');
}
function rstSat(){
  AL.Tile_sat_cold=90;AL.Tile_sat_warn=90;AL.Tile_sat_alrt=90;
  applyTileSat();bmain();
}

function startTpsCal(){
  document.getElementById('em').classList.remove('sh');
  const modal=document.getElementById('pm');
  document.getElementById('pt').textContent='Калібрування TPS';
  const pb=document.getElementById('pb');
  pb.innerHTML=`
    <div style="text-align:center;padding:10px;font-size:14px;">
      <p>Відпустіть ручку газу повністю.</p>
      <div style="font-size:24px;font-family:monospace;margin:10px 0;" id="tps_raw_val">Raw: --</div>
      <button class="ab pr" id="btn_tps_min">Зафіксувати Нуль (0%)</button>
      <p style="margin-top:20px;">Затисніть газ на повну (100%).</p>
      <button class="ab dn" id="btn_tps_max" disabled>Зафіксувати Максимум (100%)</button>
    </div>
  `;
  modal.classList.add('sh');
  
  if(_tpsLiveTimer) clearInterval(_tpsLiveTimer);
  _tpsLiveTimer=setInterval(()=>{
    document.getElementById('tps_raw_val').textContent='Raw: '+(_tpsRawLast!==null?_tpsRawLast:'--');
  },300);

  document.getElementById('btn_tps_min').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMin=_tpsRawLast;
    sht('Нуль зафіксовано: '+tmpMin);
    document.getElementById('btn_tps_max').disabled=false;
  };
  let tmpMin=null,tmpMax=null;
  document.getElementById('btn_tps_max').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMax=_tpsRawLast;
    if(tmpMax<=tmpMin){alert('Помилка: Максимум має бути більшим за Нуль');return;}
    TC={min:tmpMin,max:tmpMax};
    ls('tpscal',TC);
    sht('Калібрування завершено успішно!');
    if(_tpsLiveTimer) { clearInterval(_tpsLiveTimer); _tpsLiveTimer = null; }
    modal.classList.remove('sh');
  };
}

function cpk(){
  const m=document.getElementById('pm');
  const pb=document.getElementById('pb');
  pb.innerHTML='';
  
  if(editMode && ptile){
    document.getElementById('pt').textContent='Налаштувати плитку';
    const g=document.createElement('div');g.className='gt';g.textContent='Параметр';pb.appendChild(g);
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi'+(ptile.k===k?' sel':'');
      item.innerHTML=`<div class="pn2">${P[k].n}<span class="pc">${P[k].u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{selp(k);});pl.appendChild(item);
    });
    pb.appendChild(pl);
    
    const stg=document.createElement('div');stg.className='gt';stg.textContent='Стиль';pb.appendChild(stg);
    const sr=document.createElement('div');sr.className='sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+(((ptile&&ptile.st)||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });pb.appendChild(sr);
    
    const szg=document.createElement('div');szg.className='gt';szg.textContent='Розмір';pb.appendChild(szg);
    const szr=document.createElement('div');szr.className='szr';
    [['s1','Міні'],['s21','1×1'],['s41','2×1'],['s22','2×2'],['s23','2×3']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+(((ptile&&ptile.sz)||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });pb.appendChild(szr);
    
    const db=document.createElement('button');db.className='ab dn';db.textContent='🗑 Видалити';
    db.addEventListener('click',()=>{
      if(ptile.k==='MapTile' && mapInstances[ptile.id]){
        try{ mapInstances[ptile.id].map.remove(); }catch(err){}
        delete mapInstances[ptile.id];
      }
      lay=lay.filter(t=>t.id!==ptile.id);saveLay();m.classList.remove('sh');render();
    });
    pb.appendChild(db);
    m.classList.add('sh');
  } else if(editMode && !ptile){
    document.getElementById('pt').textContent='Додати нову плитку';
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi';
      item.innerHTML=`<div class="pn2">${P[k].n}</div>`;
      item.addEventListener('click',()=>{
        nid++;const nt={id:'t'+nid,k:k,st:'flat',sz:(k==='MapTile'?'s22':'s1')};
        lay.push(nt);saveLay();m.classList.remove('sh');render();
      });pl.appendChild(item);
    });
    pb.appendChild(pl);m.classList.add('sh');
  }
}

function selp(k){if(ptile){ptile.k=k;saveLay();render();cpk();}}
function selst(st){if(ptile){ptile.st=st;saveLay();render();cpk();}}
function selsz(sz){if(ptile){ptile.sz=sz;saveLay();render();cpk();}}

let htt=null;
function sht(txt){
  const el=document.getElementById('ht');el.textContent=txt;el.className='ht sh';
  clearTimeout(htt);htt=setTimeout(()=>el.className='ht',2000);
}

document.getElementById('eb').addEventListener('click',()=>{

// ── ЗАПАСНИЙ РЕНДЕР ──
// Якщо щось РАНІШЕ в цьому скрипті кинуло помилку (будь-де вище) — усе, що
// йде textually ПІСЛЯ цього місця, просто не виконується (один-єдиний
// необроблений виняток зупиняє решту top-level коду в тому ж скрипті). Це
// означає, що сітка (render() вище) могла НІКОЛИ не намалюватись, хоча
// статичний HTML (топбар) при цьому показується нормально — саме симптом
// "чорний екран, кнопки на місці". Ця страховка гарантовано перемальовує
// сітку ще раз після повного завантаження документа, незалежно від того,
// що сталось раніше.
window.addEventListener('DOMContentLoaded', ()=>{
  try{
    if(!document.getElementById('gi').children.length){
      console.warn('Сітка порожня після основного запуску — запасний рендер');
      render();
    }
  }catch(e){ console.error('Запасний render() теж впав:',e); }
});
</script>
