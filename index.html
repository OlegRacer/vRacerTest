<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash</title>
<style>
:root{
  --bg:#000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
  --text:#f2f2f0;--muted:#666;
  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000;color:var(--text);
  font-family:'Rajdhani','Segoe UI',sans-serif;
  overflow:hidden;-webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) 8px 5px;
  background:rgba(0,0,0,0.95);border-bottom:1px solid var(--line);}
.pill{border:1px solid var(--line);border-radius:6px;padding:5px 9px;
  font-size:12px;color:var(--muted);background:transparent;white-space:nowrap;cursor:pointer;}
.pill.on{color:#9be8ff;border-color:#2b6f7a;}
.pill.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);}
.pill.err{color:#ff8080;border-color:rgba(255,77,77,0.3);}
.pill.go{color:var(--amber);border-color:rgba(255,183,77,0.3);}
.pill.sim{color:#c084fc;border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.06);}
#eb{margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
  padding:5px 11px;font-size:12px;color:var(--muted);background:transparent;cursor:pointer;}
#eb.a{color:#000;background:var(--cyan);border-color:var(--cyan);font-weight:700;}
@media(orientation:landscape){
  :root{--th:36px;}
  .pill{font-size:11px;padding:3px 7px;}
  #eb{font-size:11px;padding:3px 9px;}
}

/* GRID */
#grid{position:fixed;inset:0;
  padding-top:calc(env(safe-area-inset-top) + var(--th));
  padding-bottom:env(safe-area-inset-bottom,6px);overflow:hidden;}
#gi{display:grid;gap:5px;padding:5px;height:100%;
  grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);}
@media(orientation:landscape){
  #gi{grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(3,1fr);}
}

/* TILES */
.tile{position:relative;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;overflow:hidden;-webkit-touch-callout:none;will-change:auto;
  transition:background .4s,border-color .4s;}
.tile.s1{grid-column:span 1;grid-row:span 1;}
.tile.s22{grid-column:span 2;grid-row:span 2;}
.tile.s21{grid-column:span 2;grid-row:span 1;}
@media(orientation:landscape){
  .tile.s1{grid-column:span 2;grid-row:span 1;}
}
/* alert states */
.tile.cold{background:rgba(59,130,246,0.08)!important;border-color:rgba(59,130,246,0.4)!important;}
.tile.warn{background:rgba(255,211,63,0.07)!important;border-color:rgba(255,211,63,0.45)!important;}
.tile.alrt{background:rgba(255,77,77,0.10)!important;border-color:rgba(255,77,77,0.55)!important;
  animation:palrt 1.1s ease-in-out infinite;}
@keyframes palrt{0%,100%{border-color:rgba(255,77,77,0.55);}50%{border-color:rgba(255,77,77,1);}}
.tile.ed{animation:jig .4s ease-in-out infinite;}
.tile.alrt.ed{animation:jig .4s;}
@keyframes jig{0%,100%{transform:rotate(0)}25%{transform:rotate(-.7deg)}75%{transform:rotate(.7deg)}}
.tile.ds{animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 16px rgba(55,224,230,0.25)!important;transform:scale(1.03);z-index:20;}
.tile.dov{box-shadow:inset 0 0 0 2px var(--amber);}
.rm{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:#ff4d4d;color:#fff;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  z-index:5;display:none;}
.tile.ed .rm{display:flex;}
.add{border-style:dashed;border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.01);color:var(--muted);font-size:26px;
  cursor:pointer;animation:none!important;}

/* TILE CONTENT */
.tl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pc,var(--muted));margin-bottom:1px;text-align:center;
  white-space:normal;word-break:break-word;line-height:1.2;font-weight:700;}
.tv{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
  line-height:1;color:#fff;letter-spacing:1px;font-size:clamp(20px,6vw,36px);}
.tu{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.tun{width:50%;height:1px;background:var(--pc,var(--cyan));opacity:0.45;margin:3px 0;}
.s22 .tv{font-size:clamp(32px,8vw,56px);}
.s21 .tv{font-size:clamp(22px,6vw,40px);}
@media(orientation:landscape){
  .tl{font-size:11px;}
  .tv{font-size:clamp(18px,4.5vw,32px);}
  .s22 .tv{font-size:clamp(26px,6vw,44px);}
  .s21 .tv{font-size:clamp(20px,5vw,36px);}
}

/* GAUGE */
.gw{position:relative;width:100%;height:100%;min-height:50px;
  display:flex;align-items:center;justify-content:center;}
.gsvg{position:absolute;inset:0;width:100%;height:100%;}
.gc{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.gbg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5;}
.gfg{fill:none;stroke:var(--pc,var(--cyan));stroke-width:5;stroke-linecap:round;}

/* MODALS */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.82);
  backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;}
.mb.sh{opacity:1;pointer-events:auto;}
.ms{width:100%;max-width:620px;background:#0c0c0f;border:1px solid var(--line);
  border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.9,.3,1);
  padding-bottom:env(safe-area-inset-bottom);}
.mb.sh .ms{transform:translateY(0);}
.mh{padding:12px 14px 9px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.mh h3{margin:0;font-size:14px;letter-spacing:1px;font-weight:600;}
.mc2{border:none;background:rgba(255,255,255,0.05);color:var(--text);
  width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;}
.mbody{overflow-y:auto;padding:6px 11px;flex:1;}
.gt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:7px 5px 3px;}
.pl{display:flex;flex-direction:column;gap:2px;}
.pi{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:9px;background:rgba(255,255,255,0.03);
  border:1px solid transparent;font-size:13px;cursor:pointer;}
.pi.sel{border-color:var(--cyan);background:rgba(55,224,230,0.07);}
.pi .pn2{font-weight:600;}.pi .pc{color:var(--muted);font-size:10px;font-family:monospace;margin-left:5px;}
.pi .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.pi.sel .ck{border-color:var(--cyan);background:var(--cyan);color:#000;}
.sr,.szr{display:flex;gap:5px;padding:7px 5px;flex-wrap:wrap;}
.sb{flex:1;min-width:55px;border:1px solid var(--line);border-radius:9px;
  padding:8px 5px;text-align:center;font-size:11px;
  background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;}
.sb.sel{border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.07);}
.ab{width:100%;padding:10px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;}
.ab.pr{background:rgba(55,224,230,0.1);border:1px solid rgba(55,224,230,0.35);color:#9be8ff;}
.ab.dn{background:rgba(255,77,77,0.07);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
.tbar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:600;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.a{color:var(--cyan);border-bottom-color:var(--cyan);}
.pir{display:flex;align-items:center;gap:7px;padding:7px 5px;border-bottom:1px solid var(--line);}
.pcb{border:1px solid var(--line);border-radius:5px;padding:3px 9px;
  font-size:10px;color:var(--muted);background:transparent;cursor:pointer;white-space:nowrap;}
.pcb.lft{border-color:rgba(55,224,230,0.4);color:var(--cyan);}
.pcb.rgt{border-color:rgba(255,183,77,0.4);color:var(--amber);}
.prm{border:none;background:rgba(255,77,77,0.08);color:#ff8080;
  border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;flex-shrink:0;}
.alrow{display:flex;align-items:center;gap:9px;padding:9px 5px;border-bottom:1px solid var(--line);}
.allab{flex:1;font-size:12px;}.allab span{display:block;font-size:9px;color:var(--muted);margin-top:1px;}
.alinp{background:rgba(255,255,255,0.04);border:1px solid var(--line);border-radius:7px;
  padding:5px 8px;color:#fff;font-size:13px;font-weight:700;font-family:monospace;
  width:72px;text-align:center;}
.aldot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:1px;}
.ht{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);border:1px solid var(--line);
  padding:6px 14px;border-radius:18px;font-size:11px;color:var(--muted);
  z-index:80;opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
.ht.sh{opacity:1;}
#blog{position:fixed;bottom:48px;left:7px;right:7px;background:rgba(0,0,0,0.97);
  border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:monospace;font-size:10px;color:#4ade80;z-index:70;
  max-height:80px;overflow-y:auto;display:none;}
#blog.sh{display:block;}
</style>
</head>
<body>

<div class="tb">
  <button id="cb" class="pill">🔵 Connect</button>
  <div id="bs" class="pill">bLink3</div>
  <button id="pipBtn" class="pill">PiP</button>
  <button id="simBtn" class="pill">▶ Sim</button>
  <button id="eb">Налаштувати</button>
</div>

<div id="grid"><div id="gi"></div></div>
<div id="blog"></div>
<div class="ht" id="ht"></div>

<!-- EDIT MODAL -->
<div class="mb" id="em">
  <div class="ms">
    <div class="mh"><h3>Налаштувати</h3><button class="mc2" id="emc">✕</button></div>
    <div class="tbar">
      <div class="tab a" id="t0" onclick="st(0)">ЕКРАН</div>
      <div class="tab" id="t1" onclick="st(1)">PiP</div>
      <div class="tab" id="t2" onclick="st(2)">СИГНАЛИ</div>
    </div>
    <div class="mbody" id="emb"></div>
  </div>
</div>

<!-- PICKER -->
<div class="mb" id="pm">
  <div class="ms">
    <div class="mh"><h3 id="pt">Параметр</h3><button class="mc2" id="pmc">✕</button></div>
    <div class="mbody" id="pb"></div>
  </div>
</div>

<script>
/* ── PARAMS ── */
const P={
  RPM:      {n:'RPM',      o:-1, s:0,sc:1,    b:0,  u:'rpm', mn:0,   mx:9000,c:'#ffd23f',src:'ble'},
  T_Eng:    {n:'T_Eng',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:0,   mx:130, c:'#3b82f6',src:'ble'},
  TPS:      {n:'TPS%',    o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#37e0e6',src:'ble'},
  GPS:      {n:'GPS',     o:-1, s:0,sc:1,    b:0,  u:'km/h',mn:0,   mx:300, c:'#37e0e6',src:'gps'},
  Volt:     {n:'Volt',    o:-1, s:0,sc:1,    b:0,  u:'V',   mn:10,  mx:16,  c:'#4ade80',src:'ble'},
  T_Air:    {n:'T_Air',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:-20, mx:80,  c:'#06b6d4',src:'ble'},
  Inj_Rate: {n:'Inj Rate',o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#ff9f43',src:'ble'},
  MAP:      {n:'MAP',     o:-1, s:0,sc:1,    b:0,  u:'kPa', mn:20,  mx:110, c:'#a29bfe',src:'ble'},
};
const PG=[
  {t:'Всі параметри', k:['RPM','T_Eng','TPS','GPS','Volt','T_Air','Inj_Rate','MAP']},
];
const V={};Object.keys(P).forEach(k=>V[k]='--');

/* ── STORAGE ── */
function lg(k){try{const s=localStorage.getItem('ar_'+k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem('ar_'+k,JSON.stringify(v));}catch(e){}}

/* ── ALERTS CONFIG ── */
const DA={T_cold:40,T_warn:90,T_crit:96,Volt_warn:12.5,Volt_crit:11.8,Spd_limit:50,Spd_enabled:true};
let AL=lg('al')||{...DA};
if(AL.Spd_enabled===undefined)AL.Spd_enabled=true;

/* ── AUDIO ── */
let audioCtx=null;
function gac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

let alrtSnd=false,alrtInt=null;
function beepAlert(){
  try{
    const ac=gac(),t=ac.currentTime;
    [[2600,0,.12],[1800,.16,.12],[2600,.32,.12]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.75,t+st+.01);
      g.gain.linearRampToValueAtTime(0.75,t+st+d-.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}
function startAlert(){if(alrtSnd)return;alrtSnd=true;beepAlert();alrtInt=setInterval(beepAlert,1000);}
function stopAlert(){if(!alrtSnd)return;alrtSnd=false;clearInterval(alrtInt);alrtInt=null;}

let spdBeepDone=false;
function beepSpeed(){
  try{
    const ac=gac(),t=ac.currentTime;
    [[880,0,.15],[1109,0,.15],[880,.18,.15],[1109,.18,.15]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.4,t+st+.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}

/* ── ALERT STATE ── */
const alertState={};
function getAlertState(k,v){
  if(v==='--'||isNaN(parseFloat(v)))return'';
  const fv=parseFloat(v);
  const spdLim=parseFloat(AL.Spd_limit)||50;
  if(k==='T_Eng'){
    if(fv>=AL.T_crit)return'alrt';
    if(fv>=AL.T_warn)return'warn';
    if(fv<AL.T_cold)return'cold';
  }else if(k==='Volt'){
    if(fv<=AL.Volt_crit)return'alrt';
    if(fv<=AL.Volt_warn)return'warn';
  }else if(k==='GPS'){
    if(AL.Spd_enabled===false)return'';
    if(fv>=spdLim)return'alrt';
  }
  return'';
}

function ca(){
  let needAlert=false;
  const spd=parseFloat(V.GPS);
  const spdLim=parseFloat(AL.Spd_limit)||50;
  lay.forEach(tile=>{
    const st=getAlertState(tile.k,V[tile.k]);
    alertState[tile.id]=st;
    if(st==='alrt'&&(tile.k==='T_Eng'||tile.k==='Volt'||tile.k==='GPS'))needAlert=true;
  });
  document.querySelectorAll('.tile[data-id]').forEach(el=>{
    el.classList.remove('cold','warn','alrt');
    const s=alertState[el.dataset.id];
    if(s)el.classList.add(s);
  });
  // cycling alert — only temp/volt
  if(needAlert)startAlert();else stopAlert();
  // speed beep — one shot on crossing
  const overLim=!isNaN(spd)&&spd>=spdLim;
  if(overLim&&!spdBeepDone){spdBeepDone=true;beepSpeed();}
  else if(!overLim)spdBeepDone=false;
}

/* ── GPS ── */
let gpsId=null;
function startGPS(){
  if(!navigator.geolocation||gpsId)return;
  navigator.geolocation.getCurrentPosition(()=>{
    gpsId=navigator.geolocation.watchPosition(pos=>{
      V.GPS=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6*10)/10:0;
      V.Alt=pos.coords.altitude!=null?Math.round(pos.coords.altitude):'--';
      ud();ca();
    },()=>{V.GPS='GPS?';V.Alt='GPS?';ud();},{enableHighAccuracy:true,maximumAge:1000});
  },()=>{V.GPS='GPS?';V.Alt='GPS?';ud();},{enableHighAccuracy:false,timeout:5000});
}
document.addEventListener('touchstart',()=>startGPS(),{once:true});
document.addEventListener('click',()=>startGPS(),{once:true});
startGPS();

/* ── BLE ── */
// CONFIRMED FROM HCI SNOOP LOG (btsnoop_hci.log):
// Telemetry comes as HCI ACL notifications, len=31 bytes
// ATT data starts at byte 12 of raw HCI packet
// att = pkt[12:31]:
//   att[1]  = Table ID (7, 8, 9)
//   att[6]  = T_Eng_indx → T_Eng = raw - 28 °C  ✓ CONFIRMED
//   att[7]  = TPS raw → TPS% = raw / 2.55        ✓ CONFIRMED
//   att[16] = Vehicle Speed km/h (0-75)           ✓ CONFIRMED
//   att[5]  = unknown (decreases as engine warms)
// Init: FC05 12 00 EE → FC05 36 00 CA → FC05 50 00 B0 → subscribe

let bDev=null,bChr=null,bConn=false;
const SVC='0000ffe0-0000-1000-8000-00805f9b34fb',CHR='0000ffe1-0000-1000-8000-00805f9b34fb';

function mkPkt(bytes){
  const b=new Uint8Array(bytes.length+1);
  b.set(bytes);
  let s=0;for(let i=2;i<bytes.length;i++)s+=bytes[i];
  b[bytes.length]=(256-(s&0xFF))&0xFF;
  return b;
}

// Confirmed init sequence from HCI log
// ======= BLE КОМАНДИ — точна копія з APK BLE лог-файлу =======
const CMD_ATSECU    = new Uint8Array([0x41,0x54,0x53,0x45,0x43,0x55,0x0d]); // "ATSECU\r"
const CMD_PING      = new Uint8Array([0xfc,0x05,0x12,0x00,0xee]);
const CMD_ZERO      = new Uint8Array([0x00,0x00,0x00]);
const CMD_FIRMWARE  = new Uint8Array([0xfc,0x05,0x36,0x00,0xca]);
const CMD_UNK50     = new Uint8Array([0xfc,0x05,0x50,0x00,0xb0]);
// Повна SUBSCRIBE (126 bytes) — з реального APK лог-файлу, підписка на 40 таблиць
const CMD_SUBSCRIBE = new Uint8Array([
  0xfc,0x05,0x10,0x79,0x08,0x00,0x02,0x01,0x00,0x04,0x01,0x00,0x07,0x01,0x00,0x08,
  0x01,0x00,0x09,0x01,0x00,0x0a,0x01,0x00,0x0c,0x01,0x00,0x0d,0x01,0x00,0x0e,0x01,
  0x00,0x0f,0x01,0x00,0x10,0x01,0x00,0x14,0x01,0x00,0x16,0x02,0x00,0x18,0x01,0x00,
  0x19,0x01,0x00,0x1a,0x02,0x00,0x1c,0x01,0x00,0x1d,0x01,0x00,0x21,0x01,0x00,0x22,
  0x01,0x00,0x23,0x02,0x00,0x2c,0x01,0x00,0x2d,0x02,0x00,0x2e,0x02,0x00,0x33,0x02,
  0x00,0x37,0x02,0x00,0x3d,0x01,0x00,0x42,0x02,0x00,0x46,0x02,0x00,0x48,0x01,0x00,
  0x4d,0x01,0x00,0x4e,0x01,0x00,0x52,0x01,0x00,0x58,0x02,0x00,0x7c,0x02,0x00,0x82,

const CMD_STOP      = new Uint8Array([0xfc,0x05,0x13,0x00,0xed]);

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// Відправляє команду частинами по CHUNK_SIZE байт (BLE MTU = 20 data bytes)
const CHUNK = 20;
async function sendCmd(cmd){
  if(!bChr||!bConn)return;
  try{
    if(cmd.length <= CHUNK){
      await bChr.writeValueWithoutResponse(cmd);
    } else {
      // Велика команда — фрагментуємо вручну (як оригінальний APK)
      for(let i=0;i<cmd.length;i+=CHUNK){
        const chunk = cmd.slice(i, i+CHUNK);
        await bChr.writeValueWithoutResponse(chunk);
        await sleep(3); // 2-4ms між фрагментами — як у оригінальному APK
      }
    }
  }
  catch(e){lb('cmd err:'+e.message);}
}

async function initSession(){
  // Точна послідовність з APK BLE лог-файлу з реальними паузами:
  // PKT#973 ATSECU → PKT#976 PING (+103ms) → PKT#978,979,980 PING×3 (+13ms each)
  // → PKT#984 000000 (+12ms) → PKT#990 FIRMWARE (+115ms) → PKT#994 UNK50 (+75ms)
  // → PKT#1035 SUBSCRIBE (+3736ms, 7 фрагменти по 2-4ms)
  lb('→ ATSECU');   await sendCmd(CMD_ATSECU);   await sleep(103);
  lb('→ PING×4');   await sendCmd(CMD_PING);      await sleep(13);
                    await sendCmd(CMD_PING);      await sleep(14);
                    await sendCmd(CMD_PING);      await sleep(13);
                    await sendCmd(CMD_PING);      await sleep(12);
  lb('→ 000000');   await sendCmd(CMD_ZERO);      await sleep(115);
  lb('→ FIRMWARE'); await sendCmd(CMD_FIRMWARE);  await sleep(75);
  lb('→ UNK50');    await sendCmd(CMD_UNK50);     await sleep(3800);
  lb(`→ SUBSCRIBE (${CMD_SUBSCRIBE.length}b)`);
  await sendCmd(CMD_SUBSCRIBE); await sleep(500);
  lb('→ Init done, waiting for data stream...');
}

// Parse 19-byte telemetry packet (tableID 7/8/9)
// [0]=0x00 [1]=tableID [6]=T_Eng+28 [7]=TPS*2.55 [16]=speed
// ============================================================
// ПАРСЕРИ ТЕЛЕМЕТРІЇ v2 — підтверджено loga 2026-06-29
// Новий формат: 0x4A/4B (aRacer Android)
// Старий формат: 0x3A/3B/3C (Bluefy iOS)
// ============================================================

// 0x4A: T_Air, RPM, T_Eng, Volt (loga confirmed ✓)
// [0]-28=T_Air  [2:4]BE=RPM  [6]-28=T_Eng  [5]/10=Volt
function parse4A(pkt){
  if(pkt.length < 10 || pkt[0] !== 0x4A) return false;
  const rpm  = (pkt[2]<<8)|pkt[3];
  const teng = pkt[6] - 28;
  const volt = pkt[5] / 10.0;
  const tair = pkt[0] - 28; // [0] завжди 0x4A=74 → T_Air=46°C
  if(rpm  > 200 && rpm  < 15000) V.RPM   = rpm;
  if(teng > -10 && teng < 150)   V.T_Eng = teng;
  if(volt > 8   && volt < 20)    V.Volt  = volt.toFixed(1);
  if(tair > -20 && tair < 80)    V.T_Air = tair;
  return (rpm > 200);
}

// 0x4B: TPS%, MAP kPa, T_Eng, Volt (loga confirmed ✓)
// [7]/2.55=TPS%  [2:4]BE/100=MAP  [6]-28=T_Eng  [5]/10=Volt
function parse4B(pkt){
  if(pkt.length < 12 || pkt[0] !== 0x4B) return false;
  const tps  = pkt[7] / 2.55;
  const map  = ((pkt[2]<<8)|pkt[3]) / 100.0;
  const volt = pkt[5] / 10.0;
  const teng = pkt[6] - 28;
  if(tps  >= 0 && tps  <= 100) V.TPS   = Math.round(tps*10)/10;
  if(map  > 10 && map  < 150)  V.MAP   = Math.round(map*10)/10;
  if(volt > 8  && volt < 20)   V.Volt  = volt.toFixed(1);
  if(teng > -10 && teng < 150) V.T_Eng = teng;
  return true;
}

// 0x4C/4D/4E/4F: T_Eng, Volt
function parse4x(pkt){
  if(pkt.length < 8) return false;
  const f = pkt[0];
  if(f < 0x4C || f > 0x4F) return false;
  const volt = pkt[5] / 10.0;
  const teng = pkt[6] - 28;
  if(volt > 8   && volt < 20)  V.Volt  = volt.toFixed(1);
  if(teng > -10 && teng < 150) V.T_Eng = teng;
  return true;
}

// 19-байт пакет з заголовком 0x00, pkt[1]=tid (7/8/9/0x0a) — ЦЕ СЛУЖБОВИЙ ПАКЕТ ECU,
// НЕ телеметрія. pkt[6] в ньому стабільно = 0x73 (115) → давав хибні "T_Eng=87/88°C"
// незалежно від реального прогріву двигуна (підтверджено BLE логами 2026-06-30).
// Залишено як no-op, щоб не зламати порядок виклику в parseATT().
function parseTable(pkt){
  return false;
}

// 20-байтний пакет з ЗМІННИМ першим байтом (це лічильник пакетів ECU, не тип!).
// Підтверджено BLE логами 2026-06-30 (запис на холостому ході та з газуванням):
//   pkt[6]-28        = T_Eng °C  — стабільне на холостому, не реагує на газ ✓ ПІДТВЕРДЖЕНО (правильна T)
//   pkt[2:4] BE      = RPM       — ідейний холостий хід ~1800, збігається з KB (idle 1744-1806)
//   pkt[5]/10        = Volt      — ~14.1-14.3V, збігається з KB (13.8-14.3V)
//   pkt[9]           = кандидат TPS/MAP — змінюється під час газування, ДІАПАЗОН НЕ ПІДТВЕРДЖЕНО
//
// ВІДОМА ПРОБЛЕМА (2026-06-30): перші ~3с після конекту і момент дисконекту іноді дають
// сміттєві Volt (8.5V / 17.7V) — швидше за все недоформований/перехідний пакет, а не
// справжня напруга. Звужено діапазон правдоподібності 9.5-16V (реальний борт автомобіля)
// і додано deadband: стрибок Volt > 2V за один пакет ігнорується як викид.
let _lastVoltOk = null;
function parse20Byte(pkt){
  if(pkt.length !== 20) return false;
  if(pkt[0] === 0xfc) return false;
  const teng = pkt[6] - 28;
  const rpm  = (pkt[2]<<8)|pkt[3];
  const volt = pkt[5] / 10.0;
  let matched = false;
  if(teng > -10 && teng < 150){
    V.T_Eng = Math.round(teng);
    matched = true;
  }
  if(rpm > 200 && rpm < 15000){
    V.RPM = rpm;
    matched = true;
  }
  if(volt > 9.5 && volt < 16){
    if(_lastVoltOk === null || Math.abs(volt - _lastVoltOk) <= 2){
      V.Volt = volt.toFixed(1);
      _lastVoltOk = volt;
      matched = true;
    }
    // інакше: різкий стрибок — ігноруємо як викид, не оновлюємо V.Volt
  }
  return matched;
}

// Старий формат Bluefy/iOS: 0x3A/3B/3C
function parse3A(pkt){
  if(pkt.length < 12 || pkt[0] !== 0x3A) return false;
  const rpm = (pkt[2]<<8)|pkt[3];
  const volt = pkt[5] / 10.0;
  if(rpm  > 200 && rpm  < 15000) V.RPM  = rpm;
  if(volt > 8   && volt < 20)    V.Volt = volt.toFixed(1);
  return (rpm > 200);
}
function parse3B(pkt){
  if(pkt.length < 8 || pkt[0] !== 0x3B) return false;
  const map = Math.round(pkt[6] / 1.6 * 10) / 10;
  if(map > 10 && map < 150) V.MAP = map;
  return true;
}
function parse3C(pkt){
  if(pkt.length < 16 || pkt[0] !== 0x3C) return false;
  const tair = pkt[15] - 25;
  if(tair > -20 && tair < 80) V.T_Air = tair;
  return true;
}

function parseATT(pkt){
  if(parse4A(pkt)) return true;
  if(parse4B(pkt)) return true;
  if(parse4x(pkt)) return true;
  if(parse3A(pkt)) return true;
  if(parse3B(pkt)) return true;
  if(parse3C(pkt)) return true;
  if(parse20Byte(pkt)) return true;
  if(parseTable(pkt)) return true;
  return false;
}

function onData(e){
  const b=new Uint8Array(e.target.value.buffer);

  if(!parseATT(b)){
    // Показуємо тільки невідомі пакети (не FC05 ACK)
    if(b[0]!==0xfc){
      const hex=Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join(' ');
      lb(`PKT[${b.length}] ${hex}`);
    }
    return;
  }
  ud();ca();
}

async function doConn(){
  const btn=document.getElementById('cb');
  if(bConn){
    try{await sendCmd(CMD_STOP);}catch(e){}
    try{bDev&&bDev.gatt.disconnect();}catch(e){}
    bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='bLink3';
    document.getElementById('bs').className='pill';stopAlert();return;
  }
  btn.textContent='⏳…';btn.className='pill go';
  try{
    bDev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
    bDev.addEventListener('gattserverdisconnected',()=>{
      bConn=false;stopAlert();
      document.getElementById('cb').textContent='🔵 Connect';
      document.getElementById('cb').className='pill';
      document.getElementById('bs').textContent='Disconnected';
      document.getElementById('bs').className='pill err';
    });
    const srv=await bDev.gatt.connect();
    bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bChr.addEventListener('characteristicvaluechanged',onData);
    await bChr.startNotifications();
    bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
    document.getElementById('bs').textContent='● LIVE';
    document.getElementById('bs').className='pill on';
    lb('Connected: '+bDev.name);hint('Підключено до '+bDev.name);
    await initSession();
  }catch(e){
    bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='Error';
    document.getElementById('bs').className='pill err';
    lb('Err:'+e.message);hint('Помилка: '+e.message);
  }
}

    V.TPS     = Math.round(Math.abs(Math.sin(t*.2)*60)+2);
    V.GPS     = Math.min(80,Math.round(t*1.5+Math.sin(t*.5)*5));
    V.T_Air   = Math.round(42+Math.sin(t*.02)*3);

    V.Inj_Rate= (V.RPM > 200 ? (V.TPS*0.3+5).toFixed(1) : '0.0');
    ud();ca();
    if(t>=120)toggleSim();

}

function drag(el,tile){
  let tc=0,tt=null,ts=0,dragging=false;
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.rm'))return;
    ts=Date.now();
    if(editMode&&ds===tile.id){dragging=true;el.setPointerCapture(e.pointerId);e.preventDefault();}
  });
  el.addEventListener('pointermove',e=>{
    if(!dragging)return;e.preventDefault();
    const tgt=document.elementFromPoint(e.clientX,e.clientY)?.closest('.tile:not(.add)');
    document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));
    if(tgt&&tgt.dataset.id&&tgt.dataset.id!==tile.id){tgt.classList.add('dov');el._ov=tgt.dataset.id;}
    else el._ov=null;
  });
  el.addEventListener('pointerup',e=>{
    e.preventDefault();
    if(dragging){
      dragging=false;
      document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));
      if(el._ov){
        const fi=lay.findIndex(t=>t.id===tile.id),ti=lay.findIndex(t=>t.id===el._ov);
        if(fi>=0&&ti>=0){const[m]=lay.splice(fi,1);lay.splice(ti,0,m);ls('lay2',lay);}
        el._ov=null;
      }
      ds=null;render();return;
    }
    if(Date.now()-ts>500)return;
    tc++;
    if(tc===1){
      tt=setTimeout(()=>{
        tc=0;
        if(editMode){
          if(ds===tile.id){ds=null;el.classList.remove('ds');hint('Скасовано');}
          else{document.querySelectorAll('.ds').forEach(x=>x.classList.remove('ds'));ds=tile.id;el.classList.add('ds');hint('Тягни плитку');}
        }else openTE(tile);
      },200);
    }else{
      clearTimeout(tt);tc=0;
      if(!editMode){enEM();setTimeout(()=>{ds=tile.id;document.querySelector(`[data-id="${tile.id}"]`)?.classList.add('ds');hint('Тягни плитку');},50);}
      else openTE(tile);
    }
  });
  el.addEventListener('pointercancel',()=>{dragging=false;document.querySelectorAll('.dov').forEach(x=>x.classList.remove('dov'));ds=null;render();});
}

/* ── PiP (canvas-based, точна копія робочої версії) ── */
let pipConfig=lg('pipcfg')||{big:'RPM',small1:'T_Eng',small2:'GPS'};
function savePipConfig(){ls('pipcfg',pipConfig);}

const pipCanvas=document.createElement('canvas');
pipCanvas.width=400;pipCanvas.height=200;pipCanvas.style.display='none';
document.body.appendChild(pipCanvas);
const pipVideo=document.createElement('video');
pipVideo.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
pipVideo.muted=true;pipVideo.playsInline=true;
document.body.appendChild(pipVideo);
const pctx=pipCanvas.getContext('2d');
let pipDrawInterval=null;

function drawPipFrame(){
  const W=pipCanvas.width,H=pipCanvas.height;
  pctx.clearRect(0,0,W,H);
  pctx.fillStyle='#0a0a0c';pctx.fillRect(0,0,W,H);

  const big=P[pipConfig.big],s1=P[pipConfig.small1],s2=P[pipConfig.small2];
  if(!big||!s1||!s2)return;
  const bigW=W*0.62;
  pctx.textBaseline='middle';

  pctx.fillStyle=big.c;pctx.font='600 22px sans-serif';
  pctx.textAlign='left';
  pctx.fillText(big.n.toUpperCase(),18,30);

  pctx.fillStyle='#ffffff';pctx.font='700 92px monospace';
  pctx.fillText(String(V[pipConfig.big]??'--'),16,H*0.58);

  if(big.u){
    pctx.fillStyle='#8a8a92';pctx.font='500 20px sans-serif';
    pctx.fillText(big.u,18,H*0.58+38);
  }

  pctx.strokeStyle='rgba(255,255,255,0.12)';pctx.lineWidth=1;
  pctx.beginPath();pctx.moveTo(bigW,14);pctx.lineTo(bigW,H-14);pctx.stroke();

  [s1,s2].forEach((p,i)=>{
    const k=i===0?pipConfig.small1:pipConfig.small2;
    const yBase=i===0?H*0.30:H*0.74;
    pctx.fillStyle=p.c;pctx.font='600 16px sans-serif';
    pctx.textAlign='left';
    pctx.fillText(p.n.toUpperCase(),bigW+16,yBase-30);
    pctx.fillStyle='#ffffff';pctx.font='700 40px monospace';
    pctx.fillText(String(V[k]??'--'),bigW+16,yBase);
    if(p.u){
      pctx.fillStyle='#8a8a92';pctx.font='500 14px sans-serif';
      pctx.fillText(p.u,bigW+16,yBase+26);
    }
  });
}

async function startPip(){
  if(!('requestPictureInPicture' in document.createElement('video'))){hint('PiP не підтримується');return;}
  drawPipFrame();
  const stream=pipCanvas.captureStream(30);
  pipVideo.srcObject=stream;
  if(pipDrawInterval)clearInterval(pipDrawInterval);
  pipDrawInterval=setInterval(drawPipFrame,500);
  try{
    await pipVideo.play();
    if(document.pictureInPictureElement)await document.exitPictureInPicture();
    else await pipVideo.requestPictureInPicture();
  }catch(e){hint('PiP: '+e.message);}
}
pipVideo.addEventListener('leavepictureinpicture',()=>{
  if(pipDrawInterval){clearInterval(pipDrawInterval);pipDrawInterval=null;}
  stopAlert();ca();
});

document.getElementById('pipBtn').addEventListener('click',()=>{
  buildPipModal();
  pipModal.classList.add('sh');
});

// PiP modal
const pipModal=document.createElement('div');
pipModal.className='mb';
pipModal.innerHTML=`<div class="ms">
  <div class="mh"><h3>PiP налаштування</h3><button class="mc2" id="pipmc">✕</button></div>
  <div class="mbody" id="pimbody"></div>
</div>`;
document.body.appendChild(pipModal);
document.getElementById('pipmc').addEventListener('click',()=>pipModal.classList.remove('sh'));
pipModal.addEventListener('click',e=>{if(e.target===pipModal)pipModal.classList.remove('sh');});

function buildPipModal(){
  const body=document.getElementById('pimbody');body.innerHTML='';
  const slots=[
    {key:'big',title:'Велике число'},
    {key:'small1',title:'Малий 1'},
    {key:'small2',title:'Малий 2'},
  ];
  slots.forEach(slot=>{
    const gt=document.createElement('div');gt.className='gt';gt.textContent=slot.title;body.appendChild(gt);
    const pl=document.createElement('div');pl.className='pl';
    const seen=new Set();
    PG.forEach(g=>g.k.forEach(k=>{
      if(seen.has(k))return;seen.add(k);
      const p=P[k];
      const item=document.createElement('div');
      item.className='pi'+(pipConfig[slot.key]===k?' sel':'');
      item.innerHTML=`<div><span class="pn2">${p.n}</span><span class="pc">${p.u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{pipConfig[slot.key]=k;savePipConfig();buildPipModal();});
      pl.appendChild(item);
    }));
    body.appendChild(pl);
  });
  // start button
  const startBtn=document.createElement('button');
  startBtn.className='ab pr';startBtn.style.marginTop='10px';
  startBtn.textContent='▶ Відкрити PiP';
  startBtn.addEventListener('click',()=>{pipModal.classList.remove('sh');startPip();});
  body.appendChild(startBtn);
}

function bpip(){
  buildPipModal();
  pipModal.classList.add('sh');
}

function balerts(){
  const body=document.getElementById('emb');body.innerHTML='';
  const items=[
    {key:'T_cold',   label:'T_Eng холодний',      desc:'плитка синя',              color:'#3b82f6',unit:'°C'},
    {key:'T_warn',   label:'T_Eng попередження',   desc:'плитка жовта',             color:'#ffd23f',unit:'°C'},
    {key:'T_crit',   label:'T_Eng критично',       desc:'червона + циклічний звук', color:'#ff4d4d',unit:'°C'},
    {key:'Volt_warn',label:'Volt низький',          desc:'плитка жовта',             color:'#ffd23f',unit:'V'},
    {key:'Volt_crit',label:'Volt критично',         desc:'червона + циклічний звук', color:'#ff4d4d',unit:'V'},
    {key:'Spd_limit',label:'Ліміт швидкості',      desc:'червона+звук рівно на цій швидкості; вимикається тоглом на тайлі GPS',color:'#37e0e6',unit:'km/h'},
  ];

    inp.value=AL[item.key];
    inp.step=item.unit==='km/h'?5:(item.unit==='°C'?1:0.1);
    inp.addEventListener('change',()=>{AL[item.key]=parseFloat(inp.value)||AL[item.key];ls('al',AL);});
    const un=document.createElement('div');un.style.cssText='font-size:10px;color:var(--muted);min-width:24px;';un.textContent=item.unit;
    row.append(dot,lbl,inp,un);body.appendChild(row);

  tb.addEventListener('click',function(){beepAlert();});body.appendChild(tb);
  const tb2=document.createElement('button');tb2.className='ab pr';tb2.textContent='🎵 Тест швидкість';
  tb2.addEventListener('click',function(){beepSpeed();});body.appendChild(tb2);
  const rb=document.createElement('button');rb.className='ab dn';rb.textContent='Скинути';
  rb.addEventListener('click',()=>{AL={...DA};ls('al',AL);balerts();});body.appendChild(rb);
}

/* ── PICKER ── */
const pmod=document.getElementById('pm');
let ptile=null,pmode='main';
function opk(tile,mode){ptile=tile;pmode=mode;document.getElementById('pt').textContent=mode==='pip'?'Додати в PiP':tile?'Змінити':'Додати';bpick();pmod.classList.add('sh');}
function cpk(){pmod.classList.remove('sh');ptile=null;}
document.getElementById('pmc').addEventListener('click',cpk);
pmod.addEventListener('click',e=>{if(e.target===pmod)cpk();});
function bpick(){
  const body=document.getElementById('pb');body.innerHTML='';
  const cur=ptile?.k;const seen=new Set();
  PG.forEach(g=>{
    const gt=document.createElement('div');gt.className='gt';gt.textContent=g.t;body.appendChild(gt);
    const pl=document.createElement('div');pl.className='pl';
    g.k.forEach(k=>{
      if(seen.has(k))return;seen.add(k);
      const p=P[k];
      const item=document.createElement('div');
      item.className='pi'+(k===cur?' sel':'');
      item.innerHTML=`<div><span class="pn2">${p.n}</span><span class="pc">${p.u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{
        if(pmode==='pip'){pipL.push({k,col:'left'});ls('pip',pipL);cpk();bpip();if(pipVisible)buildPipOverlay();}
        else selp(k);
      });
      pl.appendChild(item);
    });
    body.appendChild(pl);
  });
  if(pmode==='main'){
    const sg=document.createElement('div');sg.className='gt';sg.textContent='Стиль';body.appendChild(sg);
    const sr=document.createElement('div');sr.className='sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.st||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });body.appendChild(sr);
    const szg=document.createElement('div');szg.className='gt';szg.textContent='Розмір';body.appendChild(szg);
    const szr=document.createElement('div');szr.className='szr';
    [['s1','1×1'],['s21','2×1'],['s22','2×2']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.sz||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });body.appendChild(szr);
    if(ptile){
      const db=document.createElement('button');db.className='ab dn';db.textContent='🗑 Видалити';
      db.addEventListener('click',()=>{lay=lay.filter(t=>t.id!==ptile.id);ls('lay2',lay);cpk();render();bmain();});
      body.appendChild(db);
    }
  }
}
function selp(k){
  if(ptile)ptile.k=k;else{ptile={id:'t'+(nid++),k,st:'flat',sz:'s1'};lay.push(ptile);}
  ls('lay2',lay);bpick();render();bmain();
}
function selst(v){if(ptile){ptile.st=v;ls('lay2',lay);bpick();render();}}
function selsz(v){if(ptile){ptile.sz=v;ls('lay2',lay);bpick();render();}}
function hint(m){const t=document.getElementById('ht');t.textContent=m;t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),2200);}

render();
</script>
