<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>aRacer Dash Pro</title>
<style>
:root{
  --bg:#000000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
  --text:#f2f2f0;--muted:#666;
  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000000 !important;color:#f2f2f0 !important;
  font-family:'Rajdhani','Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) 8px 5px;
  background:#000000;border-bottom:1px solid var(--line);
  height:var(--th);}
.pill{border:1px solid var(--line);border-radius:6px;padding:5px 9px;
  font-size:12px;color:var(--muted);background:#0d0d0f;white-space:nowrap;cursor:pointer;}
.pill.on{color:#9be8ff;border-color:#2b6f7a;}
.pill.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);}
.pill.err{color:#ff8080;border-color:rgba(255,77,77,0.3);}
.pill.go{color:var(--amber);border-color:rgba(255,183,77,0.3);}
.pill.sim{color:#c084fc;border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.06);}
#eb{margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
  padding:5px 11px;font-size:12px;color:#f2f2f0;background:#0d0d0f;cursor:pointer;}
#eb.a{color:#000;background:var(--cyan);border-color:var(--cyan);font-weight:700;}
@media(orientation:landscape){
  :root{--th:36px;}
  .pill{font-size:11px;padding:3px 7px;}
  #eb{font-size:11px;padding:3px 9px;}
}

/* GRID */
#grid{position:fixed;inset:0;background:#000000 !important;
  padding-top:calc(env(safe-area-inset-top) + var(--th) + 2px);
  padding-bottom:env(safe-area-inset-bottom,6px);overflow:hidden;}
#gi{display:grid;gap:5px;padding:5px;height:100%;align-content:start;
  grid-auto-flow:dense;
  grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(130px,170px);}
@media(orientation:landscape){
  /* Сітку зроблено удвічі дрібнішою (12 колонок замість 6) — щоб влазило
     більше параметрів одночасно. Відео (span 8) і великі гейдж-тайли s22
     (span 4) навмисно збільшені вдвічі відносно нових колонок, щоб
     зберегти той самий візуальний розмір, що й раніше. Звичайні s21/s1
     тайли НЕ мають такого подвоєння — вони навмисно стають вдвічі
     вужчими, щоб у тому самому місці вміщалось удвічі більше параметрів. */
  #gi{grid-template-columns:repeat(12,1fr);grid-auto-rows:minmax(100px,150px);}
}

/* TILES */
.tile{position:relative;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;overflow:hidden;-webkit-touch-callout:none;will-change:auto;
  transition:background .4s,border-color .4s;}
.tile.s1{grid-column:span 1;grid-row:span 1;}
.tile.s22{grid-column:span 2;grid-row:span 2;}
.tile.s21{grid-column:span 2;grid-row:span 1;}
.tile.s41{grid-column:span 2;grid-row:span 1;} /* портрет: fallback, поводиться як s21 */

/* ВІДЕО-ПЛИТКА: нормальний вигляд за замовчуванням в обох орієнтаціях.
   При активації реального PiP (клас .pip-active) форма ВІДЕО НЕ змінюється —
   PiP-вікно зберігає ті самі пропорції, що й картка на екрані (більше не
   "пігулка" 7:1). Змінюється лише вміст, що малюється на канвасі (великі
   цифри без підписів) — див. drawPipFrame() / drawTileLikeColumn(). */
.video-tile {
  grid-column: 1 / -1;
  grid-row: span 1;
  position: relative;
  background: #0d0d0f;
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  height: 100%;
}
@media(orientation:landscape){
  /* .tile.s1 більше НЕ має спецоверрайду в ландшафті — раніше він штучно
     розтягувався до ширини s21/s22 (span 2 з 6), тепер це справді
     компактний 1×1 тайл (span 1 з 12) для максимальної щільності.
     .tile.s21 НЕ чіпаємо тут навмисно — саме такий розмір (span 2 з 12)
     зараз показують дефолтні тайли RPM/Volt/TPS/T_Air, і його треба
     зберегти без змін. Замість цього для СПРАВДІ подвійної ширини
     (два поля поруч) додано окремий клас .tile.s41 (span 4). */
  .video-tile{grid-column:span 8;grid-row:span 2;}
  .tile.s22{grid-column:span 4;grid-row:span 2;}
  .tile.s41{grid-column:span 4;grid-row:span 1;}
}
/* PiP більше не змінює форму відео — воно завжди залишається такого ж
   розміру/пропорцій, як звичайна картка (width:100%/height:100% з базового
   правила #pip-video нижче по коду вже це забезпечує). */

/* Alert States */
.tile.cold{background:rgba(59,130,246,0.08)!important;border-color:rgba(59,130,246,0.4)!important;}
.tile.warn{background:rgba(255,211,63,0.07)!important;border-color:rgba(255,211,63,0.45)!important;}
.tile.alrt{background:rgba(255,77,77,0.10)!important;border-color:rgba(255,77,77,0.55)!important;
  animation:palrt 1.1s ease-in-out infinite;}
@keyframes palrt{0%,100%{border-color:rgba(255,77,77,0.55);}50%{border-color:rgba(255,77,77,1);}}
.tile.ed{animation:jig .4s ease-in-out infinite;}
.tile.alrt.ed{animation:jig .4s;}
@keyframes jig{0%,100%{transform:rotate(0)}25%{transform:rotate(-.7deg)}75%{transform:rotate(.7deg)}}
.tile.ds{animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 16px rgba(55,224,230,0.25)!important;transform:scale(1.03);z-index:20;}
.tile.dov{box-shadow:inset 0 0 0 2px var(--amber);}
.rm{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:#ff4d4d;color:#fff;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  z-index:5;display:none;cursor:pointer;}
.tile.ed .rm{display:flex;}
.add{border-style:dashed;border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.01);color:var(--muted);font-size:26px;
  cursor:pointer;animation:none!important;}

/* TILE CONTENT */
.tl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pc,var(--muted));margin-bottom:1px;text-align:center;
  white-space:normal;word-break:break-word;line-height:1.2;font-weight:700;}
.tv{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
  line-height:1;color:#fff;letter-spacing:1px;font-size:clamp(22px,6.5vw,39px);}
.tu{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.tun{width:50%;height:1px;background:var(--pc,var(--cyan));opacity:0.45;margin:3px 0;}
.s22 .tv{font-size:clamp(35px,8.5vw,60px);}
.s21 .tv{font-size:clamp(24px,6.5vw,43px);}
@media(orientation:landscape){
  .tl{font-size:11px;}
  .tv{font-size:clamp(20px,5vw,35px);}
  .s22 .tv{font-size:clamp(28px,6.5vw,47px);}
  .s41 .tv{font-size:clamp(24px,6vw,42px);}
  /* s21/s1 стали вдвічі вужчими (розділ вище) — шрифт зменшено відповідно,
     інакше цифри/довгі підписи (напр. "CYL1_AP") не влазять і переносяться. */
  .s21 .tv{font-size:clamp(15px,4vw,26px);}
  .s1 .tv{font-size:clamp(14px,4vw,24px);}
  .tile.s1 .tl,.tile.s21 .tl{font-size:9px;}
}

/* GAUGE */
.gw{position:relative;width:100%;height:100%;min-height:50px;
  display:flex;align-items:center;justify-content:center;}
.gsvg{position:absolute;inset:0;width:100%;height:100%;}
.gc{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.gbg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5;}
.gfg{fill:none;stroke:var(--pc,var(--cyan));stroke-width:5;stroke-linecap:round;}

/* MODALS */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.82);
  backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;}
.mb.sh{opacity:1;pointer-events:auto;}
.ms{width:100%;max-width:620px;background:#0c0c0f;border:1px solid var(--line);
  border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.9,.3,1);
  padding-bottom:env(safe-area-inset-bottom);}
.mb.sh .ms{transform:translateY(0);}
.mh{padding:12px 14px 9px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.mh h3{margin:0;font-size:14px;letter-spacing:1px;font-weight:600;}
.mc2{border:none;background:rgba(255,255,255,0.05);color:var(--text);
  width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;}
.mbody{overflow-y:auto;padding:6px 11px;flex:1;}
.gt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:7px 5px 3px;}
.pl{display:flex;flex-direction:column;gap:2px;}
.pi{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:9px;background:rgba(255,255,255,0.03);
  border:1px solid transparent;font-size:13px;cursor:pointer;}
.pi.sel{border-color:var(--cyan);background:rgba(55,224,230,0.07);}
.pi .pn2{font-weight:600;}.pi .pc{color:var(--muted);font-size:10px;font-family:monospace;margin-left:5px;}
.pi .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.pi.sel .ck{border-color:var(--cyan);background:var(--cyan);color:#000;}
.sr,.szr{display:flex;gap:5px;padding:7px 5px;flex-wrap:wrap;}
.sb{flex:1;min-width:55px;border:1px solid var(--line);border-radius:9px;
  padding:8px 5px;text-align:center;font-size:11px;
  background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;}
.sb.sel{border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.07);}
.ab{width:100%;padding:10px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;}
.ab.pr{background:rgba(55,224,230,0.1);border:1px solid rgba(55,224,230,0.35);color:#9be8ff;}
.ab.dn{background:rgba(255,77,77,0.07);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
.tbar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:600;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.a{color:var(--cyan);border-bottom-color:var(--cyan);}
.ht{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);border:1px solid var(--line);
  padding:6px 14px;border-radius:18px;font-size:11px;color:var(--muted);
  z-index:80;opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
.ht.sh{opacity:1;}
#blog{position:fixed;bottom:48px;left:7px;right:7px;background:rgba(0,0,0,0.97);
  border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:monospace;font-size:10px;color:#4ade80;z-index:70;
  max-height:80px;overflow-y:auto;display:none;}
#blog.sh{display:block;}
</style>
</head>
<body>

<div class="tb">
  <button id="cb" class="pill">🔵 Connect</button>
  <div id="bs" class="pill">bLink3</div>
  <button id="resetBtn" class="pill">Скинути</button>
  <button id="pipBtnTop" class="pill">PiP</button>
  <button id="eb">Налаштувати</button>
</div>

<div id="grid">
  <div id="gi">
    <div id="dash-video-tile" class="video-tile">
      <video id="pip-video" playsinline muted style="width:100%; height:100%; object-fit:cover; background:#000;"></video>
    </div>
  </div>
</div>

<div id="blog"></div>
<div class="ht" id="ht"></div>

<div class="mb" id="em">
  <div class="ms">
    <div class="mh"><h3>Налаштувати</h3><button class="mc2" id="emc">✕</button></div>
    <div class="tbar">
      <div class="tab a" id="t0" onclick="st(0)">ЕКРАН</div>
      <div class="tab" id="t1" onclick="st(1)">СИГНАЛИ</div>
    </div>
    <div class="mbody" id="emb"></div>
  </div>
</div>

<div class="mb" id="pm">
  <div class="ms">
    <div class="mh"><h3 id="pt">Параметр</h3><button class="mc2" id="pmc">✕</button></div>
    <div class="mbody" id="pb"></div>
  </div>
</div>

<canvas id="pip-canvas" style="display: none;"></canvas>

<script>
const P={
  RPM:      {n:'RPM',      o:-1, s:0,sc:1,    b:0,  u:'rpm', mn:0,   mx:9000,c:'#ffd23f',src:'ble'},
  T_Eng:    {n:'T_Eng',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:0,   mx:130, c:'#3b82f6',src:'ble'},
  TPS:      {n:'TPS%',    o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#37e0e6',src:'ble'},
  GPS:      {n:'GPS',     o:-1, s:0,sc:1,    b:0,  u:'km/h',mn:0,   mx:300, c:'#37e0e6',src:'gps'},
  Volt:     {n:'Volt',    o:-1, s:0,sc:1,    b:0,  u:'V',   mn:10,  mx:16,  c:'#4ade80',src:'ble'},
  T_Air:    {n:'T_Air',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:-20, mx:80,  c:'#06b6d4',src:'ble'},
  Inj_Rate: {n:'Inj Rate',o:-1, s:0,sc:1,    b:0,  u:'мс',   mn:0,   mx:25,  c:'#ff9f43',src:'ble'},
  MAP:      {n:'Cyl1 AP',  o:-1, s:0,sc:1,    b:0,  u:'psi',  mn:0,  mx:100, c:'#a29bfe',src:'ble'},
  Alt:      {n:'GPS H',    o:-1, s:0,sc:1,    b:0,  u:'м',    mn:0,  mx:3000,c:'#37e0e6',src:'gps'},
  Gforce:   {n:'G-Сила',   o:-1, s:0,sc:1,    b:0,  u:'G',    mn:0,  mx:2,   c:'#ff6b6b',src:'sensor'},
  Lean:     {n:'Кут нахилу',o:-1,s:0,sc:1,    b:0,  u:'°',    mn:-90, mx:90,  c:'#f472b6',src:'sensor'},
};
const PG=[
  {t:'Всі параметри', k:['RPM','T_Eng','TPS','GPS','Volt','T_Air','Inj_Rate','MAP','Alt','Gforce','Lean']},
];
const V={};Object.keys(P).forEach(k=>V[k]=k==='RPM'?0:'--');

function lg(k){try{const s=localStorage.getItem('ar_'+k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem('ar_'+k,JSON.stringify(v));}catch(e){}}

const DA={T_cold:64,T_warn:90,T_crit:96,Volt_warn:12.5,Volt_crit:11.8,Spd_limit:60,Spd_enabled:true,Fall_enabled:true};
let AL=lg('al')||{...DA};

let TC=lg('tpscal')||{min:0,max:170};
let _tpsRawLast=null;
let _tpsLiveTimer=null;

let audioCtx=null;
function gac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

let alrtSnd=false,alrtInt=null;
function beepAlert(){
  try{
    const ac=gac(),t=ac.currentTime;
    if(ac.state==='suspended') ac.resume(); // захист: контекст міг знов "заснути" після фону
    [[2600,0,.12],[1800,.16,.12],[2600,.32,.12]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.75,t+st+.01);
      g.gain.linearRampToValueAtTime(0.75,t+st+d-.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}
function startAlert(){if(alrtSnd)return;alrtSnd=true;beepAlert();alrtInt=setInterval(beepAlert,1000);}
function stopAlert(){if(!alrtSnd)return;alrtSnd=false;clearInterval(alrtInt);alrtInt=null;}

let spdBeepDone=false;
function beepSpeed(){
  try{
    const ac=gac(),t=ac.currentTime;
    if(ac.state==='suspended') ac.resume(); // захист: контекст міг знов "заснути" після фону
    [[880,0,.15],[1109,0,.15],[880,.18,.15],[1109,.18,.15]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.4,t+st+.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}

const alertState={};
// T_Eng і GPS тепер живуть тільки у відео-плитці (не в `lay`), але пороги/звук
// для них мають працювати завжди — тому їх стан рахуємо окремо від flat-тайлів.
const videoAlertState={T_Eng:'',GPS:''};
function getAlertState(k,v){
  if(v==='--'||isNaN(parseFloat(v)))return'';
  const fv=parseFloat(v);
  const spdLim=parseFloat(AL.Spd_limit)||60;
  if(k==='T_Eng'){
    if(fv>=AL.T_crit)return'alrt';
    if(fv>=AL.T_warn)return'warn';
    if(fv<AL.T_cold)return'cold';
  }else if(k==='Volt'){
    if(fv<=AL.Volt_crit)return'alrt';
    if(fv<=AL.Volt_warn)return'warn';
  }else if(k==='GPS'){
    if(AL.Spd_enabled===false)return'';
    // Жовтий (не червоний) при перевищенні ліміту — і один "бліп", а не
    // безперервна сирена (та лишається лише для T_Eng/Volt).
    if(fv>=spdLim)return'warn';
  }
  return'';
}

function ca(){
  let needAlert=false;
  const spd=parseFloat(V.GPS);
  const spdLim=parseFloat(AL.Spd_limit)||60;
  lay.forEach(tile=>{
    const st=getAlertState(tile.k,V[tile.k]);
    alertState[tile.id]=st;
    if(st==='alrt'&&tile.k==='T_Eng')needAlert=true; // Volt більше НЕ вмикає звук — лише візуальний червоний стан/пульсація
  });
  // T_Eng/GPS — рахуємо завжди, незалежно від того, чи вони є окремим тайлом
  // у `lay` (зараз їх там немає, вони показуються тільки у відео-плитці).
  videoAlertState.T_Eng=getAlertState('T_Eng',V.T_Eng);
  videoAlertState.GPS=getAlertState('GPS',V.GPS);
  if(videoAlertState.T_Eng==='alrt')needAlert=true;
  document.querySelectorAll('.tile[data-id]').forEach(el=>{
    el.classList.remove('cold','warn','alrt');
    const s=alertState[el.dataset.id];
    if(s)el.classList.add(s);
  });
  if(needAlert)startAlert();else stopAlert();
  const overLim=AL.Spd_enabled!==false&&!isNaN(spd)&&spd>=spdLim;
  // Гістерезис 5 км/год: дозвіл на НАСТУПНИЙ біп повертається тільки коли
  // швидкість впаде ПОМІТНО нижче ліміту, а не одразу біля самого порогу.
  // Без цього невеликі коливання GPS-показників (напр. 59.8→60.2→59.9)
  // раз у раз скидають spdBeepDone і звук ніби "циклиться" — хоча технічно
  // це завжди був один окремий біп на кожне таке дрібне перетинання.
  const resetLim=spdLim-5;
  if(overLim&&!spdBeepDone){spdBeepDone=true;beepSpeed();}
  else if(!isNaN(spd)&&spd<resetLim)spdBeepDone=false;
}

let gpsId=null;
function startGPS(){
  if(!navigator.geolocation||gpsId)return;
  navigator.geolocation.getCurrentPosition(()=>{
    gpsId=navigator.geolocation.watchPosition(pos=>{
      V.GPS=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0;
      V.Alt=pos.coords.altitude!=null?Math.round(pos.coords.altitude):'--';
      ud();ca();
    },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:true,maximumAge:1000});
  },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:false,timeout:5000});
}
document.addEventListener('touchstart',()=>startGPS(),{once:true});
document.addEventListener('click',()=>startGPS(),{once:true});
startGPS();

/* ── СЕНСОРИ ТЕЛЕФОНУ: G-СИЛА ТА КУТ НАХИЛУ ──
   Це фундамент під майбутню детекцію падіння (окрема задача) — зараз лише
   рахуємо і показуємо два числа. G-сила: довжина вектора прискорення
   (з гравітацією) поділена на 9.81 — на місці ≈1G, зростає при
   розгоні/гальмуванні/в поворотах. Кут нахилу: кут між ПОТОЧНИМ вектором
   гравітації і вектором, зафіксованим під час калібрування (коли мотоцикл
   стоїть вертикально) — так має сенс НЕЗАЛЕЖНО від того, під яким кутом і
   як саме закріплений телефон на кермі. Знак (ліво/право) свідомо НЕ
   рахуємо — для тесту порогів (напр. 80°) достатньо модуля кута. */
/* ── КУТ НАХИЛУ: КОМПЛЕМЕНТАРНИЙ ФІЛЬТР + РОЗДІЛЕННЯ ROLL/PITCH ──
   ВАЖЛИВИЙ ФІКС: попередня версія рахувала кут як ЗАГАЛЬНИЙ нахил у будь-
   якому напрямку (повний 3D-кут від вертикалі), тому нахил телефону
   вперед-назад (питч — наприклад, від гальмування чи кочки) домішувався в
   те саме число, що й нахил ліво-право (roll), і "збивав" центрування,
   бо акселерометрична корекція весь час тягнула результат до
   забрудненого пітчем значення.
   Виправлення: калібруємо ДВА вектори — "верх" (û, мотоцикл вертикально) і
   "ліво" (ŝ, нахил вліво на 15-30°). Ці два вектори задають площину
   "roll" (ліво-право). Rull-кут рахуємо як atan2(g·ŝ, g·û) — ця формула
   МАТЕМАТИЧНО ігнорує будь-яку складову g поза цією площиною (тобто
   ігнорує пітч), а не просто "сподівається", що його буде мало.
   Гіроскоп (rotationRate.gamma, інтегрований) — швидка миттєва реакція,
   акселерометр (через ту саму формулу atan2, тепер чистий від пітчу) —
   повільна довгострокова корекція дрейфу. Обидва джерела тепер узгоджені
   по знаку й по осі — жодного "хака" зі знаком від гіроскопа більше не
   потрібно. */
let motionCal = lg('motioncal') || null;      // {x,y,z} — вектор гравітації, мотоцикл вертикально
let motionSideAxis = lg('motionside') || null; // {x,y,z} — нормалізований вектор "вліво" в площині roll
let motionPermGranted = false;
let _motionListenerActive = false;
let _lastMotionTs = 0;
let _leanAngle = 0;      // поточний відфільтрований кут (зі знаком, вліво = +)
let _lastFilterTs = 0;
let _calStage = 0; // 0=нічого не калібровано, 1=зроблено "нуль", чекаємо "ліво"
const GYRO_DEADBAND_DEG_S = 0.3; // ігноруємо мікротремтіння датчика менше 0.3°/с
const FILTER_TAU_S = 1.5;        // за скільки секунд акселерометр "підтягує" дрейф гіроскопа

function needsMotionPermission(){
  return typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';
}

async function requestMotionPermission(){
  if(needsMotionPermission()){
    try{
      const res = await DeviceMotionEvent.requestPermission();
      if(res === 'granted'){ motionPermGranted=true; startMotionSensors(); return true; }
      sht('Доступ до датчиків відхилено');
      return false;
    }catch(e){ sht('Помилка запиту дозволу датчиків'); return false; }
  } else {
    motionPermGranted=true;
    startMotionSensors();
    return true;
  }
}

function startMotionSensors(){
  if(_motionListenerActive) return;
  _motionListenerActive=true;
  window.addEventListener('devicemotion', onMotion);
}

// Roll-кут (зі знаком) з поточного вектора гравітації відносно калібрування.
// atan2 двох компонентів (проекція на û і на ŝ) МАТЕМАТИЧНО виключає
// будь-яку складову вектора поза площиною roll — тобто ігнорує пітч.
function computeRollAngle(g){
  if(!motionCal || !motionSideAxis) return null;
  const dotUp = g.x*motionCal.x + g.y*motionCal.y + g.z*motionCal.z;
  const dotSide = g.x*motionSideAxis.x + g.y*motionSideAxis.y + g.z*motionSideAxis.z;
  return Math.atan2(dotSide, dotUp) * 180/Math.PI;
}

function onMotion(e){
  const g=e.accelerationIncludingGravity;
  const now=Date.now();
  let accelAngleSigned = null;
  if(g && g.x!==null && g.x!==undefined){
    const mag=Math.sqrt(g.x*g.x+g.y*g.y+g.z*g.z);
    if(now-_lastMotionTs>=150){ _lastMotionTs=now; V.Gforce=(mag/9.81).toFixed(2); }
    accelAngleSigned = computeRollAngle(g); // null, якщо ще не відкалібровано обидва вектори
  }

  if(!motionCal || !motionSideAxis){ V.Lean='--'; return; } // потрібні ОБИДВА калібрування

  const nowP = performance.now();
  if(_lastFilterTs === 0){ _lastFilterTs = nowP; return; }
  const dt = (nowP - _lastFilterTs) / 1000;
  _lastFilterTs = nowP;

  let rotationY = e.rotationRate ? e.rotationRate.gamma : null;
  if(rotationY !== null && rotationY !== undefined){
    if(Math.abs(rotationY) < GYRO_DEADBAND_DEG_S) rotationY = 0;
    const gyroAngle = _leanAngle + (-rotationY) * dt;
    if(accelAngleSigned !== null){
      const alpha = FILTER_TAU_S / (FILTER_TAU_S + dt);
      _leanAngle = alpha*gyroAngle + (1-alpha)*accelAngleSigned;
    } else {
      _leanAngle = gyroAngle;
    }
  } else if(accelAngleSigned !== null){
    _leanAngle = accelAngleSigned;
  }

  if(_leanAngle > 90) _leanAngle = 90;
  if(_leanAngle < -90) _leanAngle = -90;
  V.Lean = Math.round(_leanAngle);
  ud();ca();
}

function _sampleGravityAvg(ms, cb){
  const samples=[];
  const handler=(e)=>{
    const g=e.accelerationIncludingGravity;
    if(g && g.x!==null && g.x!==undefined) samples.push({x:g.x,y:g.y,z:g.z});
  };
  window.addEventListener('devicemotion', handler);
  setTimeout(()=>{
    window.removeEventListener('devicemotion', handler);
    if(samples.length<3){ cb(null); return; }
    const avg={x:0,y:0,z:0};
    samples.forEach(s=>{avg.x+=s.x;avg.y+=s.y;avg.z+=s.z;});
    avg.x/=samples.length;avg.y/=samples.length;avg.z/=samples.length;
    cb(avg);
  }, ms);
}

// Крок 1 калібрування: тримай телефон нерухомо, мотоцикл вертикально.
function calibrateLeanZero(){
  sht('Тримай телефон нерухомо, мотоцикл вертикально…');
  _sampleGravityAvg(1000, (avg)=>{
    if(!avg){ sht('Не вдалось отримати дані датчиків'); return; }
    motionCal=avg; ls('motioncal',motionCal);
    _calStage=1;
    sht('Нуль зафіксовано! Тепер нахили ВЛІВО на 15-30° і тапни ще раз.');
  });
}

// Крок 2 калібрування: нахили мотоцикл/кермо вліво і тримай нерухомо —
// це задає площину roll і виключає пітч з розрахунку.
function calibrateLeanSide(){
  sht('За секунду почнеться замір — нахили ВЛІВО на 15-30° і тримай…');
  setTimeout(()=>{
    _sampleGravityAvg(1000, (avg)=>{
      if(!avg){ sht('Не вдалось отримати дані датчиків'); return; }
      const up=motionCal;
      const dot = avg.x*up.x+avg.y*up.y+avg.z*up.z;
      const upMagSq = up.x*up.x+up.y*up.y+up.z*up.z;
      // Прибираємо складову "вгору" з виміряного вектора — лишається чиста
      // складова нахилу (перпендикулярна до û).
      let sx = avg.x - dot/upMagSq*up.x;
      let sy = avg.y - dot/upMagSq*up.y;
      let sz = avg.z - dot/upMagSq*up.z;
      const sMag = Math.sqrt(sx*sx+sy*sy+sz*sz);
      if(sMag < 0.5){ sht('Замало нахилу — нахили сильніше і спробуй ще раз'); return; }
      sx/=sMag; sy/=sMag; sz/=sMag;
      motionSideAxis={x:sx,y:sy,z:sz}; ls('motionside',motionSideAxis);
      _calStage=0;
      _leanAngle=0; _lastFilterTs=0;
      sht('Калібрування завершено! Можна випрямлятись.');
    });
  }, 1200); // час, щоб встигнути нахилитись ПІСЛЯ тапу, перед стартом заміру
}

// Тап по плитці кута нахилу: проводить через обидва кроки калібрування
// послідовно (дозвіл → нуль → тап ще раз → ліво), далі просто
// перекалібровує з нуля (крок 1).
async function onLeanTileTap(){
  if(!motionPermGranted){
    const ok = await requestMotionPermission();
    if(!ok) return;
    sht('Датчики руху увімкнено — тримай мотоцикл вертикально…');
    setTimeout(calibrateLeanZero, 400); // невелика пауза, щоб рука встигла завмерти
    return;
  }
  if(_calStage === 1) calibrateLeanSide(); // другий тап поспіль — крок "ліво"
  else calibrateLeanZero(); // перший тап (або перекалібровка з нуля)
}

// Android/десктоп не потребують явного дозволу — стартуємо одразу.
// iOS (Bluefy) вимагає тап користувача — тап по плитці кута нахилу.
if(!needsMotionPermission()){
  motionPermGranted=true;
  startMotionSensors();
}

/* ── ДЕТЕКТОР ПАДІННЯ (поки тільки СПОСТЕРЕЖЕННЯ, без сирени/SMS) ──
   Це навмисно найпростіший можливий крок: просто показуємо toast + пишемо
   в консоль, коли тригер спрацював, щоб ти міг покататись і подивитись, чи
   нема хибних спрацювань на реальних вибоїнах/гальмуванні/поворотах,
   ПЕРЕД тим як додавати сирену/countdown/відправку SMS. Керується тим самим
   вимикачем AL.Fall_enabled з Налаштування → СИГНАЛИ.
   Два незалежні тригери:
   1. tipover — МОДУЛЬ кута нахилу (Math.abs, бо кут тепер зі знаком
      ліво/право) тримається >80° довше 3с. НЕ залежить від BLE/RPM
      навмисно — BLE-модуль може не пережити реальний удар.
   2. gspike — ДВОЕТАПНА перевірка. Одинокий сплеск G — поганий індикатор:
      кочка на дорозі дає такий самий різкий стрибок (заміряно >4G на
      реальних кочках), як і справжній удар. Різниця з'являється ПІСЛЯ
      сплеску: кочка — кут одразу повертається до норми; падіння — кут
      лишається аномальним ще через кілька секунд. Тому сплеск лише
      "кандидат", підтверджуємо через FALL_CONFIRM_WINDOW_MS. */
let _leanOverSince = null;
let _lastTipoverLogTs = 0;
let _lastGSpikeLogTs = 0;
let _pendingGSpike = null; // {ts, g} — кандидат на удар, чекає підтвердження
const FALL_LEAN_DEG = 80;
const FALL_LEAN_HOLD_MS = 3000;
const FALL_GFORCE_THRESHOLD = 2.2;
const FALL_CONFIRM_WINDOW_MS = 2500; // скільки чекати після сплеску, щоб перевірити кут
const FALL_CONFIRM_LEAN_DEG = 45;    // кут, який має ЛИШИТИСЬ, щоб зарахувати як падіння (не кочку)
const FALL_LOG_COOLDOWN_MS = 8000; // не спамити toast на кожен цикл, поки умова тримається

function logFallEvent(type, detail){
  const ts = new Date().toLocaleTimeString('uk-UA', {hour12:false});
  console.log(`[ПАДІННЯ-ТЕСТ] ${ts} ${type}: ${detail}`);
  sht('⚠️ Тест падіння: ' + detail);
}

setInterval(()=>{
  // ТИМЧАСОВО без вимоги bConn — користувач тестує детекцію окремо від
  // мопеда (вдома, без Bluetooth). Коли тестування завершиться, варто
  // повернути гейт на bConn, інакше кожен різкий рух телефону поза поїздкою
  // (кинув на диван, впустив) даватиме хибний toast.
  if(!AL.Fall_enabled) { _leanOverSince = null; _pendingGSpike = null; return; }

  const leanAbs = typeof V.Lean === 'number' ? Math.abs(V.Lean) : null;

  // Тригер 1: тривалий кут нахилу (незалежно від сторони)
  if(leanAbs !== null){
    if(leanAbs > FALL_LEAN_DEG){
      if(_leanOverSince === null) _leanOverSince = Date.now();
      else if(Date.now() - _leanOverSince > FALL_LEAN_HOLD_MS && Date.now() - _lastTipoverLogTs > FALL_LOG_COOLDOWN_MS){
        logFallEvent('tipover', `кут ${V.Lean}° тримається понад 3с`);
        _lastTipoverLogTs = Date.now();
      }
    } else {
      _leanOverSince = null;
    }
  }

  // Тригер 2: сплеск G-сили — ЛИШЕ кандидат, чекаємо підтвердження кутом
  const g = parseFloat(V.Gforce);
  if(_pendingGSpike === null && !isNaN(g) && g > FALL_GFORCE_THRESHOLD){
    _pendingGSpike = { ts: Date.now(), g };
  }
  if(_pendingGSpike !== null){
    const elapsed = Date.now() - _pendingGSpike.ts;
    if(elapsed >= FALL_CONFIRM_WINDOW_MS){
      if(leanAbs !== null && leanAbs > FALL_CONFIRM_LEAN_DEG && Date.now() - _lastGSpikeLogTs > FALL_LOG_COOLDOWN_MS){
        logFallEvent('gspike-confirmed', `сплеск ${_pendingGSpike.g}G, кут через 2.5с все ще ${V.Lean}°`);
        _lastGSpikeLogTs = Date.now();
      }
      // Інакше — це була кочка (кут повернувся до норми): просто ігноруємо, без toast.
      _pendingGSpike = null;
    }
  }
}, 300);

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
// Той самий sleep, але його можна "розбудити" достроково (kickReconnectNow) —
// потрібно для швидкого тапу під час автоперепідключення: замість очікування
// повної паузи (1.5с/5с) одразу пробуємо підключитись ще раз.
let _reconnectKick=null;
function interruptibleSleep(ms){
  return new Promise(resolve=>{
    const t=setTimeout(()=>{ _reconnectKick=null; resolve(); }, ms);
    _reconnectKick=()=>{ clearTimeout(t); resolve(); };
  });
}
function kickReconnectNow(){
  if(_reconnectKick){ const k=_reconnectKick; _reconnectKick=null; k(); }
}

// КРИТИЧНО: bDev.gatt.connect() інколи "зависає" назавжди — не резолвиться
// і не падає з помилкою (типово, коли пристрій поза зоною досяжності саме
// в момент виклику). Без таймауту весь цикл перепідключення застрягав на
// цій одній спробі, і жодне "розбудження ззовні" вже не допомагало, бо
// цикл не спав — він був застряглий усередині самого await. Обгортаємо
// підключення в перегони з таймером.
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')), ms))
  ]);
}

const CHUNK = 20;
async function sendCmd(cmd){
  if(!bChr||!bConn)return;
  try{
    if(cmd.length <= CHUNK){
      await bChr.writeValue(cmd);
    } else {
      for(let i=0;i<cmd.length;i+=CHUNK){
        const chunk = cmd.slice(i, i+CHUNK);
        await bChr.writeValue(chunk);
        await sleep(3);
      }
    }
  }catch(e){}
}

async function initSession(){
  await sendCmd(CMD_ATSECU);   await sleep(103);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_ZERO);      await sleep(115);
  await sendCmd(CMD_FIRMWARE);  await sleep(75);
  await sendCmd(CMD_UNK50);     await sleep(3800);
  await sendCmd(CMD_SUBSCRIBE); await sleep(500);
}

function parse20Byte(pkt){
  if(pkt.length !== 20) return false;
  if(pkt[0] === 0xfc) return false;
  const teng = pkt[6] - 28;
  const rpm  = (pkt[2]<<8)|pkt[3];
  const volt = pkt[5] / 10.0;
  const ap   = pkt[11];
  // T_Air: НОВА гіпотеза (заміна pkt[10]/2). Підтверджено сьогодні на
  // працюючому двигуні, потребує ще перевірки в різних умовах.
  const tair = pkt[0] - 28;
  const tpsRaw = pkt[4];
  let matched = false;
  if(teng > -10 && teng < 150){ V.T_Eng = Math.round(teng); matched = true; }
  if(rpm  > 200 && rpm  < 15000){ V.RPM = rpm; matched = true; }
  if(volt > 9.5 && volt < 16){ V.Volt = volt.toFixed(1); matched = true; }
  if(ap >= 0 && ap <= 150){ V.MAP = ap; matched = true; }
  if(tair > -20 && tair < 80){ V.T_Air = Math.round(tair*10)/10; matched = true; }
  if(tpsRaw >= 0 && tpsRaw <= 255){
    _tpsRawLast = tpsRaw;
    if(TC.min !== null && TC.max !== null && TC.max !== TC.min){
      let pct = (tpsRaw - TC.min) / (TC.max - TC.min) * 100;
      V.TPS = Math.round(Math.max(0, Math.min(100, pct))*10)/10;
    } else { V.TPS = tpsRaw; }
    matched = true;
  }
  return matched;
}

// ── ПАРАЛЕЛЬНИЙ 19-БАЙТНИЙ ПАКЕТ ──
// Inj_Rate ЗНАЙДЕНО і ПІДТВЕРДЖЕНО живим порівнянням з офіційним додатком:
// byte[7] цього пакета (НЕ 20-байтного!) × 0.39 + 0.40 дало точний збіг
// (raw=11 → 4.69мс, raw=12 → 5.08мс — рівно ті самі числа, що показував
// офіційний додаток в той самий момент). Попередні кандидати з 20-байтного
// пакета (pkt[9], pkt[1], pkt[11]) були або спростовані, або занадто шумні.
function parse19Byte(pkt){
  if(pkt.length !== 19) return false;
  const injRaw = pkt[7];
  if(injRaw >= 0 && injRaw <= 255){
    V.Inj_Rate = Math.round((injRaw*0.39+0.40)*100)/100;
    return true;
  }
  return false;
}

function onData(e){
  _lastPacketTs=Date.now();
  const b=new Uint8Array(e.target.value.buffer);
  if(b.length===19) parse19Byte(b);
  else parse20Byte(b);
  ud();ca();
}

let _lastPacketTs=0;
const WATCHDOG_MS=4000;
let _watchdogInt=null;
function armWatchdog(){
  _lastPacketTs=Date.now();
  if(_watchdogInt) clearInterval(_watchdogInt);
  _watchdogInt=setInterval(()=>{
    if(userDisconnected || reconnecting) return;
    if(!bConn) {
      clearInterval(_watchdogInt);
      _watchdogInt = null;
      return;
    }
    if(Date.now()-_lastPacketTs>WATCHDOG_MS){
      try{ if(bDev&&bDev.gatt&&bDev.gatt.connected) bDev.gatt.disconnect(); }catch(e){}
    }
  },1000);
}

// РОЗБЛОКУВАННЯ WEB AUDIO (КРИТИЧНО ДЛЯ ЗВУКУ СИГНАЛІВ): AudioContext,
// створений НЕ безпосередньо в межах жесту користувача (клік/тап), на iOS
// Safari стартує в стані 'suspended' — заплановані звуки виконуються без
// жодної помилки в консолі, але фізично НЕ чутні. Раніше audioCtx
// створювався лінькво лише в момент першого спрацювання сирени/біпу

function unlockAudioOnGesture(){
  try{
    const ac=gac();
    if(ac.state==='suspended') ac.resume();
  }catch(e){}
}

/* ── WAKE LOCK + FULLSCREEN при підключенні ──
   Wake Lock API підтримується в iOS Safari 16.4+ (працює, ПОКИ вкладка видима).
   Важливо: коли вкладка йде у фон (наприклад, ти перемкнувся на Google Maps,
   а наш дашборд лишився тільки як плаваюче PiP-вікно), iOS сам автоматично
   знімає wake lock — це обмеження самої специфікації, обійти його неможливо.
   Тобто це вбереже екран від сну, ПОКИ ти дивишся саме на наш дашборд,
   але не гарантує цього під час навігації в іншому додатку з активним PiP. */
let _wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
    }
  }catch(e){}
}
// ── ПРЯМА СПРОБА ПЕРЕПІДКЛЮЧЕННЯ ПРИ ПОВЕРНЕННІ НА ПЕРЕДНІЙ ПЛАН ──
// Раніше ця логіка намагалась "розбудити" фоновий цикл перепідключення
// (kickReconnectNow), але якщо цикл був застряглий УСЕРЕДИНІ зависаючого
// gatt.connect() (а не спав між спробами) — жодне розбудження не
// допомагало. Тепер робимо як прямий тап по кнопці Connect: одразу й
// безумовно пробуємо підключитись, з таймаутом 8с. Якщо не вийшло —
// запускаємо звичайний фоновий цикл (з паузами) для подальших спроб.
async function foregroundReconnectNow(){
  if(userDisconnected || !bDev || bConn) return;
  reconnecting = true;
  const btn=document.getElementById('cb'), bs=document.getElementById('bs');
  btn.textContent='⏳…'; btn.className='pill go';
  bs.textContent='Перепідключення…'; bs.className='pill err';
  try{
    const srv = await withTimeout(bDev.gatt.connect(), 8000);
    bChr = await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bChr.addEventListener('characteristicvaluechanged', onData);
    await bChr.startNotifications();
    bConn=true; btn.textContent='🟢 '+(bDev.name||'OK'); btn.className='pill ok';
    bs.textContent=bDev.name||'Connected'; bs.className='pill on';
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--')); ud();
    requestWakeLock();
    await initSession();
    armWatchdog();
    reconnecting=false;
  }catch(e){
    reconnecting=false;
    onUnexpectedDisconnect(); // не вийшло миттєво — далі звичайний фоновий цикл з паузами
  }
}

document.addEventListener('visibilitychange', async ()=>{
  if(_wakeLock===null && document.visibilityState==='visible' && bConn){
    requestWakeLock();
  }
  // Аудіо-контекст теж може "заснути" разом з рештою сторінки у фоні —
  // відновлюємо його одразу, як тільки додаток знову видимий.
  if(document.visibilityState==='visible' && audioCtx && audioCtx.state==='suspended'){
    try{ audioCtx.resume(); }catch(e){}
  }
  if(document.visibilityState==='visible' && !userDisconnected && bDev && !bConn){
    foregroundReconnectNow();
  }
});

// Fullscreen API: ВИМКНЕНО навмисно. У Bluefy жест "потягнути сторінку вниз"
// одночасно керує і оновленням сторінки, і власним перемикачем
// повноекранного режиму браузера — наш програмний виклик requestFullscreen()
// конфліктував із цим жестом. Функції лишені як no-op, щоб усі виклики по
// коду (при підключенні/відключенні) не ламались.
function requestFullscreenSafe(){ /* навмисно нічого не робить */ }
function exitFullscreenSafe(){ /* навмисно нічого не робить */ }

  const btn=document.getElementById('cb');

  // ── ПОВНЕ ВІДКЛЮЧЕННЯ (довге натискання) ──
  async function fullDisconnect(){
    userDisconnected=true; // зупиняє будь-який активний цикл перепідключення
    kickReconnectNow(); // якщо цикл спить в очікуванні — будимо його одразу, щоб він побачив userDisconnected і вийшов
    if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
    try{await sendCmd(CMD_STOP);}catch(e){}
    try{bDev&&bDev.gatt.disconnect();}catch(e){}
    bConn=false;reconnecting=false;
    btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='bLink3';
    document.getElementById('bs').className='pill';stopAlert();
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
    exitFullscreenSafe();
  }

  // ── ПЕРВІСНЕ ПІДКЛЮЧЕННЯ (немає ще жодного відомого пристрою) ──
  async function initialConnect(){
    userDisconnected=false;
    btn.textContent='⏳…';btn.className='pill go';
    try{
      bDev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
      bDev.addEventListener('gattserverdisconnected',onUnexpectedDisconnect);
      const srv=await withTimeout(bDev.gatt.connect(), 8000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      document.getElementById('bs').textContent=bDev.name||'Connected';
      document.getElementById('bs').className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
    }catch(e){
      bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
      document.getElementById('bs').textContent='Error';
      document.getElementById('bs').className='pill err';
    }
  }

  // ── ШВИДКИЙ ТАП: "просто перепідключення" ──
  // ГОЛОВНИЙ ФІКС: раніше швидкий тап під час автоперепідключення викликав
  // requestDevice() ЗНОВУ (новий пікер OS), а старий цикл перепідключення при
  // цьому й далі працював у фоні — два паралельні процеси на той самий
  // пристрій, звідси нестабільність. Тепер: якщо bDev вже відомий з цієї
  // сесії — НІКОЛИ не викликаємо requestDevice() повторно, а або форсуємо
  // "kick" активного циклу перепідключення (миттєвий ретрай замість очікування
  // паузи), або, якщо зараз під'єднано — робимо швидкий розрив+перепідключення
  // через той самий цикл (замість повного ручного розриву).
  async function quickReconnect(){
    if(!bDev){
      // Немає ще жодного відомого пристрою цієї сесії — це первісне підключення.
      await initialConnect();
      return;
    }
    userDisconnected=false;
    if(reconnecting){
      // Цикл перепідключення вже йде (спить між спробами) — будимо його одразу.
      kickReconnectNow();
      return;
    }
    if(bConn){
      // Підключено, але користувач хоче "перепідключити" (наприклад, дані
      // виглядають застряглими) — розриваємо, onUnexpectedDisconnect сам
      // підхопить і одразу почне перепідключення (перша спроба — швидка).
      try{ bDev.gatt.disconnect(); }catch(e){}
      return;
    }
    // Не підключено, не в процесі — користувач раніше зробив довге натискання
    // (повне відключення). Пробуємо перепідключитись до вже відомого
    // пристрою НАПРЯМУ, без нового пікера.
    btn.textContent='⏳…';btn.className='pill go';
    try{
      const srv=await withTimeout(bDev.gatt.connect(), 8000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      document.getElementById('bs').textContent=bDev.name||'Connected';
      document.getElementById('bs').className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
    }catch(e){
      bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
      document.getElementById('bs').textContent='Error';
      document.getElementById('bs').className='pill err';
    }
  }

  // ── РОЗПІЗНАВАННЯ ЖЕСТУ: швидкий тап vs довге натискання ──
  const LONG_PRESS_MS=550;
  let pressTimer=null, longFired=false;
  btn.addEventListener('pointerdown',()=>{
    unlockAudioOnGesture(); // саме тут гарантовано є user-gesture (iOS вимагає це)
    longFired=false;
    pressTimer=setTimeout(()=>{
      longFired=true;
      if(navigator.vibrate) try{navigator.vibrate(30);}catch(e){}
      fullDisconnect();
    },LONG_PRESS_MS);
  });
  const cancelPress=()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} };
  btn.addEventListener('pointerup',()=>{
    cancelPress();
    if(!longFired) quickReconnect();
  });
  btn.addEventListener('pointerleave',cancelPress);
  btn.addEventListener('pointercancel',cancelPress);
}
setupBleUI(); // одноразове налаштування при завантаженні (НЕ на кожен клік —
// раніше через це на кожен клік Connect/Disconnect ще й додавався ЗАЙВИЙ
// дублікат слухача 'visibilitychange', який назавжди лишався висіти)

async function onUnexpectedDisconnect(){
  bConn=false;stopAlert();
  if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
  Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
  exitFullscreenSafe();
  const btn=document.getElementById('cb'),bs=document.getElementById('bs');
  if(userDisconnected||reconnecting)return;
  reconnecting=true;
  bs.textContent='Перепідключення…';bs.className='pill err';
  btn.textContent='⏳…';btn.className='pill go';
  let attempt=0;
  while(!userDisconnected){
    attempt++;
    // Перші 10 спроб — швидко (кожні 1.5с), далі — рідше (кожні 5с), щоб не
    // спамити спроби годинами і берегти батарею, якщо сигнал пропав надовго
    // (двигун заглушений, відійшов від мотоцикла тощо). АЛЕ цикл більше НЕ
    // здається — раніше він зупинявся після 10 спроб (~15с) і дашборд
    // назавжди зависав на "Перепідключення…", навіть якщо сигнал повертався
    // пізніше. Тепер спроби тривають, поки користувач сам не натисне Disconnect.
    const delay = attempt<=10 ? 1500 : 5000;
    await interruptibleSleep(delay);
    if(userDisconnected) break;
    try{
      const srv=await withTimeout(bDev.gatt.connect(), 8000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      bs.textContent=bDev.name||'Connected';bs.className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
      reconnecting=false;
      return;
    }catch(e){
      // Оновлюємо лічильник спроб на екрані — щоб було видно, що процес живий,
      // а не завис (раніше текст просто застигав на "Перепідключення…" назавжди).
      bs.textContent='Перепідключення… (#'+attempt+')';
    }
  }
  reconnecting=false;
}

let editMode=false,nid=20,ptile=null;

// В ландшафтній орієнтації кількість колонок підлаштовується під кількість тайлів,

function applyGridColumns(){
  const isLandscape = window.matchMedia('(orientation: landscape)').matches;
  gi.style.gridTemplateColumns = isLandscape ? 'repeat(12, 1fr)' : '';
}
window.addEventListener('resize', applyGridColumns);

function render(){
  applyGridColumns();
  const videoTile = document.getElementById('dash-video-tile');
  gi.innerHTML = '';
  if(videoTile) gi.appendChild(videoTile);

  lay.forEach(tile=>{
    const el=mkTile(tile);

function mkTile(tile){
  const p=P[tile.k];
  const el=document.createElement('div');
  el.className='tile '+tile.sz+(editMode?' ed':'');
  el.dataset.id=tile.id;el.style.setProperty('--pc',p.c);
  
  const rm=document.createElement('div');rm.className='rm';rm.textContent='✕';
  rm.addEventListener('click',(e)=>{
    e.stopPropagation();
    lay=lay.filter(t=>t.id!==tile.id);saveLay();render();
  });
  el.appendChild(rm);

  if(tile.st==='gauge' && tile.sz==='s22'){
    el.appendChild(mkG(tile,p));
  }else{
    el.appendChild(mkF(tile,p));
  }
  el.addEventListener('click',()=>{
    if(editMode){ptile=tile;cpk();return;}
    if(tile.k==='Lean') onLeanTileTap();
  });
  return el;
}

function mkG(tile,p){

    <path class="gbg" d="M 20 80 A 40 40 0 1 1 80 80"/>

  </svg>`;
  const gc=document.createElement('div');gc.className='gc';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  gc.append(l,v);w.appendChild(gc);

function ug(id,k){
  const path=document.getElementById('gfg_'+id);if(!path)return;
  const p=P[k],v=parseFloat(V[k]);
  if(isNaN(v)){path.style.strokeDashoffset=188.4;return;}
  const pct=Math.max(0,Math.min(1,(v-p.mn)/(p.mx-p.mn)));
  path.style.strokeDashoffset=188.4-(188.4*pct);
}

let prevV={};
function ud(){

/* ── АДАПТИВНИЙ ВІДЕО-ПОТОК (ШВИДКІСТЬ + ТЕМПЕРАТУРА) ── */
const pipCanvas = document.getElementById('pip-canvas');
const pctx = pipCanvas.getContext('2d');
const pipVideo = document.getElementById('pip-video');
let pipDrawInterval=null;
let pipInitialized=false;

// Малює заокруглений прямокутник (ручний path — надійніше за ctx.roundRect
// на старих версіях Safari/Bluefy, де підтримка нативного методу непевна).
// Ті самі кольори станів, що й у CSS (.tile.cold/.warn/.alrt) — щоб відео-плитка
// візуально співпадала зі звичайними тайлами при спрацюванні порогів.
const STATE_COLORS = {
  cold: {c:'#3b82f6', bg:'rgba(59,130,246,0.10)'},
  warn: {c:'#ffd33f', bg:'rgba(255,211,63,0.10)'},
  alrt: {c:'#ff4d4d', bg:'rgba(255,77,77,0.16)'},
};
// Пульсація на критичному стані (наближено до keyframes palrt, 1.1s цикл).
function pulseAlpha(){
  return 0.55 + 0.45*Math.sin(Date.now()/175);
}

function drawTileLikeColumn(cx, W, H, label, baseColor, value, state, isPip){
  const sc = STATE_COLORS[state];
  const color = sc ? sc.c : baseColor;

  if(isPip){
    // РЕЖИМ РЕАЛЬНОГО PiP: без підпису й лінії — тільки максимально велика
    // цифра по центру. Базовий розмір ~78% висоти канвасу (в межах
    // запрошеного діапазону 75-80%), АЛЕ якщо значення трьохзначне (чи
    // взагалі довше, ніж влазить по ширині колонки) — шрифт автоматично
    // зменшується, щоб цифри не наїжджали одна на одну й не вилазили за
    // межі своєї половини (той самий "кашею" баг з 2-3-значними числами,
    // напр. T_Eng=100° чи GPS=100 км/год).
    const str = String(value);
    const maxWidth = W * 0.90; // невеликий відступ від країв колонки
    let valueFont = Math.floor(H*0.75);
    pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
    let textWidth = pctx.measureText(str).width;
    if(textWidth > maxWidth){
      valueFont = Math.floor(valueFont * (maxWidth / textWidth));
      pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
    }
    pctx.fillStyle = '#fff';
    pctx.textBaseline = 'middle';
    pctx.textAlign = 'center';
    pctx.fillText(str, cx, H*0.54);
    return;
  }

  // ЗВИЧАЙНИЙ ВИГЛЯД (плитка на сторінці поза PiP) — підпис + лінія + цифра,
  // як і раніше.
  const labelFont = Math.max(9, Math.floor(H*0.075));
  const valueFont = Math.floor(H*0.32);
  const labelY = H*0.30;
  const underlineY = H*0.40;
  const valueY = H*0.68;

  pctx.fillStyle = color;
  pctx.font = `700 ${labelFont}px 'Rajdhani','Segoe UI',sans-serif`;
  pctx.textBaseline = 'middle';
  const spacing = 2;
  const chars = String(label).split('');
  let totalW = 0;
  chars.forEach(c=>{ totalW += pctx.measureText(c).width + spacing; });
  totalW -= spacing;
  let x = cx - totalW/2;
  pctx.textAlign = 'left';
  chars.forEach(c=>{
    const w = pctx.measureText(c).width;
    pctx.fillText(c, x, labelY);
    x += w + spacing;
  });

  pctx.strokeStyle = color;
  pctx.globalAlpha = 0.45;
  pctx.lineWidth = 1;
  pctx.beginPath();
  pctx.moveTo(cx - W*0.09, underlineY);
  pctx.lineTo(cx + W*0.09, underlineY);
  pctx.stroke();
  pctx.globalAlpha = 1;

  pctx.fillStyle = '#fff';
  pctx.font = `700 ${valueFont}px 'JetBrains Mono','Courier New',monospace`;
  pctx.textAlign = 'center';
  pctx.fillText(String(value), cx, valueY);
}

function drawPipFrame(){
  if(!pctx)return;

  const rect = pipVideo.getBoundingClientRect();
  const W = rect.width || 400;
  const H = rect.height || 200;

  if(pipCanvas.width !== W || pipCanvas.height !== H) {
    pipCanvas.width = W;
    pipCanvas.height = H;
  }

  // Базовий фон — та сама панель, що й у звичайного тайла. Зовнішню рамку/
  // заокруглення дає сам контейнер .video-tile (border-radius+overflow:hidden),
  // тут малюємо лише вміст усередині — жодних власних зовнішніх рамок,
  // інакше виходить "подвійний контур" по кутах.
  pctx.fillStyle='#0d0d0f';
  pctx.fillRect(0,0,W,H);

  const gap = 3;               // тонкий прямий проміжок по центру, на всю висоту
  const cardW = (W - gap) / 2;

  const tEngState = videoAlertState.T_Eng;
  const gpsState  = videoAlertState.GPS;

  // Тінт стану (cold/warn/alrt) — заливка прямокутником, без рамок/заокруглень,
  // рівно в межах своєї половини (від верху до низу).
  [[0,           cardW, tEngState],
   [cardW+gap,   cardW, gpsState ]].forEach(([x0,w,state])=>{
    const sc = STATE_COLORS[state];
    if(!sc) return;
    pctx.globalAlpha = state==='alrt' ? pulseAlpha() : 1;
    pctx.fillStyle = sc.bg;
    pctx.fillRect(x0, 0, w, H);
    pctx.globalAlpha = 1;
  });

  // Проміжок по центру — прямий, на всю висоту (від самого верху до самого низу),
  // без заокруглень з боків (тільки центральна лінія розділення).
  pctx.fillStyle='#000000';
  pctx.fillRect(cardW, 0, gap, H);

  let speed=String(V.GPS);
  if(speed==='--' || speed==='undefined') speed='0';
  let temp=String(V.T_Eng);
  if(temp==='undefined') temp='--';

  // Реальний PiP визначаємо через клас .pip-active, який підтримує
  // syncPipActiveClass() — вона вже й так надійно фіксить випадок, коли
  // webkitPresentationMode "зависає" на iOS і не скидається після закриття
  // системного PiP-вікна. Пряма перевірка тут окремо від класу якраз і
  // призводила до застряглих великих цифр без підписів після виходу з PiP.
  const dashTileEl = document.getElementById('dash-video-tile');
  const isPip = !!(dashTileEl && dashTileEl.classList.contains('pip-active'));

  drawTileLikeColumn(cardW/2, cardW, H, 'T_ENG', '#3b82f6', temp, tEngState, isPip);
  drawTileLikeColumn(cardW + gap + cardW/2, cardW, H, 'GPS', '#37e0e6', speed, gpsState, isPip);
}

// Таймер у Web Worker — на відміну від звичайного setInterval на сторінці,
// НЕ гальмується і НЕ призупиняється iOS Safari, коли вкладка йде у фон
// (а саме це відбувається під час активного PiP — сторінка вважається "прихованою").
let _pipWorker=null;
function startPipWorkerTimer(){
  if(_pipWorker)return;
  const workerCode=`setInterval(()=>postMessage(1),1000);`;
  const blob=new Blob([workerCode],{type:'application/javascript'});
  _pipWorker=new Worker(URL.createObjectURL(blob));
  _pipWorker.onmessage=()=>drawPipFrame();
}

function initPipStream(){
  if(pipInitialized)return;
  
  // Перевіряємо підтримку API перед запуском потоку
  const isPipSupported = ('requestPictureInPicture' in document.createElement('video')) || (pipVideo.webkitSetPresentationMode);
  if (!isPipSupported) {
    document.getElementById('pipBtnTop').style.color = '#ff4d4d';
    return;
  }

  pipInitialized=true;
  drawPipFrame();
  const stream = pipCanvas.captureStream(30);
  pipVideo.srcObject = stream;
  
  pipVideo.muted = true;
  pipVideo.play().catch(()=>{});
  
  try{ startPipWorkerTimer(); }
  catch(e){
    // Fallback, якщо Worker з якоїсь причини недоступний
    if(pipDrawInterval) clearInterval(pipDrawInterval);
    pipDrawInterval = setInterval(drawPipFrame, 1000);
  }
}

/* ── КЛЮЧОВИЙ ОБХІД БЛОКУВАННЯ (З КЛИКУ КОРИСТУВАЧА) ── */
// Надійна синхронізація класу pip-active з РЕАЛЬНИМ станом PiP —
// не покладаємось лише на подію leavepictureinpicture/webkitpresentationmodechanged,
// бо на деяких пристроях (iOS Bluefy) вона може не спрацювати, і клас "застрягає"
// увімкненим назавжди, роблячи відео тонким навіть поза PiP.
function syncPipActiveClass(){
  const dashTile = document.getElementById('dash-video-tile');
  if(!dashTile) return;
  let inPip = (document.pictureInPictureElement === pipVideo) ||
              (pipVideo.webkitPresentationMode === 'picture-in-picture');

  // ДОДАТКОВИЙ НАДІЙНИЙ СИГНАЛ: властивість webkitPresentationMode на iOS
  // іноді "зависає" на 'picture-in-picture' назавжди навіть після того, як
  // юзер закрив системне PiP-вікно хрестиком (а не кнопкою "розгорнути").
  // Але при закритті хрестиком відео практично завжди реально ставиться
  // на паузу — це і використовуємо як контрольний сигнал: якщо формально
  // "в PiP", а відео насправді paused — це і є той застряглий стан,
  // примусово скидаємо його і відновлюємо відтворення для наступних кадрів.
  if(inPip && pipVideo.paused){
    inPip = false;
    pipVideo.play().catch(()=>{});
  }

  dashTile.classList.toggle('pip-active', !!inPip);
  if(typeof drawPipFrame === 'function') drawPipFrame();
}
document.addEventListener('visibilitychange', ()=>{
  syncPipActiveClass();
  // На iOS властивість webkitPresentationMode іноді оновлюється з невеликою
  // затримкою після самої події — повторна перевірка ловить це надійніше.
  setTimeout(syncPipActiveClass, 300);
});
setInterval(syncPipActiveClass, 1000);

async function togglePipMode(){
  syncPipActiveClass();
  // Примусовий старт/ініціалізація в момент кліку
  initPipStream();
  drawPipFrame();

  const dashTile = document.getElementById('dash-video-tile');

  try {
    pipVideo.muted = true;

    const currentlyInPip = (document.pictureInPictureElement === pipVideo) ||
                            (pipVideo.webkitPresentationMode === 'picture-in-picture');
    if (currentlyInPip) {
      if(document.pictureInPictureElement){
        try{ await document.exitPictureInPicture(); }catch(e){}
      }
      if(pipVideo.webkitSetPresentationMode){
        try{ pipVideo.webkitSetPresentationMode('inline'); }catch(e){}
      }
      dashTile.classList.remove('pip-active');
      drawPipFrame(); // одразу повернути звичайний вигляд (підписи), не чекаючи воркер
      sht('PiP закрито');
      return;
    }

    dashTile.classList.add('pip-active');
    await new Promise(r=>requestAnimationFrame(r));
    drawPipFrame();

    await pipVideo.play(); // Робимо відео активним перед викликом режиму

    if (pipVideo.webkitSetPresentationMode) {
      // Обхід блокування Safari (iOS)
      pipVideo.webkitSetPresentationMode("picture-in-picture");
      drawPipFrame(); // миттєво прибрати підписи й збільшити цифри, не чекаючи воркер
      sht('PiP активовано (iOS)');
    } else if (document.pictureInPictureEnabled || 'requestPictureInPicture' in pipVideo) {
      // Обхід Android / Desktop Chrome
      await pipVideo.requestPictureInPicture();
      drawPipFrame();
      sht('PiP активовано');
    } else {
      dashTile.classList.remove('pip-active');
      alert('Ваш пристрій не підтримує PiP');
    }
  } catch(e) {
    dashTile.classList.remove('pip-active');
    sht('Помилка: ' + e.message);
    console.error(e);
  }
}
pipVideo.addEventListener('leavepictureinpicture', ()=>{ syncPipActiveClass(); drawPipFrame(); });
pipVideo.addEventListener('webkitpresentationmodechanged', ()=>{
  syncPipActiveClass();
  drawPipFrame();
  setTimeout(()=>{ syncPipActiveClass(); drawPipFrame(); }, 300);
});
// Розмір відео змінюється, коли реально повертаємось з PiP в звичайний режим —
// додатковий сигнал про всяк випадок, якщо основні події/властивість запізнюються.
pipVideo.addEventListener('resize', ()=>setTimeout(()=>{ syncPipActiveClass(); drawPipFrame(); }, 150));

// Захист від неочікуваної паузи ПОЗА станом PiP — деякі середовища перегляду
// (не тільки реальний iOS Safari/Bluefy, а й будь-який інший WebView з іншими
// політиками автовідтворення) можуть самі ставити відео на паузу без нашої
// команди. Якщо ми НЕ вважаємо, що зараз активний реальний PiP — це точно
// небажана пауза, відновлюємо одразу. Якщо ж pip-active активний — НІЧОГО
// тут не робимо: даємо спрацювати перевірці в syncPipActiveClass() (кожну
// секунду), яка саме через "paused" визначає застряглий вихід з PiP.
pipVideo.addEventListener('pause', ()=>{
  const dashTile = document.getElementById('dash-video-tile');
  const believedInPip = !!(dashTile && dashTile.classList.contains('pip-active'));
  if(!believedInPip){
    setTimeout(()=>{ pipVideo.play().catch(()=>{}); }, 50);
  }
});

// Подія для кнопки PiP у топбарі та кліку по відео-плитці
document.getElementById('pipBtnTop').addEventListener('click', togglePipMode);
document.getElementById('dash-video-tile').addEventListener('click', togglePipMode);

/* ── АВТОМАТИЧНА АКТИВАЦІЯ PiP ПРИ ПЕРЕХОДІ У ФОН (як у YouTube) ──
   YouTube не використовує свайп — PiP активується автоматично, коли
   сторінка стає невидимою (перехід на інший додаток, на робочий стіл,
   блокування екрана). Safari дозволяє викликати webkitSetPresentationMode
   ('picture-in-picture') саме в обробнику visibilitychange без свіжого
   жесту користувача — це офіційно підтримуваний шлях для відео, тим самим
   способом користується сам YouTube. */
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && bConn && !editMode){
    const dashTile = document.getElementById('dash-video-tile');
    const alreadyInPip = !!(dashTile && dashTile.classList.contains('pip-active'));
    if(!alreadyInPip) togglePipMode();
  }
});

});

      <div style="display:flex;gap:5px;padding:3px 5px;">
        <input type="number" step="0.1" id="ai_vw" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.Volt_warn}" placeholder="Warn">
        <input type="number" step="0.1" id="ai_vc" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);" value="${AL.Volt_crit}" placeholder="Crit">
      </div>
      <div class="gt">Ліміт швидкості GPS</div>
      <div style="display:flex;align-items:center;gap:10px;padding:5px;">
        <input type="number" id="ai_sl" class="sb" style="background:#111;color:#fff;border:1px solid var(--line);flex:1;" value="${AL.Spd_limit}">
        <label><input type="checkbox" id="ai_se" ${AL.Spd_enabled!==false?'checked':''}> Увімкнено</label>
      </div>
      <div class="gt">Детекція падіння</div>
      <div style="display:flex;align-items:center;gap:10px;padding:5px;">
        <label><input type="checkbox" id="ai_fe" ${AL.Fall_enabled!==false?'checked':''}> Увімкнено (акселерометр телефону, без BLE)</label>
      </div>
      <button class="ab pr" style="margin-top:12px;" onclick="svAl()">Зберегти сигнали</button>
    `;
  }
}

/* ── ЕКСПОРТ / ІМПОРТ НАЛАШТУВАНЬ ── */
// Зберігає розташування тайлів, які параметри в них виводяться, та всі пороги сигналів
// (температура, вольтаж, ліміт швидкості) і калібрування TPS в один текстовий блок.
function exportSettings(){
  const dump={workspaces:workspaces, activeWs:activeWsId, al:AL, tpscal:TC, v:2};
  const text=JSON.stringify(dump);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>{
      sht('Скопійовано в буфер обміну! Встав кудись, щоб зберегти.');
    }).catch(()=>{
      prompt('Скопіюй цей текст (Ctrl/Cmd+C) і збережи його:', text);
    });
  } else {
    prompt('Скопіюй цей текст (Ctrl/Cmd+C) і збережи його:', text);
  }
}

function importSettings(){
  const text=prompt('Встав сюди раніше скопійований текст налаштувань:');
  if(!text)return;
  try{
    const dump=JSON.parse(text);
    if(!dump || typeof dump!=='object') throw new Error('bad format');
    if(Array.isArray(dump.workspaces) && dump.workspaces.length){
      workspaces=dump.workspaces;
      activeWsId=(dump.activeWs && workspaces.find(w=>w.id===dump.activeWs))?dump.activeWs:workspaces[0].id;
      ls('workspaces',workspaces);ls('activeWs',activeWsId);
      lay=activeWs().lay;
    } else if(Array.isArray(dump.lay)){
      // старий формат бекапу (один стіл) — кладемо в активний стіл
      lay=dump.lay;saveLay();
    }

    if(dump.al){ AL={...DA,...dump.al}; ls('al',AL); }
    if(dump.tpscal){ TC={...{min:0,max:170},...dump.tpscal}; ls('tpscal',TC); }
    sht('Налаштування імпортовано, перезавантажую…');
    setTimeout(()=>location.reload(),800);
  }catch(e){
    sht('Помилка: не вдалося розпізнати текст налаштувань');
  }
}

function svAl(){
  AL.T_cold=parseInt(document.getElementById('ai_tc').value)||64;
  AL.T_warn=parseInt(document.getElementById('ai_tw').value)||90;
  AL.T_crit=parseInt(document.getElementById('ai_cr').value)||96;
  AL.Volt_warn=parseFloat(document.getElementById('ai_vw').value)||12.5;
  AL.Volt_crit=parseFloat(document.getElementById('ai_vc').value)||11.8;
  AL.Spd_limit=parseInt(document.getElementById('ai_sl').value)||60;
  AL.Spd_enabled=document.getElementById('ai_se').checked;
  AL.Fall_enabled=document.getElementById('ai_fe').checked;
  ls('al',AL);ca();sht('Сигнали збережено');
}

function startTpsCal(){
  document.getElementById('em').classList.remove('sh');
  const modal=document.getElementById('pm');
  document.getElementById('pt').textContent='Калібрування TPS';
  const pb=document.getElementById('pb');
  pb.innerHTML=`
    <div style="text-align:center;padding:10px;font-size:14px;">
      <p>Відпустіть ручку газу повністю.</p>
      <div style="font-size:24px;font-family:monospace;margin:10px 0;" id="tps_raw_val">Raw: --</div>
      <button class="ab pr" id="btn_tps_min">Зафіксувати Нуль (0%)</button>
      <p style="margin-top:20px;">Затисніть газ на повну (100%).</p>
      <button class="ab dn" id="btn_tps_max" disabled>Зафіксувати Максимум (100%)</button>
    </div>
  `;
  modal.classList.add('sh');
  
  if(_tpsLiveTimer) clearInterval(_tpsLiveTimer);
  _tpsLiveTimer=setInterval(()=>{
    document.getElementById('tps_raw_val').textContent='Raw: '+(_tpsRawLast!==null?_tpsRawLast:'--');
  },300);

  document.getElementById('btn_tps_min').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMin=_tpsRawLast;
    sht('Нуль зафіксовано: '+tmpMin);
    document.getElementById('btn_tps_max').disabled=false;
  };
  let tmpMin=null,tmpMax=null;
  document.getElementById('btn_tps_max').onclick=()=>{
    if(_tpsRawLast===null){alert('Немає даних від BLE');return;}
    tmpMax=_tpsRawLast;
    if(tmpMax<=tmpMin){alert('Помилка: Максимум має бути більшим за Нуль');return;}
    TC={min:tmpMin,max:tmpMax};
    ls('tpscal',TC);
    sht('Калібрування завершено успішно!');
    if(_tpsLiveTimer) { clearInterval(_tpsLiveTimer); _tpsLiveTimer = null; }
    modal.classList.remove('sh');
  };
}

function cpk(){
  const m=document.getElementById('pm');
  const pb=document.getElementById('pb');
  pb.innerHTML='';
  
  if(editMode && ptile){
    document.getElementById('pt').textContent='Налаштувати плитку';
    const g=document.createElement('div');g.className='gt';g.textContent='Параметр';pb.appendChild(g);
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi'+(ptile.k===k?' sel':'');
      item.innerHTML=`<div class="pn2">${P[k].n}<span class="pc">${P[k].u}</span></div><div class="ck">✓</div>`;
      item.addEventListener('click',()=>{selp(k);});pl.appendChild(item);
    });
    pb.appendChild(pl);
    
    const stg=document.createElement('div');stg.className='gt';stg.textContent='Стиль';pb.appendChild(stg);
    const sr=document.createElement('div');sr.className='sr';
    [['flat','Цифри'],['gauge','Кільце']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.st||'flat')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selst(v));sr.appendChild(b);
    });pb.appendChild(sr);
    
    const szg=document.createElement('div');szg.className='gt';szg.textContent='Розмір';pb.appendChild(szg);
    const szr=document.createElement('div');szr.className='szr';
    [['s1','Міні'],['s21','1×1'],['s41','2×1'],['s22','2×2']].forEach(([v,l])=>{
      const b=document.createElement('div');b.className='sb'+((ptile?.sz||'s1')===v?' sel':'');
      b.textContent=l;b.addEventListener('click',()=>selsz(v));szr.appendChild(b);
    });pb.appendChild(szr);
    
    const db=document.createElement('button');db.className='ab dn';db.textContent='🗑 Видалити';
    db.addEventListener('click',()=>{lay=lay.filter(t=>t.id!==ptile.id);saveLay();m.classList.remove('sh');render();});
    pb.appendChild(db);
    m.classList.add('sh');
  } else if(editMode && !ptile){
    document.getElementById('pt').textContent='Додати нову плитку';
    const pl=document.createElement('div');pl.className='pl';
    Object.keys(P).forEach(k=>{
      const item=document.createElement('div');item.className='pi';
      item.innerHTML=`<div class="pn2">${P[k].n}</div>`;
      item.addEventListener('click',()=>{
        nid++;const nt={id:'t'+nid,k:k,st:'flat',sz:'s1'};
        lay.push(nt);saveLay();m.classList.remove('sh');render();
      });pl.appendChild(item);
    });
    pb.appendChild(pl);m.classList.add('sh');
  }
}

function selp(k){if(ptile){ptile.k=k;saveLay();render();cpk();}}
function selst(st){if(ptile){ptile.st=st;saveLay();render();cpk();}}
function selsz(sz){if(ptile){ptile.sz=sz;saveLay();render();cpk();}}

let htt=null;
function sht(txt){
  const el=document.getElementById('ht');el.textContent=txt;el.className='ht sh';
  clearTimeout(htt);htt=setTimeout(()=>el.className='ht',2000);
}

document.getElementById('eb').addEventListener('click',()=>{
  const m=document.getElementById('em');
  if(m.classList.contains('sh')) m.classList.remove('sh'); else { bmain(); m.classList.add('sh'); }
});
document.getElementById('emc').addEventListener('click',()=>document.getElementById('em').classList.remove('sh'));
document.getElementById('pmc').addEventListener('click',()=>{
  if(_tpsLiveTimer) { clearInterval(_tpsLiveTimer); _tpsLiveTimer = null; }
  document.getElementById('pm').classList.remove('sh');
});

// Старт
render();
// Первинна м'яка ініціалізація потоку
initPipStream();
</script>
