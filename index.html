<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>vRacer Dash Pro</title>
<script>
/* РУЧНЕ МАСШТАБУВАННЯ СТОРІНКИ (тест-режим, сесія #7):
   Додай до адреси в Bluefy ?zoom=105 (число = відсоток, 100 = звичайний
   розмір) і перезавантаж сторінку — щоб підібрати комфортний розмір
   тайлів методом проб, без нової збірки щоразу. Значення запам'ятовується
   в localStorage (ar_zoom), тож наступного разу можна відкривати БЕЗ
   ?zoom= в адресі — застосується останнє обране. Коли підбереш число —
   скажи його, і воно буде зашите в код назавжди (без потреби в
   localStorage/URL-параметрі). */
(function(){
  try{
    var params=new URLSearchParams(location.search);
    var z=params.get('zoom');
    if(z){ localStorage.setItem('ar_zoom', z); }
    else { z=localStorage.getItem('ar_zoom'); }
    if(z){
      var f=parseFloat(z);
      if(f>0){ document.documentElement.style.zoom=(f/100); }
    }
  }catch(e){ console.warn('zoom test init failed:', e); }
})();
</script>
<style>
:root{
  --bg:#000000;--panel:#0d0d0f;--line:rgba(255,255,255,0.07);
  --text:#f2f2f0;--muted:#666;
  --cyan:#37e0e6;--amber:#ffb74d;--red:#ff4d4d;
  --green:#4ade80;--blue:#3b82f6;--yellow:#ffd23f;
  --th:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
html,body{margin:0;padding:0;height:100%;width:100%;
  background:#000000 !important;color:#f2f2f0 !important;
  font-family:'Rajdhani','Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;}

/* TOPBAR */
.tb{position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:5px;
  padding:max(5px,env(safe-area-inset-top)) 8px 5px;
  background:#000000;border-bottom:1px solid var(--line);
  height:var(--th);}
.pill{border:1px solid var(--line);border-radius:6px;padding:5px 9px;
  font-size:12px;color:var(--muted);background:#0d0d0f;white-space:nowrap;cursor:pointer;}
.pill.on{color:#9be8ff;border-color:#2b6f7a;}
.pill.ok{color:#4ade80;border-color:rgba(74,222,128,0.4);}
.pill.err{color:#ff8080;border-color:rgba(255,77,77,0.3);}
.pill.go{color:var(--amber);border-color:rgba(255,183,77,0.3);}
.pill.sim{color:#c084fc;border-color:rgba(192,132,252,0.4);background:rgba(192,132,252,0.06);}
.pill.rec{color:#ff4d4d;border-color:rgba(255,77,77,0.5);background:rgba(255,77,77,0.08);animation:recPulse 1.2s ease-in-out infinite;}
@keyframes recPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
/* #bs (статус поряд з Connect) — приховано завжди, ОКРІМ стану помилки/
   перепідключення (клас .err). Ідле-напис "bLink3" і назва пристрою після
   успішного конекту дублювали інфо, що вже показує сама кнопка Connect
   (🟢 назва), тож їх прибрано без зміни жодного рядка JS — просто CSS. */
#bs{display:none;}
#bs.err{display:inline-block;}
/* Більша зона дотику для Connect (важко влучити в рукавичках), без зміни
   візуального розміру: невидимий ::before розширює лише хіт-тест на +15px
   з кожного боку, не займаючи місця в розкладці (position:absolute). */
#cb{position:relative;}
#cb::before{content:'';position:absolute;top:-15px;left:-15px;right:-15px;bottom:-15px;}
#eb{margin-left:auto;flex-shrink:0;border:1px solid var(--line);border-radius:6px;
  padding:5px 11px;font-size:12px;color:#f2f2f0;background:#0d0d0f;cursor:pointer;}
#eb.a{color:#000;background:var(--cyan);border-color:var(--cyan);font-weight:700;}
html.ar-landscape{--th:36px;}
html.ar-landscape .pill{font-size:11px;padding:3px 7px;}
html.ar-landscape #eb{font-size:11px;padding:3px 9px;}

/* GRID */
#grid{position:fixed;inset:0;background:#000000 !important;
  padding-top:calc(env(safe-area-inset-top) + var(--th) + 2px);
  padding-bottom:env(safe-area-inset-bottom,6px);overflow:hidden;}
#gi{display:grid;gap:5px;padding:5px;height:100%;align-content:start;
  grid-auto-flow:dense;
  grid-template-columns:repeat(4,1fr);grid-auto-rows:minmax(130px,170px);}
/* Сітку зроблено удвічі дрібнішою (12 колонок замість 6) — щоб влазило
   більше параметрів одночасно. Відео (span 8) і великі гейдж-тайли s22
   (span 4) навмисно збільшені вдвічі відносно нових колонок, щоб
   зберегти той самий візуальний розмір, що й раніше. Звичайні s21/s1
   тайли НЕ мають такого подвоєння — вони навмисно стають вдвічі
   вужчими, щоб у тому самому місці вміщалось удвічі більше параметрів.
   КЛАС (не @media) — керується вручну через ar-landscape, щоб не
   реагувати на фактичний фізичний поворот телефону. */
html.ar-landscape #gi{grid-template-columns:repeat(12,1fr);grid-auto-rows:minmax(100px,150px);}

/* TILES */
.tile{position:relative;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px;overflow:hidden;-webkit-touch-callout:none;will-change:auto;
  transition:background .4s,border-color .4s;}
.tile.s1{grid-column:span 1;grid-row:span 1;}
.tile.s22{grid-column:span 2;grid-row:span 2;}
.tile.s21{grid-column:span 2;grid-row:span 1;}
.tile.s41{grid-column:span 2;grid-row:span 1;} /* портрет: fallback, поводиться як s21 */

/* ВІДЕО-ПЛИТКА: нормальний вигляд за замовчуванням в обох орієнтаціях.
   При активації реального PiP (клас .pip-active) форма ВІДЕО НЕ змінюється —
   PiP-вікно зберігає ті самі пропорції, що й картка на екрані (більше не
   "пігулка" 7:1). Змінюється лише вміст, що малюється на канвасі (великі
   цифри без підписів) — див. drawPipFrame() / drawTileLikeColumn(). */
.video-tile {
  grid-column: 1 / -1;
  grid-row: span 1;
  position: relative;
  background: #0d0d0f;
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  width: 100%;
  height: 100%;
}
html.ar-landscape .video-tile{grid-column:span 8;grid-row:span 2;}
html.ar-landscape .tile.s22{grid-column:span 4;grid-row:span 2;}
html.ar-landscape .tile.s41{grid-column:span 4;grid-row:span 1;}
/* PiP більше не змінює форму відео — воно завжди залишається такого ж
   розміру/пропорцій, як звичайна картка (width:100%/height:100% з базового
   правила #pip-video нижче по коду вже це забезпечує). */

/* Alert States */
.tile.cold{background:rgba(59,130,246,0.90)!important;border-color:var(--cyan)!important;box-shadow:0 0 18px rgba(59,130,246,0.6)!important;}
.tile.warn{background:rgba(255,211,63,0.90)!important;border-color:var(--amber)!important;box-shadow:0 0 18px rgba(255,211,63,0.6)!important;}
.tile.alrt{background:rgba(255,77,77,0.90)!important;border-color:var(--red)!important;
  animation:palrt 0.6s ease-in-out infinite;}
@keyframes palrt{0%,100%{background:rgba(255,77,77,0.90);box-shadow:0 0 22px rgba(255,77,77,0.75);}50%{background:rgba(255,77,77,0.50);box-shadow:0 0 8px rgba(255,77,77,0.4);}}
.tile.ed{animation:jig .4s ease-in-out infinite;}
.tile.alrt.ed{animation:jig .4s;}
@keyframes jig{0%,100%{transform:rotate(0)}25%{transform:rotate(-.7deg)}75%{transform:rotate(.7deg)}}
.tile.ds{animation:none!important;box-shadow:0 0 0 2px var(--cyan),0 0 16px rgba(55,224,230,0.25)!important;transform:scale(1.03);z-index:20;}
.tile.dov{box-shadow:inset 0 0 0 2px var(--amber);}
.rm{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:#ff4d4d;color:#fff;
  align-items:center;justify-content:center;font-size:12px;font-weight:700;
  z-index:5;display:none;cursor:pointer;}
.tile.ed .rm{display:flex;}
.add{border-style:dashed;border-color:rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.01);color:var(--muted);font-size:26px;
  cursor:pointer;animation:none!important;}

/* TILE CONTENT */
.tl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--pc,var(--muted));margin-bottom:1px;text-align:center;
  white-space:normal;word-break:break-word;line-height:1.2;font-weight:700;}
.tv{font-family:'JetBrains Mono','Courier New',monospace;font-weight:700;
  line-height:1;color:#fff;letter-spacing:1px;font-size:clamp(22px,6.5vw,39px);}
.tu{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.tun{width:50%;height:1px;background:var(--pc,var(--cyan));opacity:0.45;margin:3px 0;}
.s22 .tv{font-size:clamp(35px,8.5vw,60px);}
.s21 .tv{font-size:clamp(24px,6.5vw,43px);}
html.ar-landscape .tl{font-size:11px;}
html.ar-landscape .tv{font-size:clamp(20px,5vw,35px);}
html.ar-landscape .s22 .tv{font-size:clamp(28px,6.5vw,47px);}
html.ar-landscape .s41 .tv{font-size:clamp(24px,6vw,42px);}
/* s21/s1 стали вдвічі вужчими (розділ вище) — шрифт зменшено відповідно,
   інакше цифри/довгі підписи (напр. "CYL1_AP") не влазять і переносяться. */
html.ar-landscape .s21 .tv{font-size:clamp(15px,4vw,26px);}
html.ar-landscape .s1 .tv{font-size:clamp(14px,4vw,24px);}
html.ar-landscape .tile.s1 .tl,html.ar-landscape .tile.s21 .tl{font-size:9px;}

/* GAUGE */
.gw{position:relative;width:100%;height:100%;min-height:50px;
  display:flex;align-items:center;justify-content:center;}
.gsvg{position:absolute;inset:0;width:100%;height:100%;}
.gc{display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;}
.gbg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:5;}
.gfg{fill:none;stroke:var(--pc,var(--cyan));stroke-width:5;stroke-linecap:round;}

/* MODALS */
.mb{position:fixed;inset:0;background:rgba(0,0,0,0.82);
  backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s ease;}
.mb.sh{opacity:1;pointer-events:auto;}
.ms{width:100%;max-width:620px;background:#0c0c0f;border:1px solid var(--line);
  border-radius:16px 16px 0 0;max-height:88vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .22s cubic-bezier(.2,.9,.3,1);
  padding-bottom:env(safe-area-inset-bottom);}
.mb.sh .ms{transform:translateY(0);}
.mh{padding:12px 14px 9px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.mh h3{margin:0;font-size:14px;letter-spacing:1px;font-weight:600;}
.mc2{border:none;background:rgba(255,255,255,0.05);color:var(--text);
  width:26px;height:26px;border-radius:50%;font-size:14px;cursor:pointer;}
.mbody{overflow-y:auto;padding:6px 11px;flex:1;}
.gt{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;padding:7px 5px 3px;}
.pl{display:flex;flex-direction:column;gap:2px;}
.pi{display:flex;align-items:center;justify-content:space-between;
  padding:9px 11px;border-radius:9px;background:rgba(255,255,255,0.03);
  border:1px solid transparent;font-size:13px;cursor:pointer;}
.pi.sel{border-color:var(--cyan);background:rgba(55,224,230,0.07);}
.pi .pn2{font-weight:600;}.pi .pc{color:var(--muted);font-size:10px;font-family:monospace;margin-left:5px;}
.pi .ck{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;}
.pi.sel .ck{border-color:var(--cyan);background:var(--cyan);color:#000;}
.sr,.szr{display:flex;gap:5px;padding:7px 5px;flex-wrap:wrap;}
.sb{flex:1;min-width:55px;border:1px solid var(--line);border-radius:9px;
  padding:8px 5px;text-align:center;font-size:11px;
  background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;}
.sb.sel{border-color:var(--cyan);color:#fff;background:rgba(55,224,230,0.07);}
.ab{width:100%;padding:10px;border-radius:9px;border:none;
  font-size:13px;font-weight:600;cursor:pointer;margin-bottom:7px;}
.ab.pr{background:rgba(55,224,230,0.1);border:1px solid rgba(55,224,230,0.35);color:#9be8ff;}
.ab.dn{background:rgba(255,77,77,0.07);border:1px solid rgba(255,77,77,0.25);color:#ff8080;}
.tbar{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:10px;font-weight:600;
  letter-spacing:1px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.a{color:var(--cyan);border-bottom-color:var(--cyan);}
.ht{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.95);border:1px solid var(--line);
  padding:6px 14px;border-radius:18px;font-size:11px;color:var(--muted);
  z-index:80;opacity:0;transition:opacity .25s ease;pointer-events:none;white-space:nowrap;}
.ht.sh{opacity:1;}
#blog{position:fixed;bottom:48px;left:7px;right:7px;background:rgba(0,0,0,0.97);
  border:1px solid var(--line);border-radius:9px;padding:6px 9px;
  font-family:monospace;font-size:10px;color:#4ade80;z-index:70;
  max-height:80px;overflow-y:auto;display:none;}
#blog.sh{display:block;}
/* ── РАДАР КАМЕР (перестильовано під наш дашборд, не смак Gemini) ── */
.cam-radar-badge{
  position:absolute;top:6px;right:8px;display:none;align-items:center;gap:6px;
  background:var(--panel);border:1px solid var(--line);
  padding:3px 8px;border-radius:14px;z-index:10;
  font-family:'Rajdhani','Segoe UI',sans-serif;
}
.cam-radar-badge .c-sign{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  background:#fff;border:2px solid var(--red);color:#000;
  font-family:'JetBrains Mono','Courier New',monospace;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.cam-radar-badge .c-dist{
  font-family:'JetBrains Mono','Courier New',monospace;
  font-size:11px;font-weight:700;color:var(--text);
}
/* Наближення < 100м — миготіння відстані (як і раніше) */
.cam-radar-badge.near .c-dist{color:var(--red);animation:camDistFlash .4s infinite alternate;}
@keyframes camDistFlash{0%{opacity:.5;}100%{opacity:1;}}
/* Перевищення ліміту камери — сам знак-коло змінює колір, як реальний дорожній знак */
.cam-radar-badge.warn .c-sign{background:var(--amber);border-color:var(--amber);}
.cam-radar-badge.danger .c-sign{background:var(--red);border-color:var(--red);animation:camDangerFlash .5s infinite alternate;}
@keyframes camDangerFlash{0%{opacity:.55;}100%{opacity:1;}}
/* Типи камер за адресою з реєстру (闖紅燈=світлофор, 科技執法=тех.контроль).
   В NPA_TD1.csv таких мало (напр. лише кілька світлофорних по факту), і решта
   лишається типом 'speed' зі звичайним числом — тому іконки тут лише
   ПОВЕРХ звичного .c-sign, розмір підібраний під наявний круг 20×20px
   (в оригінальному фрагменті було 22-24px — це переповнило б круг). */
.cam-radar-badge .c-sign.cam-type-redlight{background:#1a1a1a;border-color:var(--red);font-size:12px;}
.cam-radar-badge .c-sign.cam-type-tech{background:#1e1b4b;border-color:#818cf8;font-size:11px;}
</style>
</head>
<body>

<div class="tb">
  <button id="cb" class="pill">🔵 Connect</button>
  <div id="bs" class="pill"></div>
  <button id="resetBtn" class="pill">Скинути</button>
  <button id="pipBtnTop" class="pill">PiP</button>
  <button id="tripBtn" class="pill">Trip</button>
  <button id="eb">Налаштувати</button>
</div>

<div id="grid">
  <div id="gi">
    <div id="dash-video-tile" class="video-tile">
      <video id="pip-video" playsinline muted style="width:100%; height:100%; object-fit:cover; background:#000;"></video>
    </div>
  </div>
</div>

<div id="blog"></div>
<div class="ht" id="ht"></div>

<div class="mb" id="em">
  <div class="ms">
    <div class="mh"><h3>Налаштувати</h3><button class="mc2" id="emc">✕</button></div>
    <div class="tbar">
      <div class="tab a" id="t0" onclick="st(0)">ЕКРАН</div>
      <div class="tab" id="t1" onclick="st(1)">СИГНАЛИ</div>
    </div>
    <div class="mbody" id="emb"></div>
  </div>
</div>

<div class="mb" id="pm">
  <div class="ms">
    <div class="mh"><h3 id="pt">Параметр</h3><button class="mc2" id="pmc">✕</button></div>
    <div class="mbody" id="pb"></div>
  </div>
</div>

<canvas id="pip-canvas" style="display: none;"></canvas>

<script>
const P={
  RPM:      {n:'RPM',      o:-1, s:0,sc:1,    b:0,  u:'rpm', mn:0,   mx:9000,c:'#ffd23f',src:'ble'},
  T_Eng:    {n:'T_Eng',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:0,   mx:130, c:'#3b82f6',src:'ble'},
  TPS:      {n:'TPS%',    o:-1, s:0,sc:1,    b:0,  u:'%',   mn:0,   mx:100, c:'#37e0e6',src:'ble'},
  GPS:      {n:'GPS',     o:-1, s:0,sc:1,    b:0,  u:'km/h',mn:0,   mx:300, c:'#37e0e6',src:'gps'},
  Volt:     {n:'Volt',    o:-1, s:0,sc:1,    b:0,  u:'V',   mn:10,  mx:16,  c:'#4ade80',src:'ble'},
  T_Air:    {n:'T_Air',   o:-1, s:0,sc:1,    b:0,  u:'°C',  mn:-20, mx:80,  c:'#06b6d4',src:'ble'},
  Inj_Rate: {n:'Inj Rate',o:-1, s:0,sc:1,    b:0,  u:'мс',   mn:0,   mx:25,  c:'#ff9f43',src:'ble'},
  MAP:      {n:'Cyl1 AP',  o:-1, s:0,sc:1,    b:0,  u:'psi',  mn:0,  mx:100, c:'#a29bfe',src:'ble'},
  Alt:      {n:'GPS H',    o:-1, s:0,sc:1,    b:0,  u:'м',    mn:0,  mx:3000,c:'#37e0e6',src:'gps'},
  Gforce:   {n:'G-Сила',   o:-1, s:0,sc:1,    b:0,  u:'G',    mn:-1,  mx:2,   c:'#ff6b6b',src:'sensor'},
  Lean:     {n:'Кут нахилу',o:-1,s:0,sc:1,    b:0,  u:'°',    mn:0, mx:90,  c:'#f472b6',src:'sensor'},
};
const PG=[
  {t:'Всі параметри', k:['RPM','T_Eng','TPS','GPS','Volt','T_Air','Inj_Rate','MAP','Alt','Gforce','Lean']},
];
const V={};Object.keys(P).forEach(k=>V[k]=k==='RPM'?0:'--');

function lg(k){try{const s=localStorage.getItem('ar_'+k);return s?JSON.parse(s):null;}catch(e){return null;}}
function ls(k,v){try{localStorage.setItem('ar_'+k,JSON.stringify(v));}catch(e){}}

const DA={T_cold:64,T_warn:90,T_crit:96,Volt_warn:12.5,Volt_crit:11.8,Spd_enabled:true,Fall_enabled:true};
let AL=lg('al')||{...DA};

let TC=lg('tpscal')||{min:0,max:170};
let _tpsRawLast=null;
let _tpsLiveTimer=null;

let audioCtx=null;
function gac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
// Примітка: тут раніше було дві спроби зробити звук чутним і в PiP-режимі:
// 1) тихий зациклений <audio> "keep-alive" — iOS сприйняв це як конкуруюче
//    джерело відтворення і СТАВИВ МУЗИКУ НА ПАУЗУ.
// 2) динамічне додавання аудіо-треку в pipStream на час біпу — WebKit не
//    підхоплює треки, додані "на льоту" в уже призначений srcObject, тому
//    просто мовчав без жодної помилки.
// Обидві прибрано. Звук працює надійно, лише коли додаток на передньому
// плані (сторінка видима) — це підтверджена межа веб-сторінки в Bluefy без
// нативного контролю над AVAudioSession. У PiP/фоні звуку немає, лишається
// тільки візуальне попередження (плитка/бейдж).

let alrtSnd=false,alrtInt=null;
async function beepAlert(){
  try{
    const ac=gac();
    if(ac.state==='suspended') await ac.resume(); // ЧЕКАЄМО завершення — раніше графік нот
    const t=ac.currentTime;                        // планувався ДО того, як контекст реально прокинувся
    [[2600,0,.12],[1800,.16,.12],[2600,.32,.12]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='square';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.75,t+st+.01);
      g.gain.linearRampToValueAtTime(0.75,t+st+d-.02);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}
function startAlert(){if(alrtSnd)return;alrtSnd=true;beepAlert();alrtInt=setInterval(beepAlert,1000);}
function stopAlert(){if(!alrtSnd)return;alrtSnd=false;clearInterval(alrtInt);alrtInt=null;}

let spdBeepDone=false;
// Дебаунс: 200м-тригер (проксиміті) і "перевищення ліміту" (ca()) — це ДВА
// незалежні джерела, і якщо обоє істинні в один і той самий тік — раніше
// обидва викликали beepSpeed() практично одночасно, звучало як подвійний
// біп. Тепер обидва йдуть через це — другий виклик у межах 1.2с ігнорується.
let _lastBeepAt=0;
function beepSpeedOnce(){
  const now=Date.now();
  if(now-_lastBeepAt<1200) return;
  _lastBeepAt=now;
  beepSpeed();
}
async function beepSpeed(){
  try{
    const ac=gac();
    if(ac.state==='suspended') await ac.resume(); // те саме виправлення гонки, що й у beepAlert
    const t=ac.currentTime;
    // Один сигнал на перетин ліміту, але довший і гучніший (0.4→0.85 гучність,
    // ноти 0.15с→0.28с, 4 ноти замість 2 пар) — щоб було чутно під шоломом.
    [[880,0,.28],[1109,.3,.28],[880,.6,.28],[1109,.9,.28]].forEach(([f,st,d])=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.frequency.value=f;o.type='sine';
      g.gain.setValueAtTime(0,t+st);
      g.gain.linearRampToValueAtTime(0.85,t+st+.02);
      g.gain.linearRampToValueAtTime(0.85,t+st+d-.03);
      g.gain.linearRampToValueAtTime(0,t+st+d);
      o.start(t+st);o.stop(t+st+d);
    });
  }catch(e){}
}

const alertState={};
// T_Eng і GPS тепер живуть тільки у відео-плитці (не в `lay`), але пороги/звук
// для них мають працювати завжди — тому їх стан рахуємо окремо від flat-тайлів.
const videoAlertState={T_Eng:'',GPS:''};
function getAlertState(k,v){
  if(v==='--'||isNaN(parseFloat(v)))return'';
  const fv=parseFloat(v);
  if(k==='T_Eng'){
    if(fv>=AL.T_crit)return'alrt';
    if(fv>=AL.T_warn)return'warn';
    if(fv<AL.T_cold)return'cold';
  }else if(k==='Volt'){
    if(fv<=AL.Volt_crit)return'alrt';
    if(fv<=AL.Volt_warn)return'warn';
  }else if(k==='GPS'){
    if(AL.Spd_enabled===false || !_nearestCam) return''; // без камери поруч нема з чим порівнювати ліміт
    const excess=fv-_nearestCam.limit;
    if(excess>9)return'alrt';   // >9 км/год понад ліміт камери — червоний
    if(excess>0)return'warn';   // до 9 км/год понад ліміт — жовтий
  }
  return'';
}

function ca(){
  let needAlert=false;
  const spd=parseFloat(V.GPS);
  const camLimit=_nearestCam ? _nearestCam.limit : null;
  lay.forEach(tile=>{
    const st=getAlertState(tile.k,V[tile.k]);
    alertState[tile.id]=st;
    if(st==='alrt'&&tile.k==='T_Eng')needAlert=true; // Volt/GPS більше НЕ вмикають звук-сирену — лише візуальний стан/пульсація
  });
  // T_Eng/GPS — рахуємо завжди, незалежно від того, чи вони є окремим тайлом
  // у `lay` (зараз їх там немає, вони показуються тільки у відео-плитці).
  videoAlertState.T_Eng=getAlertState('T_Eng',V.T_Eng);
  videoAlertState.GPS=getAlertState('GPS',V.GPS);
  if(videoAlertState.T_Eng==='alrt')needAlert=true;
  document.querySelectorAll('.tile[data-id]').forEach(el=>{
    el.classList.remove('cold','warn','alrt');
    const s=alertState[el.dataset.id];
    if(s)el.classList.add(s);
  });
  if(needAlert)startAlert();else stopAlert();
  // Один короткий біп на перетин ліміту НАЙБЛИЖЧОЇ камери (замість старого
  // ручного AL.Spd_limit) — і тільки якщо камера справді поруч (radius 220м,
  // рахує updateCameraRadar()). Без камери поруч — нема з чим звіряти, тож
  // біп/гістерезис просто не рахуються, а прапорець скидається, щоб наступна
  // камера завжди дала свіжий біп.
  if(camLimit!=null && AL.Spd_enabled!==false && !isNaN(spd)){
    const overLim=spd>camLimit;
    // Гістерезис 5 км/год: дозвіл на НАСТУПНИЙ біп повертається тільки коли
    // швидкість впаде ПОМІТНО нижче ліміту, а не одразу біля самого порогу.
    const resetLim=camLimit-5;
    if(overLim&&!spdBeepDone){spdBeepDone=true;beepSpeedOnce();}
    else if(spd<resetLim)spdBeepDone=false;
  } else {
    spdBeepDone=false;
  }
}

/* ── РАДАР КАМЕР (розділ 10.6 бази знань, тепер реалізовано) ──
   База камер — НЕ вбудована статично в код (як у чернетці Gemini), а
   завантажується користувачем вручну як CSV-файл (Налаштування → СИГНАЛИ)
   і зберігається в localStorage. Формат CSV: три колонки без заголовку
   (або з заголовком — рядки, що не парсяться як 3 числа, просто
   пропускаються): lat,lon,limit
   Приклад рядка: 24.941624,121.213271,50
   Ліміт швидкості більше НЕ ручний (AL.Spd_limit прибрано) — тривога/колір
   рахуються від ліміту НАЙБЛИЖЧОЇ камери в радіусі 220м. */
let CAMERAS_DB = lg('camdb') || [];
let camDbMeta = lg('camdbmeta') || null; // {count, updatedAt}
let _nearestCam = null;   // {lat,lon,limit} — тільки якщо в радіусі 220м, інакше null
let _camDist = null;      // метри до неї — потрібно окремо для PiP-canvas (розділ нижче), DOM-значок дізнається сам через querySelector
let _camSaid200=false, _camSaid500=false;
// Детекція "проїхали камеру": якщо дистанція почала ЗРОСТАТИ після того, як
// ми вже були близько (<=60м) — значить лінію камери вже перетнули, і далі
// попередження (жовта/червона плитка, голос, біп) вимикаємо навіть якщо ще
// формально в радіусі 220м з іншого боку.
let _camPassed=false, _camPrevD=Infinity, _camLastId=null;

function haversineM(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function parseCameraCSV(text){
  // Прибираємо BOM (типовий для файлів держреєстрів, збережених Excel) —
  // інакше перший символ заголовка стає "\uFEFFCityName" і зіставлення
  // назви колонки не спрацьовує.
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!lines.length) return [];

  // Шукаємо потрібні колонки ЗА НАЗВОЮ заголовка, а не за фіксованою
  // позицією — офіційні держреєстри (напр. тайванський NPA) мають багато
  // інших колонок (місто/адреса/відділок), а lat/lon/limit можуть стояти
  // в будь-якому порядку (у NPA це навіть Longitude ПЕРЕД Latitude).
  // Якщо заголовок не розпізнано — відкат на старий простий формат
  // "lat,lon,limit" першими трьома колонками (без заголовка).
  let latIdx=0, lonIdx=1, limitIdx=2, startLine=0;
  const headerCols = lines[0].split(',').map(s=>s.trim().toLowerCase());
  const findCol = (...names) => headerCols.findIndex(c => names.some(n=>c.includes(n)));
  const hLat = findCol('latitude','lat','緯度');
  const hLon = findCol('longitude','lon','lng','經度');
  const hLimit = findCol('limit','speed','速限','ліміт','лимит');
  const hAddr = findCol('address','地址','адрес'); // не обов'язкова — якщо нема, тип завжди 'speed'
  if(hLat>-1 && hLon>-1 && hLimit>-1){
    latIdx=hLat; lonIdx=hLon; limitIdx=hLimit;
    startLine=1; // подальші "нечислові" рядки (напр. другий заголовок-переклад) самі відсіються нижче
  }

  const cams=[];
  for(let i=startLine; i<lines.length; i++){
    const parts=lines[i].split(',').map(s=>s.trim());
    if(parts.length<=Math.max(latIdx,lonIdx,limitIdx)) continue;
    const lat=parseFloat(parts[latIdx]), lon=parseFloat(parts[lonIdx]), limit=parseFloat(parts[limitIdx]);
    if(isNaN(lat)||isNaN(lon)||isNaN(limit)) continue; // пропускаємо заголовок/биті рядки, не падаємо
    // Тип камери за ключовими словами в адресі (тайванський реєстр NPA):
    // "兼闖紅燈" — камера ЛІМІТУ, що також фіксує проїзд на червоне;
    // "科技執法" — стаціонарний технологічний контроль (напр. тунель Сюешань).
    // В обох випадках ліміт у даних реальний (не 0), тому число не втрачаємо —
    // просто інша іконка/колір значка при показі.
    let type='speed';
    if(hAddr>-1){
      const addr=parts[hAddr]||'';
      if(addr.includes('闖紅燈')) type='redlight';
      else if(addr.includes('科技執法')) type='tech';
    }
    cams.push({lat,lon,limit,type});
  }
  return cams;
}

function loadCameraCSVFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    const cams=parseCameraCSV(reader.result);
    if(!cams.length){ sht('Не знайдено жодної коректної камери у файлі (потрібні колонки lat,lon,limit)'); return; }
    CAMERAS_DB=cams; ls('camdb',CAMERAS_DB);
    camDbMeta={count:cams.length, updatedAt:Date.now()}; ls('camdbmeta',camDbMeta);
    sht('База камер оновлена: '+cams.length+' точок');
    renderCamDbStatus();
  };
  reader.onerror=()=>sht('Не вдалось прочитати файл');
  reader.readAsText(file);
}

// Автозавантаження бази з файлу в тому самому репозиторії на GitHub (щоб не
// тягнути CSV вручну щоразу на новому пристрої/після скидання кешу). Файл
// має лежати поруч з index.html і зватись NPA_TD1.csv. СПРАЦЬОВУЄ ЛИШЕ якщо
// в localStorage ще НЕМАЄ бази — ручне завантаження (Налаштування →
// СИГНАЛИ) завжди має пріоритет і не переписується автозавантаженням.
async function autoLoadBundledCameraCSV(){
  if(CAMERAS_DB.length) return; // вже є база (ручна чи попереднє автозавантаження) — не чіпаємо
  try{
    const res = await fetch('NPA_TD1.csv');
    if(!res.ok) return; // файла нема в репозиторії — це нормально, просто мовчки нічого не робимо
    const text = await res.text();
    const cams = parseCameraCSV(text);
    if(!cams.length) return;
    CAMERAS_DB=cams; ls('camdb',CAMERAS_DB);
    camDbMeta={count:cams.length, updatedAt:Date.now()}; ls('camdbmeta',camDbMeta);
    renderCamDbStatus();
    console.log('Автозавантажено камер з NPA_TD1.csv:', cams.length);
  }catch(e){
    console.warn('Автозавантаження бази камер не вдалось (файла нема поруч чи мережева помилка):', e);
  }
}
try{ autoLoadBundledCameraCSV(); }catch(e){ console.error('autoLoadBundledCameraCSV init failed:',e); }

function clearCameraDB(){
  CAMERAS_DB=[]; ls('camdb',CAMERAS_DB);
  camDbMeta=null; ls('camdbmeta',camDbMeta);
  _nearestCam=null;
  sht('Базу камер очищено');
  renderCamDbStatus();
}

// speak()/speechSynthesis прибрано — у Bluefy/WKWebView голос мовчав без
// помилки (ненадійно), тому попередження тепер тільки через AudioContext-біпи
// (beepSpeed нижче), які підтверджено чутні й стабільні.

// Викликається на кожен GPS-тік (watchPosition). Шукає найближчу камеру,
// оновлює значок(и) у GPS-плитці (може бути кілька, якщо тайл додано
// повторно — тому querySelectorAll, не єдиний ID) і голосові тригери.
function updateCameraRadar(lat1, lon1){
  let targetCam=null, minD=Infinity;
  for(const cam of CAMERAS_DB){
    // Грубий гео-гейт (~1км) ПЕРЕД точним гаверсинусом — та сама оптимізація, що в специфікації
    if(Math.abs(cam.lat-lat1)>0.01 || Math.abs(cam.lon-lon1)>0.01) continue;
    const d=haversineM(lat1,lon1,cam.lat,cam.lon);
    if(d<minD){ minD=d; targetCam=cam; }
  }

  const badges=document.querySelectorAll('.cam-radar-badge');
  if(targetCam && minD<=500){
    const camId=targetCam.lat+'_'+targetCam.lon;
    if(camId!==_camLastId){ _camLastId=camId; _camPrevD=Infinity; _camPassed=false; _camSaid500=false; _camSaid200=false; } // нова камера в зоні — скидаємо трек
    const dR=Math.round(minD);
    // Дистанція зросла (з запасом 3м проти GPS-шуму) ПІСЛЯ того, як була
    // справді близько (<=60м) — отже камеру щойно проїхали.
    if(!_camPassed && _camPrevD<=60 && dR>_camPrevD+3){ _camPassed=true; }
    _camPrevD=dR;

    if(_camPassed){
      // Проїхали — ховаємо попередження, навіть якщо формально ще в 500м радіусі
      _nearestCam=null;
      _camDist=null;
      badges.forEach(badge=>{ badge.style.display='none'; });
    } else if(dR>220){
      // ── М'ЯКА ЗОНА 220-500м: раннє попередження, без увімкнення
      // повноекранного tile-alert/сирени за перевищення (_nearestCam
      // лишається null — та система і далі прив'язана лише до 220м).
      // Бейдж показує ліміт+дистанцію нейтральним кольором.
      _nearestCam=null;
      _camDist=null;
      badges.forEach(badge=>{
        badge.style.display='flex';
        badge.classList.remove('near','warn','danger');
        const limUi=badge.querySelector('.c-sign'), dstUi=badge.querySelector('.c-dist');
        if(limUi){
          limUi.classList.remove('cam-type-redlight','cam-type-tech');
          limUi.textContent=targetCam.limit;
        }
        if(dstUi) dstUi.textContent=dR+'м';
      });
      if(dR<=500 && dR>450 && !_camSaid500){
        _camSaid500=true;
        beepSpeedOnce(); // один сигнал на вхід у 500м-зону
      }
    } else {
    _nearestCam=targetCam;
    _camDist=dR;
    const spd=parseFloat(V.GPS);
    const excess=!isNaN(spd) ? spd-targetCam.limit : 0;
    badges.forEach(badge=>{
      badge.style.display='flex';
      const limUi=badge.querySelector('.c-sign'), dstUi=badge.querySelector('.c-dist');
      if(limUi){
        limUi.classList.remove('cam-type-redlight','cam-type-tech');
        if(targetCam.type==='redlight'){ limUi.textContent='🚦'; limUi.classList.add('cam-type-redlight'); }
        else if(targetCam.type==='tech'){ limUi.textContent='📷'; limUi.classList.add('cam-type-tech'); }
        else { limUi.textContent=targetCam.limit; }
      }
      if(dstUi) dstUi.textContent=dR+'м';
      badge.classList.toggle('near', dR<=100);
      // Жовтий — перевищення до 9 км/год; червоний — понад 9 км/год.
      // Для 'redlight' ліміт у даних реальний (комбо-камера), тому попередження лишаємо для всіх типів.
      badge.classList.toggle('warn', excess>0 && excess<=9);
      badge.classList.toggle('danger', excess>9);
    });
    if(dR<=200 && dR>150 && !_camSaid200){
      _camSaid200=true;
      // Один сигнал на вхід у 200м — через спільний дебаунс з "перевищення
      // ліміту" (ca()), щоб не подвоювалось, якщо обоє тригери співпали.
      beepSpeedOnce();
    }
    }
  } else {
    _nearestCam=null;
    _camDist=null;
    badges.forEach(badge=>{ badge.style.display='none'; });
    _camSaid200=false;
    _camSaid500=false;
    _camPassed=false; _camPrevD=Infinity; _camLastId=null;
  }
}

function renderCamDbStatus(){
  const el=document.getElementById('camDbStatus');
  if(!el) return;
  if(camDbMeta && camDbMeta.count){
    const ageDays = (Date.now()-camDbMeta.updatedAt)/86400000; // 86 400 000 мс = 1 доба
    if(ageDays > 7){
      el.innerHTML='⚠ <b>База застаріла</b> ('+Math.floor(ageDays)+' дн.): '+camDbMeta.count+' камер, оновлено '+new Date(camDbMeta.updatedAt).toLocaleString()+' — рекомендуємо перезавантажити CSV';
      el.style.color='var(--amber)';
    } else {
      el.innerHTML='✅ <b>Радар активний</b>: '+camDbMeta.count+' камер (оновлено '+new Date(camDbMeta.updatedAt).toLocaleString()+')';
      el.style.color='var(--cyan)';
    }
  } else {
    el.innerHTML='⚠ <b>Радар НЕ працює</b> — база порожня, завантаж CSV-файл';
    el.style.color='var(--amber)';
  }
}

// Одноразова перевірка при старті додатку: якщо база камер старша 7 днів —
// показуємо ненав'язливий toast (не блокуємо роботу, просто нагадуємо).
function checkCamDbFreshness(){
  if(!camDbMeta || !camDbMeta.updatedAt) return;
  const ageDays = (Date.now()-camDbMeta.updatedAt)/86400000;
  if(ageDays > 7){
    sht('⚠ База камер старша '+Math.floor(ageDays)+' дн. — рекомендуємо оновити CSV у Налаштуваннях');
  }
}



let gpsId=null;
let _lastLat=null, _lastLon=null, _lastAlt=null, _lastSpeedMps=null; // для Trip Mode (розділ 10.1) і радара камер
function startGPS(){
  if(!navigator.geolocation||gpsId)return;
  navigator.geolocation.getCurrentPosition(()=>{
    gpsId=navigator.geolocation.watchPosition(pos=>{
      V.GPS=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0;
      V.Alt=pos.coords.altitude!=null?Math.round(pos.coords.altitude):'--';
      _lastLat=pos.coords.latitude; _lastLon=pos.coords.longitude;
      _lastAlt=pos.coords.altitude; _lastSpeedMps=pos.coords.speed;
      updateCameraRadar(pos.coords.latitude, pos.coords.longitude);
      ud();ca();
    },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:true,maximumAge:1000});
  },()=>{V.GPS='0';V.Alt='--';ud();},{enableHighAccuracy:false,timeout:5000});
}
document.addEventListener('touchstart',()=>startGPS(),{once:true});
document.addEventListener('click',()=>startGPS(),{once:true});
try{ startGPS(); }catch(e){ console.error('startGPS init failed:',e); }

/* ── TRIP MODE / GPX-ЛОГ МАРШРУТУ (розділ 10.1 бази знань) ──
   Лог у пам'яті (масив об'єктів), одна точка ЩОСЕКУНДИ: GPS (lat/lon/alt/
   швидкість) + вся поточна ECU-телеметрія. СТІЙКИЙ до реконекту BLE — масив
   НЕ очищується при Disconnect/Connect (це окрема глобальна змінна,
   незалежна від стану з'єднання), очищується тільки явним стартом НОВОЇ
   поїздки. Поки BLE відключений — telemetry-поля просто йдуть як є в V
   (найчастіше '--'/0), а GPS продовжує писати без дірок (це окремий
   геолокейшн-потік, не залежить від BLE).
   Формат експорту — стандартний GPX з КАСТОМНИМ <extensions> у кожній
   точці: звичайні сайти (Google Мої Карти, Strava, gpxstudio.org) читають
   тільки стандартні lat/lon/ele/time і ІГНОРУЮТЬ невідомий extensions-блок
   (не зламаються, просто покажуть маршрут/висоту) — а майбутній власний
   переглядач (TripViewer) розпарсить його і покаже графіки телеметрії
   поруч із мапою. */
let tripLog = [];
let tripRecording = false;
let tripTimerId = null;

function tripNumOrEmpty(v){
  return (typeof v === 'number' && !isNaN(v)) ? v : '';
}

function tripPushPoint(){
  if(!tripRecording) return;
  tripLog.push({
    t: Date.now(),
    lat: _lastLat, lon: _lastLon, alt: _lastAlt, spd: _lastSpeedMps,
    // V.Volt і V.Gforce на живому дашборді — РЯДКИ (formatted через .toFixed()
    // для гарного відображення на тайлі), а не числа, як решта полів.
    // tripNumOrEmpty() очікує typeof==='number', тож ці два поля мовчки
    // писались у GPX як ПОРОЖНІ (g="" volt="") — саме тому в TripViewer
    // G-сила й Напруга завжди були порожні. Явно парсимо в число тут.
    rpm: V.RPM, tps: V.TPS, volt: parseFloat(V.Volt), tEng: V.T_Eng, tAir: V.T_Air,
    map: V.MAP, inj: V.Inj_Rate, lean: V.LeanSigned, g: parseFloat(V.Gforce)
  });
  const btn=document.getElementById('tripBtn');
  if(btn) btn.textContent = '⏹ Стоп ('+tripLog.length+')';
}

function tripStart(){
  tripLog = [];
  tripRecording = true;
  if(tripTimerId) clearInterval(tripTimerId);
  tripTimerId = setInterval(tripPushPoint, 1000);
  tripPushPoint(); // перша точка одразу, не чекаючи першої секунди
  const btn=document.getElementById('tripBtn');
  if(btn){ btn.textContent='⏹ Стоп (0)'; btn.classList.add('rec'); }
  sht('Запис поїздки почато');
}

function tripStop(){
  tripRecording = false;
  if(tripTimerId){ clearInterval(tripTimerId); tripTimerId=null; }
  const btn=document.getElementById('tripBtn');
  if(btn){ btn.textContent='Trip'; btn.classList.remove('rec'); }
  if(tripLog.length > 1){
    if(confirm('Запис зупинено ('+tripLog.length+' точок). Завантажити GPX-файл поїздки?')){
      tripExportGPX();
    }
  } else {
    sht('Запис зупинено (замало точок для експорту)');
  }
}

async function tripExportGPX(){
  if(!tripLog.length) return;
  const pts = tripLog.map(p=>{
    if(p.lat==null || p.lon==null) return ''; // GPX вимагає координати — без них точку не пишемо
    const timeIso = new Date(p.t).toISOString();
    const eleTag = (p.alt!=null) ? `<ele>${p.alt.toFixed(1)}</ele>` : '';
    const spdAttr = (p.spd!=null) ? p.spd.toFixed(2) : '';
    return `      <trkpt lat="${p.lat}" lon="${p.lon}">${eleTag}<time>${timeIso}</time>`+
      `<extensions><vRacer:tele xmlns:vRacer="https://vracer.github.io/vRace2" `+
      `rpm="${tripNumOrEmpty(p.rpm)}" tps="${tripNumOrEmpty(p.tps)}" volt="${tripNumOrEmpty(p.volt)}" `+
      `tEng="${tripNumOrEmpty(p.tEng)}" tAir="${tripNumOrEmpty(p.tAir)}" map="${tripNumOrEmpty(p.map)}" `+
      `inj="${tripNumOrEmpty(p.inj)}" lean="${tripNumOrEmpty(p.lean)}" g="${tripNumOrEmpty(p.g)}" `+
      `spdMps="${spdAttr}"/></extensions></trkpt>`;
  }).filter(Boolean).join('\n');

  const gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`+
    `<gpx version="1.1" creator="vRacer BLE Dashboard" xmlns="http://www.topografix.com/GPX/1/1">\n`+
    `  <trk>\n`+
    `    <name>vRacer Trip ${new Date(tripLog[0].t).toLocaleString()}</name>\n`+
    `    <trkseg>\n${pts}\n    </trkseg>\n`+
    `  </trk>\n`+
    `</gpx>`;

  const filename = 'vracer-trip-' + Date.now() + '.gpx';
  const blob = new Blob([gpx], {type:'application/gpx+xml'});

  // КРИТИЧНО: на iOS Safari/WebKit (а отже й у Bluefy) атрибут download у
  // <a> НЕ зберігає файл — посилання просто намагається відкрити сирий XML
  // у вкладці (звідси "щось качається, але результату нема"). Web Share
  // API з File відкриває системне меню "Поділитися", де є "Зберегти у
  // Файли" — це надійний спосіб саме для iOS. Android/десктоп теж підтримує
  // Web Share, тож перевіряємо його першим для всіх; якщо недоступний —
  // фолбек на старий download-підхід (працює на Android/десктопі).
  try{
    const file = new File([blob], filename, {type:'application/gpx+xml'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:filename});
      return;
    }
  }catch(e){
    if(e && e.name === 'AbortError') return; // користувач сам закрив меню "Поділитися" — це не помилка
    // інакше падаємо у фолбек нижче
  }

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}

try{
  document.getElementById('tripBtn').addEventListener('click', ()=>{
    if(tripRecording) tripStop(); else tripStart();
  });
}catch(e){ console.error('tripBtn init failed:',e); }

/* ── СЕНСОРИ ТЕЛЕФОНУ: G-СИЛА ТА КУТ НАХИЛУ ──
   Це фундамент під майбутню детекцію падіння (окрема задача) — зараз лише
   рахуємо і показуємо два числа. G-сила: довжина вектора прискорення
   (з гравітацією) поділена на 9.81 — на місці ≈1G, зростає при
   розгоні/гальмуванні/в поворотах. Кут нахилу: кут між ПОТОЧНИМ вектором
   гравітації і вектором, зафіксованим під час калібрування (коли мотоцикл
   стоїть вертикально) — так має сенс НЕЗАЛЕЖНО від того, під яким кутом і
   як саме закріплений телефон на кермі. Знак (ліво/право) свідомо НЕ
   рахуємо — для тесту порогів (напр. 80°) достатньо модуля кута. */
/* ── КУТ НАХИЛУ: deviceorientation (beta/gamma), БЕЗ КАЛІБРУВАННЯ ──
   Замінено на набагато простіший і перевірений робочий підхід: замість
   інтеграції сирого гіроскопа (rotationRate) і власного комплементарного
   фільтра з ручним калібруванням двох векторів — беремо ГОТОВІ, вже
   об'єднані ОС кути orientation.beta/gamma. Це кути АБСОЛЮТНОГО нахилу
   відносно гравітації (і частково магнітометра), тому вони НЕ дрейфують і
   НЕ "просочують" yaw (обертання навколо вертикалі) в roll так, як це
   робив сирий rotationRate.gamma — саме це давало фальшиві ~50° при
   простому оберті на місці зі старим підходом. Ніякого калібрування
   більше не потрібно.
   Портрет: roll = gamma. Альбомний режим: roll = ±beta, залежно від того,
   в який бік повернутий телефон (window.orientation). Знак у плитці не
   показуємо (просимо тільки модуль) — але зберігаємо кут ЗІ ЗНАКОМ у
   V.LeanSigned для майбутнього Trip Log/GPX (розділ 10.1 бази знань).
   Просте експоненційне згладжування (0.85/0.15) — не комплементарний
   фільтр, бо джерело вже абсолютне й не потребує гіроскопа для корекції
   дрейфу. */
let _leanFilt = 0;              // згладжений кут (зі знаком, як віддає ОС)
let motionPermGranted = false;
let _motionListenerActive = false;
let _lastMotionTs = 0;
// ПОВЕРНУТО до чистого авто-визначення орієнтації (без ручного
// перемикача/локу). Причина: датчик кута нахилу МУСИТЬ читати ту вісь
// (beta чи gamma), що відповідає ФАКТИЧНІЙ фізичній орієнтації телефону —
// ручний "лок" примушував це число завжди бути одним і тим самим,
// незалежно від того, як телефон РЕАЛЬНО повернутий, тож кут рахувався
// неправильно щоразу, коли фактична орієнтація не збігалася з обраною.
// Заблокувати саму системну оболонку iOS з веб-сторінки все одно
// неможливо (platform limitation), тож сенс "локу" сторінки без цього
// був сумнівний — а шкода для сенсора реальна.
function computeIsLandscape(){
  return window.innerWidth > window.innerHeight;
}
let _isLandscape = computeIsLandscape();
window.addEventListener('resize', ()=>{ _isLandscape = computeIsLandscape(); });

function needsMotionPermission(){
  return typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function';
}
function needsOrientationPermission(){
  return typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function';
}

async function requestMotionPermission(){
  // На iOS/Bluefy Motion (G-сила) і Orientation (кут нахилу) — ДВІ окремі
  // дозвільні API, хоч і активуються одним тапом користувача.
  let motionOk = true, orientOk = true;
  if(needsMotionPermission()){
    try{ motionOk = (await DeviceMotionEvent.requestPermission()) === 'granted'; }
    catch(e){ motionOk = false; }
  }
  if(needsOrientationPermission()){
    try{ orientOk = (await DeviceOrientationEvent.requestPermission()) === 'granted'; }
    catch(e){ orientOk = false; }
  }
  if(!motionOk && !orientOk){ sht('Доступ до датчиків відхилено'); return false; }
  motionPermGranted = true;
  startMotionSensors();
  return true;
}

function startMotionSensors(){
  if(_motionListenerActive) return;
  _motionListenerActive=true;
  window.addEventListener('devicemotion', onMotion);          // G-сила
  window.addEventListener('deviceorientation', onOrientation); // Кут нахилу
}

let _gforceRaw = 1; // сира магнітуда (≈1 у стані спокою через гравітацію) — саме її використовує детекція падіння (пороги нижче каліброві на ЦЕ число, не міняти)
function onMotion(e){
  const g=e.accelerationIncludingGravity;
  if(!g || g.x===null || g.x===undefined) return;
  const now=Date.now();
  const mag=Math.sqrt(g.x*g.x+g.y*g.y+g.z*g.z);
  if(now-_lastMotionTs>=150){
    _lastMotionTs=now;
    _gforceRaw = mag/9.81;
    // Чисто візуальна корекція для спостерігача: у стані спокою фізично
    // завжди ≈1G (гравітація), але людині зрозуміліше бачити "0" у спокої
    // й відхилення від нуля при прискоренні/гальмуванні — тому в ПЛИТЦІ
    // показуємо (сира магнітуда − 1), а не саму магнітуду. Детекція
    // падіння нижче так само рахує від СИРОЇ величини (_gforceRaw), її
    // пороги не міняються.
    V.Gforce = (_gforceRaw - 1).toFixed(2);
  }
}

let _leanZeroOffset = 0; // "нуль" кута — точка відліку, яку встановлює тап по плитці (скидання)
let _lastRawRoll = 0;    // останнє СИРЕ (нефільтроване) значення — потрібне, щоб скидання ловило поточну позицію, а не застарілу

function onOrientation(e){
  if(e.beta===null || e.beta===undefined || e.gamma===null || e.gamma===undefined) return;
  let targetRoll;
  if(_isLandscape){
    const orientationAngle = window.orientation || (screen.orientation && screen.orientation.angle) || 0;
    // Знак підтверджено робочим у версії Gemini (тестовий кутомір) — наша
    // попередня спроба "виправити" його (інвертувавши) була помилковою.
    targetRoll = orientationAngle < 0 ? e.beta : -e.beta;
  } else {
    targetRoll = e.gamma;
  }
  _lastRawRoll = targetRoll;
  // КРИТИЧНО: у альбомній орієнтації "рівний" телефон (лежить майже плоско,
  // як і кріплення на мотоциклі) від природи дає beta близько ±90° — це
  // особливість системи кутів deviceorientation, не "залипання" датчика.
  // Через це клемп ±90 нижче постійно впирався в межу. Віднімаємо
  // _leanZeroOffset (встановлюється тапом по плитці — розділ нижче), щоб
  // рахувати кут ВІДНОСНО реального нуля, а не сирого нуля датчика.
  const adjustedRoll = targetRoll - _leanZeroOffset;
  _leanFilt = (0.85*_leanFilt) + (0.15*adjustedRoll);
  const clamped = Math.max(-90, Math.min(90, _leanFilt));
  V.LeanSigned = Math.round(clamped); // зі знаком — для майбутнього Trip Log
  V.Lean = Math.abs(Math.round(clamped)); // без знаку — це і показує плитка
  ud(); ca();
}

// Тап по плитці кута нахилу: перший раз — вмикає дозволи на датчики. Якщо
// дозвіл уже є — це СКИДАННЯ (розділ вище): запам'ятовує поточну сиру
// позицію як нуль. Тримай мотоцикл вертикально й тапни, якщо кут "застряг"
// або показує щось відмінне від 0 у спокої.
async function onLeanTileTap(){
  if(!motionPermGranted){
    const ok = await requestMotionPermission();
    if(ok) sht('Датчики увімкнено — кут нахилу активний');
    return;
  }
  _leanZeroOffset = _lastRawRoll;
  _leanFilt = 0;
  V.LeanSigned = 0; V.Lean = 0; ud(); ca();
  sht('Кут нахилу скинуто на 0');
}

// Android/десктоп не потребують явного дозволу — стартуємо одразу.
// iOS (Bluefy) вимагає тап користувача — тап по плитці кута нахилу.
try{
  if(!needsMotionPermission() && !needsOrientationPermission()){
    motionPermGranted=true;
    startMotionSensors();
  }
}catch(e){ console.error('motion auto-start failed:',e); }

/* ── ДЕТЕКТОР ПАДІННЯ (поки тільки СПОСТЕРЕЖЕННЯ, без сирени/SMS) ──
   Це навмисно найпростіший можливий крок: просто показуємо toast + пишемо
   в консоль, коли тригер спрацював, щоб ти міг покататись і подивитись, чи
   нема хибних спрацювань на реальних вибоїнах/гальмуванні/поворотах,
   ПЕРЕД тим як додавати сирену/countdown/відправку SMS. Керується тим самим
   вимикачем AL.Fall_enabled з Налаштування → СИГНАЛИ.
   Два незалежні тригери:
   1. tipover — МОДУЛЬ кута нахилу (Math.abs, бо кут тепер зі знаком
      ліво/право) тримається >80° довше 3с. НЕ залежить від BLE/RPM
      навмисно — BLE-модуль може не пережити реальний удар.
   2. gspike — ДВОЕТАПНА перевірка. Одинокий сплеск G — поганий індикатор:
      кочка на дорозі дає такий самий різкий стрибок (заміряно >4G на
      реальних кочках), як і справжній удар. Різниця з'являється ПІСЛЯ
      сплеску: кочка — кут одразу повертається до норми; падіння — кут
      лишається аномальним ще через кілька секунд. Тому сплеск лише
      "кандидат", підтверджуємо через FALL_CONFIRM_WINDOW_MS. */
let _leanOverSince = null;
let _lastTipoverLogTs = 0;
let _lastGSpikeLogTs = 0;
let _pendingGSpike = null; // {ts, g} — кандидат на удар, чекає підтвердження
const FALL_LEAN_DEG = 80;
const FALL_LEAN_HOLD_MS = 3000;
const FALL_GFORCE_THRESHOLD = 2.2;
const FALL_CONFIRM_WINDOW_MS = 2500; // скільки чекати після сплеску, щоб перевірити кут
const FALL_CONFIRM_LEAN_DEG = 45;    // кут, який має ЛИШИТИСЬ, щоб зарахувати як падіння (не кочку)
const FALL_LOG_COOLDOWN_MS = 8000; // не спамити toast на кожен цикл, поки умова тримається

function logFallEvent(type, detail){
  const ts = new Date().toLocaleTimeString('uk-UA', {hour12:false});
  console.log(`[ПАДІННЯ-ТЕСТ] ${ts} ${type}: ${detail}`);
  sht('⚠️ Тест падіння: ' + detail);
}

setInterval(()=>{
  // ТИМЧАСОВО без вимоги bConn — користувач тестує детекцію окремо від
  // мопеда (вдома, без Bluetooth). Коли тестування завершиться, варто
  // повернути гейт на bConn, інакше кожен різкий рух телефону поза поїздкою
  // (кинув на диван, впустив) даватиме хибний toast.
  if(!AL.Fall_enabled) { _leanOverSince = null; _pendingGSpike = null; return; }

  const leanAbs = typeof V.Lean === 'number' ? Math.abs(V.Lean) : null;

  // Тригер 1: тривалий кут нахилу (незалежно від сторони)
  if(leanAbs !== null){
    if(leanAbs > FALL_LEAN_DEG){
      if(_leanOverSince === null) _leanOverSince = Date.now();
      else if(Date.now() - _leanOverSince > FALL_LEAN_HOLD_MS && Date.now() - _lastTipoverLogTs > FALL_LOG_COOLDOWN_MS){
        logFallEvent('tipover', `кут ${V.Lean}° тримається понад 3с`);
        _lastTipoverLogTs = Date.now();
      }
    } else {
      _leanOverSince = null;
    }
  }

  // Тригер 2: сплеск G-сили — ЛИШЕ кандидат, чекаємо підтвердження кутом
  // Використовуємо СИРУ магнітуду (_gforceRaw), не V.Gforce — останній
  // тепер зсунутий на -1 чисто для відображення в плитці (розділ вище).
  const g = _gforceRaw;
  if(_pendingGSpike === null && !isNaN(g) && g > FALL_GFORCE_THRESHOLD){
    _pendingGSpike = { ts: Date.now(), g };
  }
  if(_pendingGSpike !== null){
    const elapsed = Date.now() - _pendingGSpike.ts;
    if(elapsed >= FALL_CONFIRM_WINDOW_MS){
      if(leanAbs !== null && leanAbs > FALL_CONFIRM_LEAN_DEG && Date.now() - _lastGSpikeLogTs > FALL_LOG_COOLDOWN_MS){
        logFallEvent('gspike-confirmed', `сплеск ${_pendingGSpike.g}G, кут через 2.5с все ще ${V.Lean}°`);
        _lastGSpikeLogTs = Date.now();
      }
      // Інакше — це була кочка (кут повернувся до норми): просто ігноруємо, без toast.
      _pendingGSpike = null;
    }
  }
}, 300);

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
// Той самий sleep, але його можна "розбудити" достроково (kickReconnectNow) —
// потрібно для швидкого тапу під час автоперепідключення: замість очікування
// повної паузи (1.5с/5с) одразу пробуємо підключитись ще раз.
let _reconnectKick=null;
function interruptibleSleep(ms){
  return new Promise(resolve=>{
    const t=setTimeout(()=>{ _reconnectKick=null; resolve(); }, ms);
    _reconnectKick=()=>{ clearTimeout(t); resolve(); };
  });
}
function kickReconnectNow(){
  if(_reconnectKick){ const k=_reconnectKick; _reconnectKick=null; k(); }
}

// КРИТИЧНО: bDev.gatt.connect() інколи "зависає" назавжди — не резолвиться
// і не падає з помилкою (типово, коли пристрій поза зоною досяжності саме
// в момент виклику). Без таймауту весь цикл перепідключення застрягав на
// цій одній спробі, і жодне "розбудження ззовні" вже не допомагало, бо
// цикл не спав — він був застряглий усередині самого await. Обгортаємо
// підключення в перегони з таймером.
function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')), ms))
  ]);
}

const CHUNK = 20;
async function sendCmd(cmd){
  if(!bChr||!bConn)return;
  try{
    if(cmd.length <= CHUNK){
      await bChr.writeValue(cmd);
    } else {
      for(let i=0;i<cmd.length;i+=CHUNK){
        const chunk = cmd.slice(i, i+CHUNK);
        await bChr.writeValue(chunk);
        await sleep(3);
      }
    }
  }catch(e){}
}

async function initSession(){
  await sendCmd(CMD_ATSECU);   await sleep(103);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_PING);      await sleep(13);
  await sendCmd(CMD_ZERO);      await sleep(115);
  await sendCmd(CMD_FIRMWARE);  await sleep(75);
  await sendCmd(CMD_UNK50);     await sleep(3800);
  await sendCmd(CMD_SUBSCRIBE); await sleep(500);
}

function parse20Byte(pkt){
  if(pkt.length !== 20) return false;
  if(pkt[0] === 0xfc) return false;
  const teng = pkt[6] - 28;
  const rpm  = (pkt[2]<<8)|pkt[3];
  const volt = pkt[5] / 10.0;
  const ap   = pkt[11];
  // T_Air: НОВА гіпотеза (заміна pkt[10]/2). Підтверджено сьогодні на
  // працюючому двигуні, потребує ще перевірки в різних умовах.
  const tair = pkt[0] - 28;
  const tpsRaw = pkt[4];
  let matched = false;
  if(teng > -10 && teng < 150){ V.T_Eng = Math.round(teng); matched = true; }
  if(rpm  > 200 && rpm  < 15000){ V.RPM = rpm; matched = true; }
  if(volt > 9.5 && volt < 16){ V.Volt = volt.toFixed(1); matched = true; }
  if(ap >= 0 && ap <= 150){ V.MAP = ap; matched = true; }
  if(tair > -20 && tair < 80){ V.T_Air = Math.round(tair*10)/10; matched = true; }
  if(tpsRaw >= 0 && tpsRaw <= 255){
    _tpsRawLast = tpsRaw;
    if(TC.min !== null && TC.max !== null && TC.max !== TC.min){
      let pct = (tpsRaw - TC.min) / (TC.max - TC.min) * 100;
      V.TPS = Math.round(Math.max(0, Math.min(100, pct))*10)/10;
    } else { V.TPS = tpsRaw; }
    matched = true;
  }
  return matched;
}

// ── ПАРАЛЕЛЬНИЙ 19-БАЙТНИЙ ПАКЕТ ──
// Inj_Rate ЗНАЙДЕНО і ПІДТВЕРДЖЕНО живим порівнянням з офіційним додатком:
// byte[7] цього пакета (НЕ 20-байтного!) × 0.39 + 0.40 дало точний збіг
// (raw=11 → 4.69мс, raw=12 → 5.08мс — рівно ті самі числа, що показував
// офіційний додаток в той самий момент). Попередні кандидати з 20-байтного
// пакета (pkt[9], pkt[1], pkt[11]) були або спростовані, або занадто шумні.
function parse19Byte(pkt){
  if(pkt.length !== 19) return false;
  const injRaw = pkt[7];
  if(injRaw >= 0 && injRaw <= 255){
    V.Inj_Rate = Math.round((injRaw*0.39+0.40)*100)/100;
    return true;
  }
  return false;
}

function onData(e){
  _lastPacketTs=Date.now();
  const b=new Uint8Array(e.target.value.buffer);
  if(b.length===19) parse19Byte(b);
  else parse20Byte(b);
  ud();ca();
}

let _lastPacketTs=0;
const WATCHDOG_MS=4000;
let _watchdogInt=null;
function armWatchdog(){
  _lastPacketTs=Date.now();
  if(_watchdogInt) clearInterval(_watchdogInt);
  _watchdogInt=setInterval(()=>{
    if(userDisconnected || reconnecting) return;
    if(!bConn) {
      clearInterval(_watchdogInt);
      _watchdogInt = null;
      return;
    }
    if(Date.now()-_lastPacketTs>WATCHDOG_MS){
      try{ if(bDev&&bDev.gatt&&bDev.gatt.connected) bDev.gatt.disconnect(); }catch(e){}
    }
  },1000);
}

function setupBleUI(){
// РОЗБЛОКУВАННЯ WEB AUDIO (КРИТИЧНО ДЛЯ ЗВУКУ СИГНАЛІВ): AudioContext,
// створений НЕ безпосередньо в межах жесту користувача (клік/тап), на iOS
// Safari стартує в стані 'suspended' — заплановані звуки виконуються без
// жодної помилки в консолі, але фізично НЕ чутні. Раніше audioCtx
// створювався лінькво лише в момент першого спрацювання сирени/біпу
// (посеред поїздки, не як наслідок кліку) — тому сигнал міг мовчати.
// Розблоковуємо контекст у самому жесті (pointerdown нижче), а не тут —
// ця функція тепер викликається ОДИН РАЗ при завантаженні сторінки, а не
// на кожен клік (див. пояснення біля LONG_PRESS_MS нижче).
function unlockAudioOnGesture(){
  try{
    const ac=gac();
    if(ac.state==='suspended') ac.resume();
  }catch(e){}
}

/* ── WAKE LOCK + FULLSCREEN при підключенні ──
   Wake Lock API підтримується в iOS Safari 16.4+ (працює, ПОКИ вкладка видима).
   Важливо: коли вкладка йде у фон (наприклад, ти перемкнувся на Google Maps,
   а наш дашборд лишився тільки як плаваюче PiP-вікно), iOS сам автоматично
   знімає wake lock — це обмеження самої специфікації, обійти його неможливо.
   Тобто це вбереже екран від сну, ПОКИ ти дивишся саме на наш дашборд,
   але не гарантує цього під час навігації в іншому додатку з активним PiP. */
let _wakeLock=null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release',()=>{_wakeLock=null;});
    }
  }catch(e){}
}
// ── ПРЯМА СПРОБА ПЕРЕПІДКЛЮЧЕННЯ ПРИ ПОВЕРНЕННІ НА ПЕРЕДНІЙ ПЛАН ──
// Раніше ця логіка намагалась "розбудити" фоновий цикл перепідключення
// (kickReconnectNow), але якщо цикл був застряглий УСЕРЕДИНІ зависаючого
// gatt.connect() (а не спав між спробами) — жодне розбудження не
// допомагало. Тепер робимо як прямий тап по кнопці Connect: одразу й
// безумовно пробуємо підключитись, з таймаутом 8с. Якщо не вийшло —
// запускаємо звичайний фоновий цикл (з паузами) для подальших спроб.
async function foregroundReconnectNow(){
  if(userDisconnected || !bDev || bConn) return;
  reconnecting = true;
  const btn=document.getElementById('cb'), bs=document.getElementById('bs');
  btn.textContent='⏳…'; btn.className='pill go';
  bs.textContent='Перепідключення…'; bs.className='pill err';
  try{
    const srv = await withTimeout(bDev.gatt.connect(), 4000);
    bChr = await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
    bChr.addEventListener('characteristicvaluechanged', onData);
    await bChr.startNotifications();
    bConn=true; btn.textContent='🟢 '+(bDev.name||'OK'); btn.className='pill ok';
    bs.textContent=bDev.name||'Connected'; bs.className='pill on';
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--')); ud();
    requestWakeLock();
    await initSession();
    armWatchdog();
    reconnecting=false;
  }catch(e){
    reconnecting=false;
    onUnexpectedDisconnect(); // не вийшло миттєво — далі звичайний фоновий цикл з паузами
  }
}

document.addEventListener('visibilitychange', async ()=>{
  if(_wakeLock===null && document.visibilityState==='visible' && bConn){
    requestWakeLock();
  }
  // Аудіо-контекст теж може "заснути" разом з рештою сторінки у фоні —
  // відновлюємо його одразу, як тільки додаток знову видимий.
  if(document.visibilityState==='visible' && audioCtx && audioCtx.state==='suspended'){
    try{ audioCtx.resume(); }catch(e){}
  }
  if(document.visibilityState==='visible' && !userDisconnected && bDev && !bConn){
    foregroundReconnectNow();
  }
});

// Fullscreen API: ВИМКНЕНО навмисно. У Bluefy жест "потягнути сторінку вниз"
// одночасно керує і оновленням сторінки, і власним перемикачем
// повноекранного режиму браузера — наш програмний виклик requestFullscreen()
// конфліктував із цим жестом. Функції лишені як no-op, щоб усі виклики по
// коду (при підключенні/відключенні) не ламались.
function requestFullscreenSafe(){ /* навмисно нічого не робить */ }
function exitFullscreenSafe(){ /* навмисно нічого не робить */ }

  const btn=document.getElementById('cb');

  // ── ПОВНЕ ВІДКЛЮЧЕННЯ (довге натискання) ──
  async function fullDisconnect(){
    userDisconnected=true; // зупиняє будь-який активний цикл перепідключення
    kickReconnectNow(); // якщо цикл спить в очікуванні — будимо його одразу, щоб він побачив userDisconnected і вийшов
    if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
    try{await sendCmd(CMD_STOP);}catch(e){}
    try{bDev&&bDev.gatt.disconnect();}catch(e){}
    bConn=false;reconnecting=false;
    btn.textContent='🔵 Connect';btn.className='pill';
    document.getElementById('bs').textContent='bLink3';
    document.getElementById('bs').className='pill';stopAlert();
    Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
    exitFullscreenSafe();
  }

  // ── ПЕРВІСНЕ ПІДКЛЮЧЕННЯ (немає ще жодного відомого пристрою) ──
  async function initialConnect(){
    userDisconnected=false;
    btn.textContent='⏳…';btn.className='pill go';
    // Запит дозволу на гіроскоп/акселерометр — САМЕ ТУТ, на самому початку
    // тап-обробника Connect, поки жест користувача ще "свіжий" (iOS дозволяє
    // requestPermission() лише в межах прямого user-gesture). Раніше для
    // цього треба було окремо тапати тайл нахилу щосесії — тепер один тап
    // на Connect одразу активує і BLE, і гіроскоп.
    try{ await requestMotionPermission(); }catch(e){}
    try{
      bDev=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'bLink'}],optionalServices:[SVC]});
      bDev.addEventListener('gattserverdisconnected',onUnexpectedDisconnect);
      const srv=await withTimeout(bDev.gatt.connect(), 4000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      document.getElementById('bs').textContent=bDev.name||'Connected';
      document.getElementById('bs').className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
      tripStart(); // авто-старт запису поїздки саме при першому конекті (вибір пристрою), не при тихих реконнектах
    }catch(e){
      bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
      document.getElementById('bs').textContent='Error';
      document.getElementById('bs').className='pill err';
    }
  }

  // ── ШВИДКИЙ ТАП: "просто перепідключення" ──
  // ГОЛОВНИЙ ФІКС: раніше швидкий тап під час автоперепідключення викликав
  // requestDevice() ЗНОВУ (новий пікер OS), а старий цикл перепідключення при
  // цьому й далі працював у фоні — два паралельні процеси на той самий
  // пристрій, звідси нестабільність. Тепер: якщо bDev вже відомий з цієї
  // сесії — НІКОЛИ не викликаємо requestDevice() повторно, а або форсуємо
  // "kick" активного циклу перепідключення (миттєвий ретрай замість очікування
  // паузи), або, якщо зараз під'єднано — робимо швидкий розрив+перепідключення
  // через той самий цикл (замість повного ручного розриву).
  async function quickReconnect(){
    if(!bDev){
      // Немає ще жодного відомого пристрою цієї сесії — це первісне підключення.
      await initialConnect();
      return;
    }
    userDisconnected=false;
    if(reconnecting){
      // Цикл перепідключення вже йде (спить між спробами) — будимо його одразу.
      kickReconnectNow();
      return;
    }
    if(bConn){
      // Підключено, але користувач хоче "перепідключити" (наприклад, дані
      // виглядають застряглими) — розриваємо, onUnexpectedDisconnect сам
      // підхопить і одразу почне перепідключення (перша спроба — швидка).
      try{ bDev.gatt.disconnect(); }catch(e){}
      return;
    }
    // Не підключено, не в процесі — користувач раніше зробив довге натискання
    // (повне відключення). Пробуємо перепідключитись до вже відомого
    // пристрою НАПРЯМУ, без нового пікера.
    btn.textContent='⏳…';btn.className='pill go';
    try{
      const srv=await withTimeout(bDev.gatt.connect(), 4000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      document.getElementById('bs').textContent=bDev.name||'Connected';
      document.getElementById('bs').className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
    }catch(e){
      bConn=false;btn.textContent='🔵 Connect';btn.className='pill';
      document.getElementById('bs').textContent='Error';
      document.getElementById('bs').className='pill err';
    }
  }

  // ── РОЗПІЗНАВАННЯ ЖЕСТУ: швидкий тап vs довге натискання ──
  const LONG_PRESS_MS=550;
  let pressTimer=null, longFired=false;
  btn.addEventListener('pointerdown',()=>{
    unlockAudioOnGesture(); // саме тут гарантовано є user-gesture (iOS вимагає це)
    longFired=false;
    pressTimer=setTimeout(()=>{
      longFired=true;
      if(navigator.vibrate) try{navigator.vibrate(30);}catch(e){}
      fullDisconnect();
    },LONG_PRESS_MS);
  });
  const cancelPress=()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} };
  btn.addEventListener('pointerup',()=>{
    cancelPress();
    if(!longFired) quickReconnect();
  });
  btn.addEventListener('pointerleave',cancelPress);
  btn.addEventListener('pointercancel',cancelPress);
}
setupBleUI(); // одноразове налаштування при завантаженні (НЕ на кожен клік —
// раніше через це на кожен клік Connect/Disconnect ще й додавався ЗАЙВИЙ
// дублікат слухача 'visibilitychange', який назавжди лишався висіти)

async function onUnexpectedDisconnect(){
  bConn=false;stopAlert();
  if(_watchdogInt) { clearInterval(_watchdogInt); _watchdogInt = null; }
  Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
  exitFullscreenSafe();
  const btn=document.getElementById('cb'),bs=document.getElementById('bs');
  if(userDisconnected||reconnecting)return;
  reconnecting=true;
  bs.textContent='Перепідключення…';bs.className='pill err';
  btn.textContent='⏳…';btn.className='pill go';
  let attempt=0;
  while(!userDisconnected){
    attempt++;
    // Перші 10 спроб — швидко (кожні 1.5с), далі — рідше (кожні 5с), щоб не
    // спамити спроби годинами і берегти батарею, якщо сигнал пропав надовго
    // (двигун заглушений, відійшов від мотоцикла тощо). АЛЕ цикл більше НЕ
    // здається — раніше він зупинявся після 10 спроб (~15с) і дашборд
    // назавжди зависав на "Перепідключення…", навіть якщо сигнал повертався
    // пізніше. Тепер спроби тривають, поки користувач сам не натисне Disconnect.
    const delay = attempt<=10 ? 1500 : 5000;
    await interruptibleSleep(delay);
    if(userDisconnected) break;
    try{
      const srv=await withTimeout(bDev.gatt.connect(), 4000);
      bChr=await(await srv.getPrimaryService(SVC)).getCharacteristic(CHR);
      bChr.addEventListener('characteristicvaluechanged',onData);
      await bChr.startNotifications();
      bConn=true;btn.textContent='🟢 '+(bDev.name||'OK');btn.className='pill ok';
      bs.textContent=bDev.name||'Connected';bs.className='pill on';
      Object.keys(V).forEach(k=>V[k]=(k==='RPM'?0:'--'));ud();
      requestFullscreenSafe();
      requestWakeLock();
      await initSession();
      armWatchdog();
      reconnecting=false;
      return;
    }catch(e){
      // Оновлюємо лічильник спроб на екрані — щоб було видно, що процес живий,
      // а не завис (раніше текст просто застигав на "Перепідключення…" назавжди).
      bs.textContent='Перепідключення… (#'+attempt+')';
    }
  }
  reconnecting=false;
}

  {id:'t3',k:'RPM',      st:'flat',sz:'s21'},

/* ── РОБОЧІ СТОЛИ ──
   Раніше було лише один масив тайлів (localStorage 'ar_lay2'). Тепер це
   масив столів workspaces:[{id,name,lay:[...]}]. Стара структура автоматично
   мігрує в "Стіл 1" при першому запуску нової версії, щоб ніхто не втратив
   своє поточне розташування. */
let workspaces = lg('workspaces');
if(!workspaces || !Array.isArray(workspaces) || !workspaces.length){
  const oldLay = lg('lay2');
  workspaces = [{id:'w1', name:'Стіл 1', lay: oldLay || dl()}];
}
let activeWsId = lg('activeWs');
if(!activeWsId || !workspaces.find(w=>w.id===activeWsId)) activeWsId = workspaces[0].id;

function activeWs(){ return workspaces.find(w=>w.id===activeWsId) || workspaces[0]; }
// `lay` лишається змінною, яку використовує весь інший код без змін —
// вона просто завжди вказує на масив тайлів АКТИВНОГО столу.
let lay = activeWs().lay;
function saveLay(){ activeWs().lay = lay; ls('workspaces', workspaces); }

let editMode=false,nid=20,ptile=null;
// ── Стан переставляння плиток (розділ "два прицільні тапи") ──
let dragTile=null, dragEl=null;

function clearDragVisuals(){
  if(dragEl) dragEl.classList.remove('ds');
}
const gi=document.getElementById('gi');

// В ландшафтній орієнтації кількість колонок підлаштовується під кількість тайлів,
// щоб вони завжди ділились рівно (4 тайли → 2 на рядок, 5-6 тайлів → 3 на рядок)
// замість жорстко зафіксованих 6 колонок, які викликали накладання/переповнення сітки.
// Керується через клас ar-landscape на <html> (замість @media у CSS) — той
// самий computeIsLandscape(), що й сенсор кута нахилу, тож сітка і сенсор
// завжди узгоджені з ФАКТИЧНОЮ орієнтацією телефону (ручний лок було
// прибрано — він ламав правильний вибір осі гіроскопа/акселерометра).
function applyGridColumns(){
  const isLandscape = computeIsLandscape();
  gi.style.gridTemplateColumns = isLandscape ? 'repeat(12, 1fr)' : '';
  document.documentElement.classList.toggle('ar-landscape', isLandscape);
}
window.addEventListener('resize', applyGridColumns);
window.addEventListener('orientationchange', applyGridColumns);
try{ applyGridColumns(); }catch(e){ console.error('applyGridColumns init failed:',e); }

function render(){
  applyGridColumns();
  const videoTile = document.getElementById('dash-video-tile');
  gi.innerHTML = '';
  if(videoTile) gi.appendChild(videoTile);

  lay.forEach(tile=>{
    const el=mkTile(tile);
    if(alertState[tile.id])el.classList.add(alertState[tile.id]);
    gi.appendChild(el);
  });
  if(editMode){
    const ab=document.createElement('div');
    ab.className='tile add';ab.textContent='+';
    ab.addEventListener('click',()=>{ptile=null;cpk();});
    gi.appendChild(ab);
  }
}

function mkTile(tile){
  const p=P[tile.k];
  const el=document.createElement('div');
  el.className='tile '+tile.sz+(editMode?' ed':'');
  el.dataset.id=tile.id;el.style.setProperty('--pc',p.c);
  
  const rm=document.createElement('div');rm.className='rm';rm.textContent='✕';
  rm.addEventListener('click',(e)=>{
    e.stopPropagation();
    if(dragTile && dragTile.id===tile.id){ dragTile=null; dragEl=null; } // вибрану плитку якраз видаляють — не лишаємо застарілу посилання
    lay=lay.filter(t=>t.id!==tile.id);saveLay();render();
  });
  el.appendChild(rm);

  if(tile.st==='gauge' && tile.sz==='s22'){
    el.appendChild(mkG(tile,p));
  }else{
    el.appendChild(mkF(tile,p));
  }

  if(tile.k==='GPS'){
    const badge=document.createElement('div');
    badge.className='cam-radar-badge';
    badge.innerHTML='<div class="c-sign">--</div><div class="c-dist">--м</div>';
    el.appendChild(badge);
  }

  // ── Переставляння плиток: ДВА ПРИЦІЛЬНІ ТАПИ, без жодного перетягування
  // (свайп/рух пальцем конфліктував зі скролом сторінки й власним жестом
  // Bluefy) ──
  // Тап 1 по плитці A (нічого не вибрано) → вибираємо A (підсвічуємо .ds).
  // Тап 2 по ІНШІЙ плитці B → A і B МІНЯЮТЬСЯ місцями в lay.
  // Тап 2 по ТІЙ САМІЙ плитці A → скасовуємо вибір і відкриваємо звичний
  // пікер параметру/розміру (стара поведінка тапу нікуди не зникла).
  el.addEventListener('click',()=>{
    if(!editMode){
      if(tile.k==='Lean') onLeanTileTap();
      return;
    }
    if(dragTile===null){
      dragTile=tile; dragEl=el;
      el.classList.add('ds');
      return;
    }
    if(dragTile.id===tile.id){
      clearDragVisuals(); dragTile=null; dragEl=null;
      ptile=tile; cpk();
      return;
    }
    const i=lay.findIndex(t=>t.id===dragTile.id);
    const j=lay.findIndex(t=>t.id===tile.id);
    clearDragVisuals(); dragTile=null; dragEl=null;
    if(i>-1 && j>-1 && i!==j){
      [lay[i],lay[j]]=[lay[j],lay[i]];
      saveLay(); render();
    }
  });

  return el;
}

function mkF(tile,p){
  const w=document.createElement('div');
  w.style.cssText='display:flex;flex-direction:column;align-items:center;width:100%;';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const u=document.createElement('div');u.className='tun';
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  w.append(l,u,v);
  return w;
}

function mkG(tile,p){
  const w=document.createElement('div');w.className='gw';
  w.innerHTML=`<svg class="gsvg" viewBox="0 0 100 100">
    <path class="gbg" d="M 20 80 A 40 40 0 1 1 80 80"/>
    <path class="gfg" id="gfg_${tile.id}" d="M 20 80 A 40 40 0 1 1 80 80" stroke-dasharray="188.4" stroke-dashoffset="188.4"/>
  </svg>`;
  const gc=document.createElement('div');gc.className='gc';
  const l=document.createElement('div');l.className='tl';l.textContent=p.n;
  const v=document.createElement('div');v.className='tv';v.dataset.lid=tile.k;v.textContent=V[tile.k];
  gc.append(l,v);w.appendChild(gc);

function ug(id,k){
  const path=document.getElementById('gfg_'+id);if(!path)return;
  const p=P[k],v=parseFloat(V[k]);
  if(isNaN(v)){path.style.strokeDashoffset=188.4;return;}
  const pct=Math.max(0,Math.min(1,(v-p.mn)/(p.mx-p.mn)));
  path.style.strokeDashoffset=188.4-(188.4*pct);
}

let prevV={};
function ud(){
  document.querySelectorAll('[data-lid]').forEach(el=>{
